{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<style>
    .edit-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 40px auto;
    }
    .edit-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input:focus {
        border-color: #667eea;
    }
    .avatar-section {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
    }
    .avatar-section img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #909399;
    }
    .btn-secondary:hover {
        background: #82848a;
    }
    .error-tip {
        color: #ff4d4f;
        font-size: 13px;
        margin-top: 8px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #52c41a;
        font-size: 14px;
        margin-top: 16px;
        text-align: center;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

<div class="edit-card">
    <h2>修改个人信息</h2>
    <form id="editForm">
        <div class="avatar-section">
            <img id="avatarPreview" src="" alt="头像"/>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label>更换头像</label>
                <input type="file" id="avatarFile" accept="image/*" style="display:none;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <button type="button" class="btn btn-secondary" style="width:auto;margin:0;padding:8px 16px;" onclick="document.getElementById('avatarFile').click()">选择图片</button>
                    <span id="avatarStatus" style="font-size:12px;color:#999;"></span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>用户名</label>
            <input id="username" type="text" placeholder="请输入用户名"/>
        </div>

        <div class="form-group">
            <label>邮箱</label>
            <input id="email" type="email" placeholder="请输入邮箱"/>
        </div>

        <div class="form-group">
            <label>年龄</label>
            <input id="age" type="number" placeholder="请输入年龄"/>
        </div>

        <div class="form-group">
            <label>手机号</label>
            <input id="phone" type="text" placeholder="请输入手机号"/>
        </div>

        <p id="errorMsg" class="error-tip"></p>
        <p id="successMsg" class="success-tip"></p>

        <button type="submit" id="saveBtn" class="btn">保存修改</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='/page/user/profile'">返回</button>
    </form>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    let currentUser = null;
    let avatarUrl = '';

    setupImageUpload({
        inputId: 'avatarFile',
        previewId: 'avatarPreview',
        statusId: 'avatarStatus',
        type: 1,
        onSuccess: function(url) { avatarUrl = url; }
    });

    async function loadUserInfo() {
        try {
            const response = await axios.get('/api/user/get');
            if (response.data.code === 0 && response.data.data) {
                currentUser = response.data.data.user;
                document.getElementById('username').value = currentUser.name || '';
                document.getElementById('email').value = currentUser.email || '';
                document.getElementById('age').value = currentUser.age || '';
                document.getElementById('phone').value = currentUser.phone || '';
                if (currentUser.avatar) {
                    avatarUrl = currentUser.avatar;
                    var preview = document.getElementById('avatarPreview');
                    preview.src = currentUser.avatar;
                    preview.style.display = 'block';
                }
            } else {
                window.location.href = '/page/user/login';
            }
        } catch (error) {
            window.location.href = '/page/user/login';
        }
    }

    document.getElementById('editForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const age = document.getElementById('age').value;
        const phone = document.getElementById('phone').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const saveBtn = document.getElementById('saveBtn');

        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        if (!username || !email) {
            errorMsg.textContent = '用户名和邮箱不能为空';
            errorMsg.classList.add('show');
            return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        const formData = new FormData();
        formData.append('name', username);
        formData.append('email', email);
        formData.append('age', age);
        formData.append('phone', phone);

        if (avatarUrl) {
            formData.append('avatar', avatarUrl);
        }

        try {
            const response = await axios.post('/api/user/update', formData);

            if (response.data.code === 0) {
                successMsg.textContent = '修改成功';
                successMsg.classList.add('show');
                setTimeout(function() {
                    window.location.reload();
                }, 1500);
            } else {
                errorMsg.textContent = response.data.message || '修改失败';
                errorMsg.classList.add('show');
            }
        } catch (error) {
            errorMsg.textContent = '网络错误，请稍后重试';
            errorMsg.classList.add('show');
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = '保存修改';
        }
    });

    loadUserInfo();
</script>
{{end}}
