<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 知识分享平台</title>
    <script src="/js/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .register-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .register-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .register-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #409eff;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #67c23a;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .register-btn:hover {
            background: #66b1ff;
        }
        .register-btn:disabled {
            background: #a0cfff;
            cursor: not-allowed;
        }
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .form-footer a {
            color: #409eff;
            text-decoration: none;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <h1>注册账号</h1>
            <p>加入知识分享平台</p>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input 
                    id="username"
                    type="text" 
                    placeholder="请输入用户名"
                />
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input 
                    id="password"
                    type="password" 
                    placeholder="请输入密码"
                />
            </div>

            <div class="form-group">
                <label>确认密码</label>
                <input 
                    id="confirmPassword"
                    type="password" 
                    placeholder="请再次输入密码"
                />
            </div>

            <div class="form-group">
                <label>邮箱</label>
                <input 
                    id="email"
                    type="email" 
                    placeholder="请输入邮箱"
                />
            </div>

            <p id="errorMsg" class="error-tip"></p>
            <p id="successMsg" class="success-tip"></p>
            
            <button type="submit" id="registerBtn" class="register-btn">注 册</button>
        </form>
        
        <div class="form-footer">
            已有账号？<a href="/page/user/login">立即登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const registerBtn = document.getElementById('registerBtn');
            
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            
            if (!username || !password || !confirmPassword || !email) {
                errorMsg.textContent = '请填写所有字段';
                errorMsg.classList.add('show');
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.classList.add('show');
                return;
            }
            
            if (password.length < 8) {
                errorMsg.textContent = '密码长度至少8位';
                errorMsg.classList.add('show');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            const formData = new URLSearchParams();
            formData.append('name', username);
            formData.append('password', password);
            formData.append('email', email);
            
            try {
                const response = await axios.post('/api/user/add', formData);
                
                if (response.data.code === 0) {
                    successMsg.textContent = '注册成功，跳转到登录页...';
                    successMsg.classList.add('show');
                    window.location.href = '/';
                    
                } else {
                    errorMsg.textContent = response.data.message || '注册失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = '注 册';
            }
        });
    </script>
</body>
</html>
