{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<style>
    .edit-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 40px auto;
    }
    .edit-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input:focus {
        border-color: #667eea;
    }
    .password-tip {
        font-size: 12px;
        color: #999;
        margin-top: 6px;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #909399;
    }
    .btn-secondary:hover {
        background: #82848a;
    }
    .error-tip {
        color: #ff4d4f;
        font-size: 13px;
        margin-top: 8px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #52c41a;
        font-size: 14px;
        margin-top: 16px;
        text-align: center;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
    .username-display {
        background: #f5f7fa;
        padding: 12px 16px;
        border-radius: 6px;
        color: #666;
        font-size: 14px;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

<div class="edit-card">
    <h2>修改密码</h2>
    <form id="passwordForm">
        <div class="form-group">
            <label>用户名</label>
            <div id="usernameDisplay" class="username-display">加载中...</div>
        </div>

        <div class="form-group">
            <label>新密码</label>
            <input id="password" type="password" placeholder="请输入新密码（至少8位）"/>
            <p class="password-tip">密码长度至少8位，可包含字母、数字和特殊字符(!@#$%^&*_-)</p>
        </div>

        <div class="form-group">
            <label>确认密码</label>
            <input id="confirmPassword" type="password" placeholder="请再次输入新密码"/>
        </div>

        <p id="errorMsg" class="error-tip"></p>
        <p id="successMsg" class="success-tip"></p>

        <button type="submit" id="saveBtn" class="btn">修改密码</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='/page/user/profile'">返回</button>
    </form>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    async function loadUserInfo() {
        try {
            const response = await axios.get('/api/user/get');
            if (response.data.code === 0 && response.data.data) {
                document.getElementById('usernameDisplay').textContent = response.data.data.user.name || '未设置';
            } else {
                document.getElementById('usernameDisplay').textContent = '无法获取';
            }
        } catch (error) {
            document.getElementById('usernameDisplay').textContent = '无法获取';
        }
    }

    loadUserInfo();

    document.getElementById('passwordForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const saveBtn = document.getElementById('saveBtn');

        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        if (!password || password.length < 8) {
            errorMsg.textContent = '密码长度至少8位';
            errorMsg.classList.add('show');
            return;
        }

        const passwordRegex = /^[a-zA-Z0-9!@#$%^&*_\-]+$/;
        if (!passwordRegex.test(password)) {
            errorMsg.textContent = '密码只能包含字母、数字和特殊字符(!@#$%^&*_-)';
            errorMsg.classList.add('show');
            return;
        }

        if (password !== confirmPassword) {
            errorMsg.textContent = '两次输入的密码不一致';
            errorMsg.classList.add('show');
            return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = '修改中...';

        try {
            const formData = new FormData();
            formData.append('password', password);

            const response = await axios.post('/api/user/updatepassword', formData);

            if (response.data.code === 0) {
                successMsg.textContent = '密码修改成功';
                successMsg.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('confirmPassword').value = '';
                setTimeout(function() {
                    window.location.href = '/page/user/profile';
                }, 1500);
            } else {
                errorMsg.textContent = response.data.message || '修改失败';
                errorMsg.classList.add('show');
            }
        } catch (error) {
            if (error.response && error.response.data) {
                errorMsg.textContent = error.response.data.message || '网络错误，请稍后重试';
            } else {
                errorMsg.textContent = '网络错误，请稍后重试';
            }
            errorMsg.classList.add('show');
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = '修改密码';
        }
    });
</script>
{{end}}
