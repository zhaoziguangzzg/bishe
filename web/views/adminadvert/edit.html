<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑广告 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            text-align: center;
            padding: 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-left: 3px solid white;
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #e64545;
        }
        .content-area {
            padding: 24px 32px;
        }
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 800px;
        }
        .form-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .img-preview {
            margin-top: 10px;
            max-width: 300px;
        }
        .img-preview img {
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid #dcdfe6;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #606266;
            font-size: 14px;
        }
        .form-group label .required {
            color: #f56c6c;
            margin-left: 2px;
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            color: #606266;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-control.error {
            border-color: #f56c6c;
        }
        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            background: #67c23a;
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .success-tip.show {
            display: block;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: #f5f7fa;
            color: #606266;
            border: 1px solid #dcdfe6;
        }
        .btn-secondary:hover {
            background: #eef0f4;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
            <p>知识分享平台</p>
        </div>
        <a href="/page/admin/index" class="menu-item">首页</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>编辑广告</h1>
            <div class="user-info">
                <a href="/api/adminuser/logout" class="logout-btn">退出登录</a>
            </div>
        </div>

        <div class="content-area">
            <div class="form-card">
                <h3 class="form-title">广告信息</h3>
                
                <form id="advertForm">
                    <p id="successMsg" class="success-tip"></p>
                    <input type="hidden" id="advertId" name="advertId">

                    <div class="form-group">
                        <label>广告位置 <span class="required">*</span></label>
                        <select class="form-control" id="position" name="position">
                            <option value="">请选择广告位置</option>
                            <option value="1">圈子首页</option>
                            <option value="2">课程首页</option>
                            <option value="3">用户个人中心</option>
                            <option value="4">首页</option>
                        </select>
                        <p id="positionError" class="error-tip">请选择广告位置</p>
                    </div>

                    <div class="form-group">
                        <label>广告内容 <span class="required">*</span></label>
                        <textarea class="form-control" id="content" name="content" placeholder="请输入广告内容" maxlength="200"></textarea>
                        <p id="contentError" class="error-tip">请输入广告内容</p>
                    </div>

                    <div class="form-group">
                        <label>广告地址 <span class="required">*</span></label>
                        <input type="text" class="form-control" id="advertAddr" name="advertAddr" placeholder="请输入广告跳转地址" maxlength="200">
                        <p id="advertAddrError" class="error-tip">请输入广告地址</p>
                    </div>

                    <div class="form-group">
                        <label>广告图片</label>
                        <input type="file" class="form-control" id="img" accept="image/*">
                        <input type="hidden" id="originalImg" name="originalImg">
                        <div id="currentImgPreview" class="img-preview"></div>
                        <p class="form-tip">不选择则保留原图片</p>
                    </div>

                    <div class="form-group">
                        <label>开始时间 <span class="required">*</span></label>
                        <input type="datetime-local" class="form-control" id="startTime" name="startTime">
                        <p id="startTimeError" class="error-tip">请选择开始时间</p>
                    </div>

                    <div class="form-group">
                        <label>结束时间 <span class="required">*</span></label>
                        <input type="datetime-local" class="form-control" id="endTime" name="endTime">
                        <p id="endTimeError" class="error-tip">请选择结束时间</p>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="submitForm()">提交</button>
                        <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function formatDateTimeForInput(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '';
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        async function loadAdvert() {
            const advertId = getQueryParam('id');
            if (!advertId) {
                alert('缺少广告ID');
                return;
            }

            try {
                const response = await axios.get(`/api/adminadvert/get?advert_id=${advertId}`);
                if (response.data.code === 0) {
                    const advert = response.data.data.advert;
                    if (advert) {
                        document.getElementById('advertId').value = advert.id;
                        document.getElementById('position').value = advert.position || '';
                        document.getElementById('content').value = advert.content || '';
                        document.getElementById('advertAddr').value = advert.advertAddr || '';
                        document.getElementById('originalImg').value = advert.img || '';
                        const imgPreview = document.getElementById('currentImgPreview');
                        if (advert.img) {
                            imgPreview.innerHTML = '<img src="' + advert.img + '" alt="当前图片"/>';
                        } else {
                            imgPreview.innerHTML = '';
                        }
                        document.getElementById('startTime').value = formatDateTimeForInput(advert.startTime);
                        document.getElementById('endTime').value = formatDateTimeForInput(advert.endTime);
                    } else {
                        alert('广告不存在');
                    }
                } else {
                    alert(response.data.msg || '加载失败');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('请求失败');
            }
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.classList.add('show');
            }
        }

        function hideError(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                element.classList.remove('show');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-tip').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));
        }

        function validateForm() {
            clearErrors();
            let isValid = true;

            const position = document.getElementById('position').value.trim();
            if (!position) {
                showError('positionError', '请选择广告位置');
                document.getElementById('position').classList.add('error');
                isValid = false;
            }

            const content = document.getElementById('content').value.trim();
            if (!content) {
                showError('contentError', '请输入广告内容');
                document.getElementById('content').classList.add('error');
                isValid = false;
            }

            const advertAddr = document.getElementById('advertAddr').value.trim();
            if (!advertAddr) {
                showError('advertAddrError', '请输入广告地址');
                document.getElementById('advertAddr').classList.add('error');
                isValid = false;
            }

            const startTime = document.getElementById('startTime').value;
            if (!startTime) {
                showError('startTimeError', '请选择开始时间');
                document.getElementById('startTime').classList.add('error');
                isValid = false;
            }

            const endTime = document.getElementById('endTime').value;
            if (!endTime) {
                showError('endTimeError', '请选择结束时间');
                document.getElementById('endTime').classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        async function submitForm() {
            if (!validateForm()) {
                return;
            }

            try {
                const formData = new FormData();
                formData.append('advert_id', document.getElementById('advertId').value);
                formData.append('position', document.getElementById('position').value);
                formData.append('content', document.getElementById('content').value.trim());
                formData.append('addvert_addr', document.getElementById('advertAddr').value.trim());
                formData.append('img', document.getElementById('img').value.trim());

                const imgFile = document.getElementById('img').files[0];
                if (imgFile) {
                    formData.append('avatar', imgFile);
                }
                
                const startTime = document.getElementById('startTime').value;
                if (startTime) {
                    const formattedStartTime = startTime.replace('T', ' ') + ':00';
                    formData.append('start_time', formattedStartTime);
                }

                const endTime = document.getElementById('endTime').value;
                if (endTime) {
                    const formattedEndTime = endTime.replace('T', ' ') + ':00';
                    formData.append('end_time', formattedEndTime);
                }

                const response = await axios.post('/api/adminadvert/update', formData);

                if (response.data.code === 0) {
                    successMsg.textContent = '更新成功！';
                    successMsg.classList.add('show');
                    setTimeout(function() {
                        window.location.href = '/page/adminadvert/list';
                    }, 1500);
                } else {
                    showError('positionError', response.data.msg || '更新失败');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('positionError', '请求失败，请稍后重试');
            }
        }

        function goBack() {
            window.location.href = '/page/adminadvert/list';
        }

        loadAdvert();
    </script>
</body>
</html>
