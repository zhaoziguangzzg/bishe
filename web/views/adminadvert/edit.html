{{define "admin_layout_extra_head"}}
<style>
    .form-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        width: 100%;
    }
    .form-title {
        font-size: 18px;
        color: #333;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #606266;
        font-size: 14px;
    }
    .form-group label .required {
        color: #f56c6c;
        margin-left: 2px;
    }
    .form-control {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        color: #606266;
        transition: border-color 0.3s;
    }
    .form-control:focus {
        outline: none;
        border-color: #667eea;
    }
    .form-control.error {
        border-color: #f56c6c;
    }
    textarea.form-control {
        min-height: 120px;
        resize: vertical;
    }
    .img-preview {
        margin-top: 10px;
        max-width: 300px;
    }
    .img-preview img {
        max-width: 100%;
        border-radius: 6px;
        border: 1px solid #dcdfe6;
    }
    .form-tip {
        color: #909399;
        font-size: 12px;
        margin-top: 4px;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 12px;
        margin-top: 4px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        background: #67c23a;
        color: white;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 20px;
        display: none;
        font-size: 14px;
    }
    .success-tip.show {
        display: block;
    }
    .btn-group {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }
    .btn {
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
        border: none;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .btn-primary:hover {
        opacity: 0.9;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #606266;
        border: 1px solid #dcdfe6;
    }
    .btn-secondary:hover {
        background: #eef0f4;
    }
    .upload-area {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .upload-area input[type="file"] {
        display: none;
    }
    .preview-img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 6px;
        border: 1px solid #dcdfe6;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    var editAdvertImgUrl = '';

    setupImageUpload({
        inputId: 'imgFile',
        previewId: 'imgPreview',
        statusId: 'imgStatus',
        type: 2,
        onSuccess: function(url) { editAdvertImgUrl = url; }
    });

    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function formatDateTimeForInput(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return '';
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    async function loadAdvert() {
        const advertId = getQueryParam('id');
        if (!advertId) { alert('缺少广告ID'); return; }

        try {
            const response = await axios.get(`/api/adminadvert/get?advert_id=${advertId}`);
            if (response.data.code === 0) {
                const advert = response.data.data.advert;
                if (advert) {
                    document.getElementById('advertId').value = advert.id;
                    document.getElementById('position').value = advert.position || '';
                    document.getElementById('content').value = advert.content || '';
                    document.getElementById('advertAddr').value = advert.advertAddr || '';
                    if (advert.img) {
                        editAdvertImgUrl = advert.img;
                        var preview = document.getElementById('imgPreview');
                        preview.src = advert.img;
                        preview.style.display = 'block';
                    }
                    document.getElementById('startTime').value = formatDateTimeForInput(advert.startTime);
                    document.getElementById('endTime').value = formatDateTimeForInput(advert.endTime);
                } else {
                    alert('广告不存在');
                }
            } else {
                alert(response.data.msg || '加载失败');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('请求失败');
        }
    }

    function showError(elementId, message) {
        const element = document.getElementById(elementId);
        if (element) { element.textContent = message; element.classList.add('show'); }
    }

    function hideError(elementId) {
        const element = document.getElementById(elementId);
        if (element) { element.classList.remove('show'); }
    }

    function clearErrors() {
        document.querySelectorAll('.error-tip').forEach(el => el.classList.remove('show'));
        document.querySelectorAll('.form-control').forEach(el => el.classList.remove('error'));
    }

    function validateForm() {
        clearErrors();
        let isValid = true;

        const position = document.getElementById('position').value.trim();
        if (!position) { showError('positionError', '请选择广告位置'); document.getElementById('position').classList.add('error'); isValid = false; }

        const content = document.getElementById('content').value.trim();
        if (!content) { showError('contentError', '请输入广告内容'); document.getElementById('content').classList.add('error'); isValid = false; }

        const advertAddr = document.getElementById('advertAddr').value.trim();
        if (!advertAddr) { showError('advertAddrError', '请输入广告地址'); document.getElementById('advertAddr').classList.add('error'); isValid = false; }

        const startTime = document.getElementById('startTime').value;
        if (!startTime) { showError('startTimeError', '请选择开始时间'); document.getElementById('startTime').classList.add('error'); isValid = false; }

        const endTime = document.getElementById('endTime').value;
        if (!endTime) { showError('endTimeError', '请选择结束时间'); document.getElementById('endTime').classList.add('error'); isValid = false; }

        return isValid;
    }

    async function submitForm() {
        if (!validateForm()) return;

        try {
            const formData = new FormData();
            formData.append('advert_id', document.getElementById('advertId').value);
            formData.append('position', document.getElementById('position').value);
            formData.append('content', document.getElementById('content').value.trim());
            formData.append('addvert_addr', document.getElementById('advertAddr').value.trim());
            formData.append('img', editAdvertImgUrl);

            if (editAdvertImgUrl) {
                formData.append('avatar', editAdvertImgUrl);
            }

            const startTime = document.getElementById('startTime').value;
            if (startTime) {
                formData.append('start_time', startTime.replace('T', ' ') + ':00');
            }

            const endTime = document.getElementById('endTime').value;
            if (endTime) {
                formData.append('end_time', endTime.replace('T', ' ') + ':00');
            }

            const response = await axios.post('/api/adminadvert/update', formData);

            if (response.data.code === 0) {
                successMsg.textContent = '更新成功！';
                successMsg.classList.add('show');
                setTimeout(function() {
                    window.location.href = '/page/adminadvert/list';
                }, 1500);
            } else {
                showError('positionError', response.data.msg || '更新失败');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('positionError', '请求失败，请稍后重试');
        }
    }

    function goBack() {
        window.location.href = '/page/adminadvert/list';
    }

    loadAdvert();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="form-card">
    <h3 class="form-title">广告信息</h3>

    <form id="advertForm">
        <p id="successMsg" class="success-tip"></p>
        <input type="hidden" id="advertId" name="advertId">

        <div class="form-group">
            <label>广告位置 <span class="required">*</span></label>
            <select class="form-control" id="position" name="position">
                <option value="">请选择广告位置</option>
                <option value="1">圈子首页</option>
                <option value="2">课程首页</option>
                <option value="3">用户个人中心</option>
                <option value="4">首页</option>
            </select>
            <p id="positionError" class="error-tip">请选择广告位置</p>
        </div>

        <div class="form-group">
            <label>广告内容 <span class="required">*</span></label>
            <textarea class="form-control" id="content" name="content" placeholder="请输入广告内容" maxlength="200"></textarea>
            <p id="contentError" class="error-tip">请输入广告内容</p>
        </div>

        <div class="form-group">
            <label>广告地址 <span class="required">*</span></label>
            <input type="text" class="form-control" id="advertAddr" name="advertAddr" placeholder="请输入广告跳转地址" maxlength="200">
            <p id="advertAddrError" class="error-tip">请输入广告地址</p>
        </div>

        <div class="form-group">
            <label>广告图片</label>
            <div class="upload-area">
                <input type="file" id="imgFile" accept="image/*" style="display:none;">
                <button type="button" class="btn btn-secondary" style="width:auto;margin:0;padding:8px 16px;" onclick="document.getElementById('imgFile').click()">选择图片</button>
                <img id="imgPreview" class="preview-img" style="display:none;">
                <span id="imgStatus" style="font-size:12px;color:#999;">不选择则保留原图片</span>
            </div>
        </div>

        <div class="form-group">
            <label>开始时间 <span class="required">*</span></label>
            <input type="datetime-local" class="form-control" id="startTime" name="startTime">
            <p id="startTimeError" class="error-tip">请选择开始时间</p>
        </div>

        <div class="form-group">
            <label>结束时间 <span class="required">*</span></label>
            <input type="datetime-local" class="form-control" id="endTime" name="endTime">
            <p id="endTimeError" class="error-tip">请选择结束时间</p>
        </div>

        <div class="btn-group">
            <button type="button" class="btn btn-primary" onclick="submitForm()">提交</button>
            <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
    </form>
</div>

{{template "admin_layout_body_end" .}}
