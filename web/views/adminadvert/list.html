{{define "admin_layout_extra_head"}}
<style>
    .tool-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .tool-bar h2 {
        font-size: 18px;
        color: #333;
    }
    .add-btn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: opacity 0.3s;
        text-decoration: none;
    }
    .add-btn:hover {
        opacity: 0.9;
    }
    .table-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .table {
        width: 100%;
        border-collapse: collapse;
    }
    .table th {
        text-align: left;
        padding: 14px 16px;
        background: #f9fafb;
        color: #606266;
        font-size: 14px;
        font-weight: 500;
    }
    .table td {
        padding: 14px 16px;
        color: #606266;
        font-size: 14px;
        border-bottom: 1px solid #eee;
    }
    .table tr:hover {
        background: #f5f7fa;
    }
    .action-btns {
        display: flex;
        gap: 8px;
    }
    .btn-edit {
        padding: 6px 12px;
        background: #409eff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-edit:hover {
        background: #66b1ff;
    }
    .btn-delete {
        padding: 6px 12px;
        background: #f56c6c;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-delete:hover {
        background: #f78989;
    }
    .empty-tip {
        text-align: center;
        padding: 40px;
        color: #909399;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    function formatTime(time) {
        if (!time) return '-';
        return time;
    }

    function truncateContent(content, maxLength = 30) {
        if (!content) return '-';
        if (content.length <= maxLength) return content;
        return content.substring(0, maxLength) + '...';
    }

    function getPositionText(position) {
        const positionMap = {
            1: '圈子首页',
            2: '课程首页',
            3: '用户个人中心',
            4: '首页'
        };
        return positionMap[position] || position || '-';
    }

    async function loadAdverts() {
        try {
            const response = await axios.get('/api/adminadvert/all?page=1&pagesize=1000');
            if (response.data.code === 0) {
                const adverts = response.data.data.adverts || [];
                const tbody = document.getElementById('advertTableBody');
                
                if (!adverts || adverts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-tip">暂无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = adverts.map(advert => `
                    <tr>
                        <td>${advert.id}</td>
                        <td>${getPositionText(advert.position)}</td>
                        <td title="${advert.content || ''}">${truncateContent(advert.content)}</td>
                        <td title="${advert.advertAddr || ''}">${truncateContent(advert.advertAddr, 20)}</td>
                        <td>${advert.img ? '<img src="' + advert.img + '" style="width:50px;height:50px;object-fit:cover;border-radius:4px;" />' : '-'}</td>
                        <td>${formatTime(advert.startTime)}</td>
                        <td>${formatTime(advert.endTime)}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-edit" onclick="editAdvert(${advert.id})">修改</button>
                                <button class="btn-delete" onclick="deleteAdvert(${advert.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('advertTableBody').innerHTML = 
                '<tr><td colspan="8" class="empty-tip">加载失败</td></tr>';
        }
    }

    function editAdvert(id) {
        window.location.href = `/page/adminadvert/edit?id=${id}`;
    }

    async function deleteAdvert(id) {
        if (!confirm('确定要删除该广告吗？')) {
            return;
        }

        try {
            const formData = new FormData();
            formData.append('id', id);

            const response = await axios.post('/api/adminadvert/delete', formData);
            if (response.data.code === 0) {
                alert('删除成功');
                loadAdverts();
            } else {
                alert(response.data.msg || '删除失败');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('请求失败，请稍后重试');
        }
    }

    loadAdverts();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="tool-bar">
    <h2>广告管理</h2>
    <a href="/page/adminadvert/add" class="add-btn">添加广告</a>
</div>

<div class="table-card">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>位置</th>
                <th>内容</th>
                <th>地址</th>
                <th>图片</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="advertTableBody">
            <tr>
                <td colspan="8" class="empty-tip">加载中...</td>
            </tr>
        </tbody>
    </table>
</div>

{{template "admin_layout_body_end" .}}
