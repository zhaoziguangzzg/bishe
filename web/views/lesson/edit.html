{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<link href="/css/quill.snow.css" rel="stylesheet">
<script src="/js/quill.min.js"></script>
<script src="/js/quill-config.js"></script>
<style>
    #editor {
        height: 400px;
    }
    .ql-toolbar {
        border: 1px solid #dcdfe6 !important;
        border-radius: 8px 8px 0 0 !important;
    }
    .ql-container {
        border: 1px solid #dcdfe6 !important;
        border-radius: 0 0 8px 8px !important;
        font-size: 14px;
    }
    .ql-editor {
        min-height: 300px;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
    .edit-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 0 auto;
    }
    .page-title {
        font-size: 24px;
        color: #333;
        margin-bottom: 30px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 24px;
    }
    .form-label {
        display: block;
        font-size: 14px;
        color: #606266;
        margin-bottom: 8px;
    }
    .form-input {
        width: 100%;
        padding: 12px 16px;
        font-size: 14px;
        border: 1px solid #dcdfe6;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-input:focus {
        border-color: #667eea;
    }
    .btn-group {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 32px;
    }
    .btn {
        padding: 12px 32px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        transition: opacity 0.3s;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
    }
    .loading {
        text-align: center;
        padding: 60px;
        color: #909399;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 14px;
        margin-top: 8px;
    }
    .success-tip {
        color: #67c23a;
        font-size: 14px;
        margin-top: 8px;
        text-align: center;
    }
</style>
{{end}}

<div class="edit-card" id="content">
    <div class="loading">加载中...</div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('lesson_id');
    let courseId = null;

    if (!lessonId) {
        document.getElementById('content').innerHTML = '<div class="error-tip">缺少课时ID参数</div>';
    } else {
        loadLessonDetail();
    }

    async function loadLessonDetail() {
        try {
            const response = await axios.get('/api/lesson/get', {
                params: { lesson_id: lessonId }
            });

            if (response.data.code === 0 && response.data.data && response.data.data.lesson) {
                const lesson = response.data.data.lesson;
                courseId = lesson.courseId;
                renderForm(lesson);
            } else {
                document.getElementById('content').innerHTML = '<div class="error-tip">' + (response.data.msg || '课时不存在') + '</div>';
            }
        } catch (error) {
            document.getElementById('content').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
        }
    }

    function renderForm(lesson) {
        const html = `
            <h1 class="page-title">修改课时</h1>
            
            <div class="form-group">
                <label class="form-label">课时标题</label>
                <input type="text" id="title" class="form-input" value="${escapeHtml(lesson.title)}" placeholder="请输入课时标题">
            </div>

            <div class="form-group">
                <label class="form-label">课时内容</label>
                <div id="editor"></div>
            </div>

            <div class="error-tip" id="errorTip"></div>
            <div class="success-tip" id="successTip"></div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="submitLesson()">保存</button>
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
            </div>
        `;

        document.getElementById('content').innerHTML = html;
        
        editor = initQuillEditor('#editor', { placeholder: '请输入课时内容...', initialContent: lesson.content });
    }

    async function submitLesson() {
        const title = document.getElementById('title').value.trim();
        const content = editor.root.innerHTML.trim();
        const textContent = stripHtmlTags(editor.root.innerHTML).trim();
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');

        errorTip.textContent = '';
        successTip.textContent = '';

        if (!title) {
            errorTip.textContent = '请输入课时标题';
            return;
        }

        if (!textContent) {
            errorTip.textContent = '请输入课时内容';
            return;
        }

        try {
            const formData = new FormData();
            formData.append('lesson_id', lessonId);
            formData.append('title', title);
            formData.append('content', content);

            const response = await axios.post('/api/lesson/update', formData);

            if (response.data.code === 0) {
                successTip.textContent = '修改成功';
                setTimeout(() => {
                    if (courseId) {
                        window.location.href = '/page/lesson/detail?lesson_id=' + lessonId;
                    } else {
                        window.location.href = '/page/course/index';
                    }
                }, 1000);
            } else {
                errorTip.textContent = response.data.msg || '修改失败';
            }
        } catch (error) {
            errorTip.textContent = '请求失败，请稍后重试';
        }
    }

    function goBack() {
        if (lessonId) {
            window.location.href = '/page/lesson/detail?lesson_id=' + lessonId;
        } else {
            window.location.href = '/page/course/index';
        }
    }

    function stripHtmlTags(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }
</script>
{{end}}
