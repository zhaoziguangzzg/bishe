{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<style>
    .add-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 40px auto;
    }
    .add-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
        font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus {
        border-color: #667eea;
    }
    .form-group textarea {
        min-height: 120px;
        resize: vertical;
    }
    #editor {
        height: 400px;
    }
    .ql-toolbar {
        border: 1px solid #dcdfe6 !important;
        border-radius: 6px 6px 0 0 !important;
    }
    .ql-container {
        border: 1px solid #dcdfe6 !important;
        border-radius: 0 0 6px 6px !important;
        font-size: 14px;
    }
    .ql-editor {
        min-height: 300px;
    }
    .form-group .hint {
        color: #909399;
        font-size: 12px;
        margin-top: 6px;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
        margin-top: 10px;
    }
    .btn-secondary:hover {
        background: #ebeef5;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #67c23a;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

<div class="add-card">
    <h2>添加课时</h2>
    <div class="error-tip" id="errorTip"></div>
    <div class="success-tip" id="successTip"></div>

    <form id="lessonForm">
        <div class="form-group">
            <label>课时标题</label>
            <input type="text" id="title" name="title" placeholder="请输入课时标题" maxlength="100" required>
            <div class="hint">最多100个字符</div>
        </div>

        <div class="form-group">
            <label>课时内容</label>
            <div id="editor"></div>
        </div>

        <button type="button" class="btn" onclick="submitLesson()">提交</button>
        <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
    </form>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cid = urlParams.get('course_id');
    let editor;

    if (!cid) {
        alert('缺少课程 ID 参数');
        window.location.href = '/page/course/index';
    }

    document.addEventListener('DOMContentLoaded', function() {
        editor = new Quill('#editor', {
            theme: 'snow',
            placeholder: '请输入课时内容...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    ['link', 'image', 'video'],
                    [{ 'header': 1 }, { 'header': 2 }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }],
                    [{ 'script': 'sub'}, { 'script': 'super' }],
                    [{ 'indent': '-1'}, { 'indent': '+1' }],
                    [{ 'direction': 'rtl' }],
                    [{ 'size': ['small', false, 'large', 'huge'] }],
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'font': [] }],
                    [{ 'align': [] }],
                    ['clean']
                ]
            }
        });
    });

    function showError(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        errorTip.textContent = message;
        errorTip.classList.add('show');
        successTip.classList.remove('show');
    }

    function showSuccess(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        successTip.textContent = message;
        successTip.classList.add('show');
        errorTip.classList.remove('show');
    }

    async function submitLesson() {
        const title = document.getElementById('title').value.trim();
        const content = editor.root.innerHTML.trim();
        const textContent = stripHtmlTags(editor.root.innerHTML).trim();

        if (!title) {
            showError('请输入课时标题');
            return;
        }

        if (!textContent) {
            showError('请输入课时内容');
            return;
        }

        const btn = document.querySelector('.btn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            formData.append('course_id', cid);

            const response = await axios.post('/api/lesson/add', formData);

            if (response.data.code === 0) {
                showSuccess('添加成功！');
                setTimeout(() => {
                    window.location.href = '/page/course/detail?course_id=' + cid;
                }, 1500);
            } else {
                showError(response.data.msg || '添加失败');
                btn.disabled = false;
                btn.textContent = '提交';
            }
        } catch (error) {
            showError('操作失败，请稍后重试');
            btn.disabled = false;
            btn.textContent = '提交';
        }
    }

    function goBack() {
        window.location.href = '/page/course/detail?course_id=' + cid;
    }

    function stripHtmlTags(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }
</script>
{{end}}
