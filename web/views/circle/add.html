{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<style>
    .add-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 40px auto;
    }
    .add-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
        font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus {
        border-color: #667eea;
    }
    .form-group textarea {
        min-height: 120px;
        resize: vertical;
    }
    .form-group .hint {
        color: #909399;
        font-size: 12px;
        margin-top: 6px;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 13px;
        margin-top: 6px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #67c23a;
        font-size: 14px;
        margin-top: 6px;
        display: none;
        text-align: center;
    }
    .success-tip.show {
        display: block;
    }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
    }
    .back-link:hover {
        text-decoration: underline;
    }
    .upload-section {
        margin-bottom: 20px;
    }
    .upload-section label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .upload-area {
        display: flex;
        align-items: center;
        gap: 16px;
    }
    .upload-area input[type="file"] {
        display: none;
    }
    .upload-btn {
        padding: 10px 20px;
        background: #f5f7fa;
        border: 1px dashed #dcdfe6;
        border-radius: 6px;
        color: #667eea;
        cursor: pointer;
        font-size: 14px;
    }
    .upload-btn:hover {
        border-color: #667eea;
    }
    .preview-img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 8px;
        border: 1px solid #dcdfe6;
    }
    .img-hint {
        color: #909399;
        font-size: 12px;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

<div class="add-card">
    <h2>创建圈子</h2>
    <form id="addCircleForm">
        <div class="form-group">
            <label for="title">圈子名称</label>
            <input type="text" id="title" name="title" placeholder="请输入圈子名称" maxlength="100">
            <div class="hint">最多100个字符</div>
            <div class="error-tip" id="titleError"></div>
        </div>

        <div class="form-group">
            <label for="price">价格（元）</label>
            <input type="number" id="price" name="price" placeholder="请输入价格" min="0" max="10000">
            <div class="hint">价格范围：0 - 10000</div>
            <div class="error-tip" id="priceError"></div>
        </div>

        <div class="form-group">
            <label for="introduction">圈子简介</label>
            <textarea id="introduction" name="introduction" placeholder="请输入圈子简介" maxlength="100"></textarea>
            <div class="hint">最多100个字符</div>
            <div class="error-tip" id="introductionError"></div>
        </div>

        <div class="upload-section">
            <label>圈子图片</label>
            <div class="upload-area">
                <input type="file" id="circleImgInput" accept="image/*">
                <button type="button" class="upload-btn" onclick="document.getElementById('circleImgInput').click()">选择图片</button>
                <img id="circleImgPreview" class="preview-img" style="display: none;">
                <span id="circleImgStatus" class="img-hint">支持 JPG、PNG 格式</span>
            </div>
        </div>

        <div class="form-group">
            <label for="payAccount">收款账户</label>
            <input type="text" id="payAccount" name="pay_account" placeholder="请输入收款账户">
            <div class="hint">用于接收付款的账户信息</div>
        </div>

        <div class="error-tip" id="formError"></div>
        <div class="success-tip" id="successTip">圈子创建成功！</div>

        <button type="button" class="btn" id="submitBtn">创建圈子</button>
    </form>
    <a href="/" class="back-link">取消并返回首页</a>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    var circleImgUrl = '';
    var payAccountValue = '';

    setupImageUpload({
        inputId: 'circleImgInput',
        previewId: 'circleImgPreview',
        statusId: 'circleImgStatus',
        type: 4,
        onSuccess: function(url) { circleImgUrl = url; }
    });

    async function handleCircleSubmit() {
        const form = document.getElementById('addCircleForm');
        const submitBtn = document.getElementById('submitBtn');
        const successTip = document.getElementById('successTip');

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        function hideError(elementId) {
            const el = document.getElementById(elementId);
            el.textContent = '';
            el.classList.remove('show');
        }

        function hideAllErrors() {
            ['titleError', 'priceError', 'introductionError', 'formError'].forEach(hideError);
        }

        hideAllErrors();
        successTip.classList.remove('show');

        const title = document.getElementById('title').value.trim();
        const price = document.getElementById('price').value;
        const introduction = document.getElementById('introduction').value.trim();

        if (!title) { showError('titleError', '请输入圈子名称'); return; }
        if (!price || parseInt(price) < 0) { showError('priceError', '请输入有效的价格'); return; }
        if (parseInt(price) > 10000) { showError('priceError', '价格不能超过10000元'); return; }
        if (!introduction) { showError('introductionError', '请输入圈子简介'); return; }

        const payAccount = document.getElementById('payAccount').value.trim();
        payAccountValue = payAccount;

        submitBtn.disabled = true;
        submitBtn.textContent = '创建中...';

        const formData = new FormData();
        formData.append('title', title);
        formData.append('price', price);
        formData.append('introduction', introduction);

        if (circleImgUrl) formData.append('circleImg', circleImgUrl);
        if (payAccountValue) formData.append('pay_account', payAccountValue);

        try {
            const response = await axios.post('/api/circle/add', formData);

            if (response.data.code === 0) {
                const cid = (response.data.data && response.data.data.cid) || response.data.cid;
                if (cid) {
                    window.location.href = '/page/circle/detail?cid=' + cid;
                } else {
                    showError('formError', '创建成功但缺少圈子ID');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '创建圈子';
                }
            } else {
                showError('formError', response.data.msg || '创建失败');
                submitBtn.disabled = false;
                submitBtn.textContent = '创建圈子';
            }
        } catch (error) {
            console.error('错误:', error);
            showError('formError', '网络错误');
            submitBtn.disabled = false;
            submitBtn.textContent = '创建圈子';
        }
    }

    document.getElementById('submitBtn').addEventListener('click', function(e) {
        e.preventDefault();
        handleCircleSubmit();
    });
</script>
{{end}}
