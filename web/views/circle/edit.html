{{template "index_layout_head" .}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
        .edit-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .edit-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-group .hint {
            color: #909399;
            font-size: 12px;
            margin-top: 6px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #67c23a;
            font-size: 14px;
            margin-top: 6px;
            display: none;
            text-align: center;
        }
        .success-tip.show {
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        .upload-section {
            margin-bottom: 20px;
        }
        .upload-section label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-btn {
            padding: 10px 20px;
            background: #f5f7fa;
            border: 1px dashed #dcdfe6;
            border-radius: 6px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }
        .upload-btn:hover {
            border-color: #667eea;
        }
        .preview-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid #dcdfe6;
        }
        .img-hint {
            color: #909399;
            font-size: 12px;
        }
    </style>
{{end}}

<div class="container">
    <div class="edit-card">
        <h2>修改圈子</h2>
        <div id="loadingTip" class="loading">加载中...</div>
        <form id="editCircleForm" style="display: none;">
            <input type="hidden" id="cid" name="cid">
            <div class="form-group">
                <label for="title">圈子名称</label>
                <input type="text" id="title" name="title" placeholder="请输入圈子名称" maxlength="100">
                <div class="hint">最多100个字符</div>
                <div class="error-tip" id="titleError"></div>
            </div>
            <div class="form-group">
                <label for="price">圈子价格（元）</label>
                <input type="number" id="price" name="price" placeholder="请输入圈子价格" min="0" max="10000">
                <div class="hint">价格范围：0 - 10000元</div>
                <div class="error-tip" id="priceError"></div>
            </div>
            <div class="form-group">
                <label for="introduction">圈子简介</label>
                <textarea id="introduction" name="introduction" placeholder="请输入圈子简介" maxlength="100"></textarea>
                <div class="hint">最多100个字符</div>
                <div class="error-tip" id="introductionError"></div>
            </div>
            <div class="upload-section">
                <label>圈子图片</label>
                <div class="upload-area">
                    <input type="file" id="circleImgInput" accept="image/*">
                    <button type="button" class="upload-btn" onclick="document.getElementById('circleImgInput').click()">选择图片</button>
                    <img id="circleImgPreview" class="preview-img" style="display: none;">
                    <span id="circleImgStatus" class="img-hint">支持 JPG、PNG 格式</span>
                </div>
            </div>
            <div class="form-group">
                <label for="payAccount">收款账户</label>
                <input type="text" id="payAccount" name="pay_account" placeholder="请输入收款账户">
                <div class="hint">用于接收付款的账户信息</div>
            </div>
            <button type="button" class="btn" id="submitBtn" onclick="submitForm()">保存修改</button>
            <div class="success-tip" id="successTip"></div>
        </form>
        <div class="error-tip" id="pageError"></div>
    </div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('cid');
        var circleImgUrl = '';
        setupImageUpload({
            inputId: 'circleImgInput',
            previewId: 'circleImgPreview',
            statusId: 'circleImgStatus',
            type: 4,
            onSuccess: function(url) { circleImgUrl = url; }
        });

        if (!cid) {
            document.getElementById('loadingTip').style.display = 'none';
            document.getElementById('pageError').textContent = '缺少圈子ID参数';
            document.getElementById('pageError').classList.add('show');
        } else {
            loadCircleData();
        }

        async function loadCircleData() {
            try {
                const response = await axios.get('/api/circle/get', {
                    params: { cid: cid }
                });

                if (response.data.code === 0 && response.data.data) {
                    const circle = response.data.data.circle;
                    document.getElementById('cid').value = circle.id;
                    document.getElementById('title').value = circle.title || '';
                    document.getElementById('price').value = circle.price || 0;
                    document.getElementById('introduction').value = circle.introduction || '';
                    if (circle.img) {
                        circleImgUrl = circle.img;
                        document.getElementById('circleImgPreview').src = circle.img;
                        document.getElementById('circleImgPreview').style.display = 'block';
                    }
                    if (circle.payAccount) {
                        document.getElementById('payAccount').value = circle.payAccount;
                    }
                    document.getElementById('loadingTip').style.display = 'none';
                    document.getElementById('editCircleForm').style.display = 'block';
                } else {
                    document.getElementById('loadingTip').style.display = 'none';
                    document.getElementById('pageError').textContent = response.data.msg || '圈子不存在';
                    document.getElementById('pageError').classList.add('show');
                }
            } catch (error) {
                document.getElementById('loadingTip').style.display = 'none';
                document.getElementById('pageError').textContent = '加载失败，请稍后重试';
                document.getElementById('pageError').classList.add('show');
            }
        }

        function hideAllErrors() {
            document.getElementById('titleError').classList.remove('show');
            document.getElementById('priceError').classList.remove('show');
            document.getElementById('introductionError').classList.remove('show');
            document.getElementById('successTip').classList.remove('show');
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }

        function validateForm() {
            hideAllErrors();
            let isValid = true;

            const title = document.getElementById('title').value.trim();
            if (!title) { showError('titleError', '请输入圈子名称'); isValid = false; }
            else if (title.length > 100) { showError('titleError', '圈子名称最多100个字符'); isValid = false; }

            const price = document.getElementById('price').value;
            if (price === '' || isNaN(parseInt(price))) { showError('priceError', '请输入有效的价格'); isValid = false; }
            else if (parseInt(price) < 0 || parseInt(price) > 10000) { showError('priceError', '价格范围：0 - 10000元'); isValid = false; }

            const introduction = document.getElementById('introduction').value.trim();
            if (!introduction) { showError('introductionError', '请输入圈子简介'); isValid = false; }
            else if (introduction.length > 100) { showError('introductionError', '圈子简介最多100个字符'); isValid = false; }

            return isValid;
        }

        async function submitForm() {
            if (!validateForm()) return;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                const formData = new FormData();
                formData.append('cid', document.getElementById('cid').value);
                formData.append('title', document.getElementById('title').value.trim());
                formData.append('price', document.getElementById('price').value);
                formData.append('introduction', document.getElementById('introduction').value.trim());

                if (circleImgUrl) formData.append('circleImg', circleImgUrl);

                const payAccount = document.getElementById('payAccount').value.trim();
                if (payAccount) formData.append('pay_account', payAccount);

                const response = await axios.post('/api/circle/update', formData);

                if (response.data.code === 0) {
                    document.getElementById('successTip').textContent = '修改成功！';
                    document.getElementById('successTip').classList.add('show');
                    setTimeout(() => {
                        window.location.href = '/page/circle/detail?cid=' + cid;
                    }, 1500);
                } else {
                    document.getElementById('pageError').textContent = response.data.msg || '修改失败';
                    document.getElementById('pageError').classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '保存修改';
                }
            } catch (error) {
                document.getElementById('pageError').textContent = '提交失败，请稍后重试';
                document.getElementById('pageError').classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = '保存修改';
            }
        }
    </script>
{{end}}
