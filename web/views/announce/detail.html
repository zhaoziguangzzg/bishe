{{template "index_layout_head" .}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
    .detail-container {
        max-width: 90%;
        margin: 0 auto;
    }
    .detail-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .detail-title {
        font-size: 24px;
        font-weight: 600;
        color: #333;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
        text-align: center;
    }
    .detail-info {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-bottom: 24px;
        color: #909399;
        font-size: 14px;
    }
    .detail-content {
        font-size: 16px;
        line-height: 1.8;
        color: #606266;
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #909399;
        font-size: 16px;
    }
    .error-tip {
        text-align: center;
        padding: 60px 20px;
        color: #f56c6c;
        font-size: 16px;
    }
</style>
{{end}}

<div class="detail-container">
    <div class="detail-card">
        <div id="content" class="loading">加载中...</div>
    </div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    function getQueryParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    function formatTime(time) {
        if (!time) return '';
        var d = new Date(time);
        var pad = function(n) { return (n < 10 ? '0' : '') + n; };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    async function loadAnnounceDetail() {
        var announceId = getQueryParam('id');
        var contentDiv = document.getElementById('content');

        if (!announceId) {
            contentDiv.className = 'error-tip';
            contentDiv.textContent = '缺少公告ID参数';
            return;
        }

        try {
            var response = await axios.get('/api/announce/get', {
                params: { announce_id: announceId }
            });

            if (response.data.code === 0 && response.data.data && response.data.data.announce) {
                var announce = response.data.data.announce;
                contentDiv.className = '';
                contentDiv.innerHTML = '' +
                    '<h1 class="detail-title">' + (announce.title || '') + '</h1>' +
                    '<div class="detail-info">' +
                        '<span>创建时间: ' + formatTime(announce.createAt) + '</span>' +
                    '</div>' +
                    '<div class="detail-content">' + (announce.content || '') + '</div>';
            } else {
                contentDiv.className = 'error-tip';
                contentDiv.textContent = response.data.msg || '公告不存在';
            }
        } catch (error) {
            console.error('加载公告详情失败', error);
            contentDiv.className = 'error-tip';
            contentDiv.textContent = '加载失败，请稍后重试';
        }
    }

    loadAnnounceDetail();
</script>
{{end}}
