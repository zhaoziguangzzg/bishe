<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改公告 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .edit-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .edit-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-tip {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #52c41a;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
        .loading-state {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/page/admin/index">← 返回后台管理</a>
        <span>修改公告</span>
        <div></div>
    </div>

    <div class="container">
        <div class="edit-card" id="editCard">
            <div class="loading-state">加载中...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const announceId = urlParams.get('id');

        async function loadAnnounceDetail() {
            const editCard = document.getElementById('editCard');

            if (!announceId) {
                editCard.innerHTML = '<div class="error-tip show">缺少公告ID参数</div>';
                return;
            }

            try {
                const response = await axios.get('/api/announce/get', {
                    params: { announce_id: announceId }
                });

                if (response.data.code === 0 && response.data.data) {
                    renderForm(response.data.data.announce);
                } else {
                    editCard.innerHTML = '<div class="error-tip show">加载失败: ' + (response.data.message || '未知错误') + '</div>';
                }
            } catch (error) {
                console.error('加载公告详情失败', error);
                editCard.innerHTML = '<div class="error-tip show">网络错误，请稍后重试</div>';
            }
        }

        function renderForm(announce) {
            const editCard = document.getElementById('editCard');

            if (!announce) {
                editCard.innerHTML = '<div class="error-tip show">公告信息不存在</div>';
                return;
            }

            const startTime = announce.startTime ? formatDateTime(announce.startTime) : '';
            const endTime = announce.endTime ? formatDateTime(announce.endTime) : '';

            editCard.innerHTML = `
                <h2>修改公告</h2>
                <form id="editForm">
                    <div class="form-group">
                        <label>公告标题</label>
                        <input id="title" type="text" value="${escapeHtml(announce.title || '')}" placeholder="请输入公告标题"/>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>开始时间</label>
                            <input id="startTime" type="datetime-local" value="${startTime}"/>
                        </div>
                        <div class="form-group">
                            <label>结束时间</label>
                            <input id="endTime" type="datetime-local" value="${endTime}"/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>公告内容</label>
                        <textarea id="content" placeholder="请输入公告内容">${escapeHtml(announce.content || '')}</textarea>
                    </div>

                    <p id="errorMsg" class="error-tip"></p>
                    <p id="successMsg" class="success-tip"></p>

                    <button type="submit" id="saveBtn" class="btn">保存修改</button>
                </form>
            `;

            document.getElementById('editForm').addEventListener('submit', handleSubmit);
        }

        async function handleSubmit(e) {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const startTimeStr = document.getElementById('startTime').value;
            const endTimeStr = document.getElementById('endTime').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const saveBtn = document.getElementById('saveBtn');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (!title) {
                errorMsg.textContent = '公告标题不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!content) {
                errorMsg.textContent = '公告内容不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!startTimeStr || !endTimeStr) {
                errorMsg.textContent = '开始时间和结束时间不能为空';
                errorMsg.classList.add('show');
                return;
            }

            const startTime = formatDateTimeForSubmit(startTimeStr);
            const endTime = formatDateTimeForSubmit(endTimeStr);

            if (new Date(startTime) >= new Date(endTime)) {
                errorMsg.textContent = '结束时间必须晚于开始时间';
                errorMsg.classList.add('show');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            const formData = new URLSearchParams();
            formData.append('announce_id', announceId);
            formData.append('title', title);
            formData.append('content', content);
            formData.append('start_time', startTime);
            formData.append('end_time', endTime);

            try {
                const response = await axios.post('/api/announce/update', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                if (response.data.code === 0) {
                    successMsg.textContent = '修改成功';
                    successMsg.classList.add('show');
                    setTimeout(function() {
                        window.location.href = '/page/admin/index';
                    }, 1500);
                } else {
                    errorMsg.textContent = response.data.message || '修改失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存修改';
            }
        }

        function formatDateTime(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDateTimeForSubmit(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        loadAnnounceDetail();
    </script>
</body>
</html>
