{{template "index_layout_head" .}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
    .announce-list-container {
        max-width: 90%;
        margin: 0 auto;
    }
    .page-title {
        font-size: 24px;
        font-weight: 600;
        color: #333;
        margin-bottom: 24px;
        text-align: center;
    }
    .announce-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        cursor: pointer;
        transition: all 0.3s;
    }
    .announce-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .announce-title {
        font-size: 18px;
        font-weight: 600;
        color: #333;
        margin-bottom: 12px;
    }
    .announce-content {
        font-size: 14px;
        color: #606266;
        line-height: 1.6;
        margin-bottom: 12px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .announce-time {
        font-size: 12px;
        color: #909399;
    }
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #909399;
        font-size: 16px;
    }
    .empty {
        text-align: center;
        padding: 60px 20px;
        color: #909399;
        font-size: 16px;
    }
</style>
{{end}}

<div class="announce-list-container">
    <h1 class="page-title">公告列表</h1>
    <div id="announceList">
        <div class="loading">加载中...</div>
    </div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    function formatTime(time) {
        if (!time) return '';
        var d = new Date(time);
        var pad = function(n) { return (n < 10 ? '0' : '') + n; };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function truncateContent(content, maxLength) {
        maxLength = maxLength || 100;
        if (!content) return '';
        if (content.length <= maxLength) return content;
        return content.substring(0, maxLength) + '...';
    }

    async function loadAnnounces() {
        var listDiv = document.getElementById('announceList');

        try {
            var response = await axios.get('/api/announce/all?page=1&pagesize=100');
            
            if (response.data.code === 0 && response.data.data && response.data.data.announces) {
                var announces = response.data.data.announces;
                
                if (!announces || announces.length === 0) {
                    listDiv.innerHTML = '<div class="empty">暂无公告</div>';
                    return;
                }

                listDiv.innerHTML = announces.map(function(announce) {
                    return '<div class="announce-card" onclick="viewAnnounce(' + announce.id + ')">' +
                        '<div class="announce-title">' + (announce.title || '') + '</div>' +
                        '<div class="announce-content">' + truncateContent(announce.content) + '</div>' +
                        '<div class="announce-time">' + formatTime(announce.createAt) + '</div>' +
                    '</div>';
                }).join('');
            } else {
                listDiv.innerHTML = '<div class="empty">加载失败</div>';
            }
        } catch (error) {
            console.error('Load announces error:', error);
            listDiv.innerHTML = '<div class="empty">加载失败，请稍后重试</div>';
        }
    }

    function viewAnnounce(id) {
        window.location.href = '/page/announce/detail?id=' + id;
    }

    loadAnnounces();
</script>
{{end}}
