<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告列表 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .header a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .header span {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
        }
        .announce-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
        }
        .announce-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .announce-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        .announce-content {
            font-size: 14px;
            color: #606266;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .announce-time {
            font-size: 12px;
            color: #909399;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
            font-size: 16px;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()">← 返回</a>
        <span>公告列表</span>
        <a href="/">首页</a>
    </div>

    <div class="container">
        <h1 class="page-title">公告列表</h1>
        <div id="announceList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        function formatTime(time) {
            if (!time) return '';
            return time;
        }

        function truncateContent(content, maxLength = 100) {
            if (!content) return '';
            if (content.length <= maxLength) return content;
            return content.substring(0, maxLength) + '...';
        }

        async function loadAnnounces() {
            const listDiv = document.getElementById('announceList');

            try {
                const response = await axios.get('/api/announce/all?page=1&pagesize=100');
                
                if (response.data.code === 0 && response.data.data && response.data.data.announces) {
                    const announces = response.data.data.announces;
                    
                    if (!announces || announces.length === 0) {
                        listDiv.innerHTML = '<div class="empty">暂无公告</div>';
                        return;
                    }

                    listDiv.innerHTML = announces.map(announce => `
                        <div class="announce-card" onclick="viewAnnounce(${announce.id})">
                            <div class="announce-title">${announce.title || ''}</div>
                            <div class="announce-content">${truncateContent(announce.content)}</div>
                            <div class="announce-time">
                                ${formatTime(announce.startTime)} - ${formatTime(announce.endTime)}
                            </div>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<div class="empty">加载失败</div>';
                }
            } catch (error) {
                console.error('Load announces error:', error);
                listDiv.innerHTML = '<div class="empty">加载失败，请稍后重试</div>';
            }
        }

        function viewAnnounce(id) {
            window.location.href = '/page/announce/detail?id=' + id;
        }

        loadAnnounces();
    </script>
</body>
</html>
