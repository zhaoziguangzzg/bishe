{{template "index_layout_head" .}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
    .page-title {
        font-size: 20px;
        color: #333;
        margin-bottom: 20px;
    }
    .filter-bar {
        background: white;
        border-radius: 12px 12px 0 0;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        padding: 12px 20px;
        display: flex;
        align-items: center;
    }
    .filter-bar label {
        font-size: 13px;
        color: #666;
        margin-right: 8px;
        white-space: nowrap;
    }
    .filter-bar select {
        height: 34px;
        padding: 0 12px;
        font-size: 13px;
        color: #333;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        background: white;
        cursor: pointer;
        outline: none;
        min-width: 140px;
        transition: border-color 0.3s;
    }
    .filter-bar select:hover {
        border-color: #667eea;
    }
    .filter-bar select:focus {
        border-color: #667eea;
    }
    .notice-list {
        background: white;
        border-radius: 0 0 12px 12px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .notice-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.2s;
        cursor: pointer;
    }
    .notice-item:last-child {
        border-bottom: none;
    }
    .notice-item:hover {
        background: #f8f9fa;
    }
    .notice-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        margin-right: 12px;
        flex-shrink: 0;
    }
    .notice-icon.follow {
        background: #ecf5ff;
        color: #409eff;
    }
    .notice-icon.like {
        background: #fef0f0;
        color: #f56c6c;
    }
    .notice-icon.comment {
        background: #f0f9eb;
        color: #67c23a;
    }
    .notice-icon.accusation {
        background: #fdf6ec;
        color: #e6a23c;
    }
    .notice-icon.feedback {
        background: #f4f4f5;
        color: #909399;
    }
    .notice-icon.dispatch {
        background: #ecf5ff;
        color: #409eff;
    }
    .notice-icon.other {
        background: #f4f4f5;
        color: #909399;
    }
    .notice-info {
        flex: 1;
        min-width: 0;
    }
    .notice-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
    }
    .notice-type {
        font-size: 15px;
        color: #333;
        font-weight: 500;
    }
    .notice-time {
        font-size: 12px;
        color: #909399;
    }
    .notice-content {
        font-size: 13px;
        color: #666;
        line-height: 1.4;
    }
    .empty-tip {
        text-align: center;
        padding: 60px 20px;
        color: #909399;
        font-size: 14px;
    }
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #667eea;
    }
    .error-tip {
        text-align: center;
        padding: 60px 20px;
        color: #f56c6c;
    }
</style>
{{end}}

<h1 class="page-title">我的通知</h1>
<div class="filter-bar">
    <label>通知类型：</label>
    <select id="typeSelect">
    </select>
</div>
<div class="notice-list" id="noticeList">
    <div class="loading">加载中...</div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    let typeNameList = [];

    (async function init() {
        await loadNoticeList();
    })();

    document.getElementById('typeSelect').addEventListener('change', async function() {
        await loadNoticeList();
    });

    async function loadNoticeList() {
        document.getElementById('noticeList').innerHTML = '<div class="loading">加载中...</div>';

        const currentType = parseInt(document.getElementById('typeSelect').value);

        try {
            const params = currentType === -1 ? {} : { type: currentType };
            const response = await axios.get('/api/notice/all', { params });
            if (response.data.code === 0 && response.data.data) {
                if (typeNameList.length === 0 && response.data.data.typeNameList) {
                    typeNameList = response.data.data.typeNameList;
                    populateTypeSelect();
                }
                renderNoticeList(response.data.data.notices || []);
            } else {
                document.getElementById('noticeList').innerHTML = '<div class="error-tip">加载失败</div>';
            }
        } catch (error) {
            document.getElementById('noticeList').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
        }
    }

    function populateTypeSelect() {
        const select = document.getElementById('typeSelect');
        typeNameList.forEach(item => {
            const option = document.createElement('option');
            option.value = item.type;
            option.textContent = item.name;
            select.appendChild(option);
        });
    }

    function renderNoticeList(notices) {
        if (notices.length === 0) {
            document.getElementById('noticeList').innerHTML = '<div class="empty-tip">暂无通知</div>';
            return;
        }

        const html = notices.map(notice => {
            const typeInfo = getNoticeTypeInfo(notice.type);
            const updateAt = notice.updateAt ? formatTime(notice.updateAt) : '';

            return `
                <div class="notice-item" onclick="goToNoticeDetail(${JSON.stringify(notice).replace(/"/g, '&quot;')})">
                    <div class="notice-icon ${typeInfo.className}">
                        ${typeInfo.icon}
                    </div>
                    <div class="notice-info">
                        <div class="notice-header">
                            <span class="notice-type">${typeInfo.name}</span>
                            <span class="notice-time">${updateAt}</span>
                        </div>
                        <div class="notice-content">${convertUrlToLink(escapeHtml(notice.content || ''))}</div>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('noticeList').innerHTML = html;
    }

    function goToNoticeDetail(notice) {
        if (notice.url && notice.url.trim() !== '') {
            window.location.href = notice.url;
            return;
        }
        const params = new URLSearchParams({
            content: notice.content || '',
            type: notice.type || 0,
            updateAt: notice.updateAt || ''
        });
        window.location.href = `/page/notice/detail?${params.toString()}`;
    }

    function getNoticeTypeInfo(type) {
        const typeMap = {
            0: { name: '系统通知', icon: '&#9997;', className: 'other' },
            1: { name: '关注', icon: '&#10084;', className: 'follow' },
            2: { name: '点赞', icon: '&#9829;', className: 'like' },
            3: { name: '评论', icon: '&#59194;', className: 'comment' },
            4: { name: '举报结果', icon: '&#9888;', className: 'accusation' },
            5: { name: '反馈回复', icon: '&#59197;', className: 'feedback' },
            6: { name: '关注发文', icon: '&#128276;', className: 'dispatch' },
            7: { name: '加精', icon: '&#11088;', className: 'other' },
            8: { name: '加入圈子', icon: '&#128309;', className: 'follow' },
            9: { name: '被举报', icon: '&#9888;', className: 'accusation' }
        };
        return typeMap[type] || typeMap[0];
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function convertUrlToLink(text) {
        if (!text) return '';
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, '<a href="$1" style="color: #409eff; text-decoration: underline;" target="_blank">$1</a>');
    }

    function formatTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;

        if (diff < 60000) {
            return '刚刚';
        } else if (diff < 3600000) {
            return Math.floor(diff / 60000) + '分钟前';
        } else if (diff < 86400000) {
            return Math.floor(diff / 3600000) + '小时前';
        } else if (diff < 604800000) {
            return Math.floor(diff / 86400000) + '天前';
        } else {
            return date.toLocaleDateString();
        }
    }
</script>
{{end}}
