<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈列表 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
        }
        .sidebar-header {
            text-align: center;
            padding: 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 14px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-left: 3px solid white;
        }
        .submenu {
            display: none;
            background: rgba(0,0,0,0.1);
        }
        .submenu.show {
            display: block;
        }
        .submenu-item {
            padding: 12px 24px 12px 48px;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            font-size: 13px;
            text-decoration: none;
        }
        .submenu-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .submenu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid white;
        }
        .arrow {
            font-size: 10px;
            transition: transform 0.3s;
        }
        .menu-item:hover .arrow, .menu-item.active .arrow {
            transform: rotate(180deg);
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #e64545;
        }
        .content-area {
            padding: 24px 32px;
        }
        .tool-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tool-bar h2 {
            font-size: 18px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: white;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .tab {
            flex: 1;
            padding: 12px 24px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            color: #606266;
            transition: all 0.3s;
        }
        .tab:hover {
            color: #667eea;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .table-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            text-align: left;
            padding: 14px 16px;
            background: #f9fafb;
            color: #606266;
            font-size: 14px;
            font-weight: 500;
        }
        .table td {
            padding: 14px 16px;
            color: #606266;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .table tr:hover {
            background: #f5f7fa;
        }
        .reply-col, .reply-cell {
            display: none;
        }
        .reply-col.show, .reply-cell.show {
            display: table-cell;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending {
            background: #fdf6ec;
            color: #e6a23c;
        }
        .status-replied {
            background: #f0f9eb;
            color: #67c23a;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-detail {
            padding: 6px 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-detail:hover {
            background: #66b1ff;
        }
        .btn-reply {
            padding: 6px 12px;
            background: #67c23a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-reply:hover {
            background: #85ce61;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
    </style>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
            <p>知识分享平台</p>
        </div>
        <div id="dynamic-menus"></div>
    </div>

    <script>
        let currentPath = window.location.pathname;
        let userMenuIds = [];
        
        async function loadDynamicMenus() {
            try {
                const [menuResponse, userResponse] = await Promise.all([
                    axios.get('/api/adminmenu/all'),
                    axios.get('/api/adminuser/get')
                ]);
                
                if (menuResponse.data.code === 0 && userResponse.data.code === 0) {
                    const menus = menuResponse.data.data.menus || [];
                    userMenuIds = userResponse.data.data.menuIds || [];
                    renderDynamicMenus(menus);
                    checkPermissions();
                }
            } catch (error) {
                console.error('加载菜单失败', error);
            }
        }
        
        function renderDynamicMenus(menus) {
            const container = document.getElementById('dynamic-menus');
            const menuConfig = {
                '反馈列表': { url: '/page/adminfeedback/list', group: 'feedback' },
                '公告列表': { url: '/page/adminannounce/list', group: 'notice' },
                '新增公告': { url: '/page/adminannounce/add', group: 'notice' },
                '广告列表': { url: '/page/adminadvert/list', group: 'ad' },
                '新增广告': { url: '/page/adminadvert/add', group: 'ad' },
                '权限列表': { url: '/page/adminmenu/list', group: 'permission' },
                '新增权限': { url: '/page/adminmenu/add', group: 'permission' },
                '角色列表': { url: '/page/adminrole/list', group: 'role' },
                '新增角色': { url: '/page/adminrole/add', group: 'role' },
                '管理员列表': { url: '/page/adminuser/list', group: 'adminuser' },
                '新增管理员': { url: '/page/adminuser/add', group: 'adminuser' },
                '举报列表': { url: '/page/adminaccusation/list', group: 'accusation' }
            };
            
            const groups = {};
            menus.forEach(function(menu) {
                if (menu.isDeleted === 1) return;
                const config = menuConfig[menu.menuName];
                if (!config) return;
                
                if (!groups[config.group]) {
                    groups[config.group] = [];
                }
                groups[config.group].push({
                    id: menu.id,
                    name: menu.menuName,
                    url: config.url
                });
            });
            
            let html = '<a href="/page/admin/index" class="menu-item">首页</a>';
            for (const groupKey in groups) {
                const groupMenus = groups[groupKey];
                const hasPermission = userMenuIds.length === 0 || groupMenus.some(item => userMenuIds.includes(item.id));
                if (!hasPermission && userMenuIds.length > 0) continue;
                
                const firstItem = groupMenus.find(item => userMenuIds.length === 0 || userMenuIds.includes(item.id));
                if (!firstItem) continue;
                
                const groupNames = {
                    'feedback': '反馈',
                    'notice': '公告',
                    'ad': '广告',
                    'permission': '权限管理',
                    'role': '角色管理',
                    'adminuser': '管理员管理',
                    'accusation': '举报管理'
                };
                
                const groupIcons = {
                    'feedback': '💬',
                    'notice': '📢',
                    'ad': '📺',
                    'permission': '🔐',
                    'role': '👥',
                    'adminuser': '👤',
                    'accusation': '🚨'
                };
                
                html += `
                    <div class="menu-item" onclick="toggleSubmenu('${groupKey}')">
                        <span class="icon">${groupIcons[groupKey]}</span>
                        <span>${groupNames[groupKey]}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="submenu" id="submenu-${groupKey}">
                `;
                
                groupMenus.forEach(function(item) {
                    const hasItemPermission = userMenuIds.length === 0 || userMenuIds.includes(item.id);
                    if (!hasItemPermission && userMenuIds.length > 0) return;
                    
                    const active = currentPath === item.url ? 'active' : '';
                    html += `<a href="${item.url}" class="submenu-item ${active}">${item.name}</a>`;
                });
                
                html += '</div>';
            }
            
            container.innerHTML = html;
        }
        
        function toggleSubmenu(groupKey) {
            const submenu = document.getElementById('submenu-' + groupKey);
            if (submenu) {
                const isShow = submenu.classList.contains('show');
                document.querySelectorAll('.submenu').forEach(s => s.classList.remove('show'));
                if (!isShow) {
                    submenu.classList.add('show');
                }
            }
        }
        
        function checkPermissions() {
            const currentPage = currentPath.split('/').pop();
            if (currentPage === 'list') {
                const addBtn = document.querySelector('.add-btn');
                if (addBtn) {
                    const addPagePath = currentPath.replace('list', 'add');
                    const hasAddPermission = userMenuIds.length === 0 || 
                        document.querySelector(`a[href="${addPagePath}"]`) !== null;
                    if (!hasAddPermission && userMenuIds.length > 0) {
                        addBtn.style.display = 'none';
                    }
                }
            }
        }
        
        loadDynamicMenus();
    </script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
            <p>知识分享平台</p>
        </div>
        <div id="dynamic-menus"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>反馈列表</h1>
            <div class="user-info">
                <a href="/api/adminuser/logout" class="logout-btn">退出登录</a>
            </div>
        </div>

        <div class="content-area">
            <div class="tool-bar">
                <h2>反馈管理</h2>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab(0)">未处理</div>
                <div class="tab" onclick="switchTab(1)">已处理</div>
            </div>

            <div class="table-card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户ID</th>
                            <th>反馈内容</th>
                            <th>反馈时间</th>
                            <th class="reply-col">回复内容</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody">
                        <tr>
                            <td colspan="7" class="empty-tip">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function getStatusText(status) {
            switch(status) {
                case 0: return '待回复';
                case 1: return '已回复';
                default: return '未知';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 0: return 'status-pending';
                case 1: return 'status-replied';
                default: return '';
            }
        }

        function formatTime(time) {
            if (!time) return '-';
            return time;
        }

        function truncateContent(content, maxLength = 30) {
            if (!content) return '-';
            if (content.length <= maxLength) return content;
            return content.substring(0, maxLength) + '...';
        }

        let currentStatus = 0;

        function switchTab(status) {
            currentStatus = status;
            document.querySelectorAll('.tab').forEach((tab, index) => {
                tab.classList.toggle('active', index === status);
            });
            const replyCol = document.querySelector('.reply-col');
            if (replyCol) {
                replyCol.classList.toggle('show', status === 1);
            }
            loadFeedbacks();
        }

        async function loadFeedbacks() {
            try {
                const response = await axios.get(`/api/adminfeedback/all?status=${currentStatus}&page=1&pagesize=1000`);
                if (response.data.code === 0) {
                    const feedbacks = response.data.data.feedbacks || [];
                    const tbody = document.getElementById('feedbackTableBody');
                    
                    if (!feedbacks || feedbacks.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" class="empty-tip">暂无数据</td></tr>';
                        return;
                    }

                    const replyColClass = currentStatus === 1 ? 'reply-cell show' : 'reply-cell';
                    tbody.innerHTML = feedbacks.map(feedback => `
                        <tr>
                            <td>${feedback.id}</td>
                            <td>${feedback.userId}</td>
                            <td title="${feedback.content || ''}">${truncateContent(feedback.content)}</td>
                            <td>${formatTime(feedback.feedbackTime)}</td>
                            <td class="${replyColClass}" title="${feedback.reply || ''}">${truncateContent(feedback.reply, 20)}</td>
                            <td><span class="status-badge ${getStatusClass(feedback.feedbackStatus)}">${getStatusText(feedback.feedbackStatus)}</span></td>
                            <td>
                                <div class="action-btns">
                                    ${feedback.feedbackStatus === 0 
                                        ? `<button class="btn-reply" onclick="replyFeedback(${feedback.id})">回复</button>` 
                                        : `<button class="btn-detail" onclick="viewDetail(${feedback.id})">查看</button>`}
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('feedbackTableBody').innerHTML = 
                    '<tr><td colspan="7" class="empty-tip">加载失败</td></tr>';
            }
        }

        function viewDetail(id) {
            alert('查看反馈详情功能开发中，反馈ID: ' + id);
        }

        function replyFeedback(id) {
            window.location.href = `/page/adminfeedback/edit?id=${id}`;
        }

        loadFeedbacks();
    </script>
</body>
</html>
