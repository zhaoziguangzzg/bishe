{{define "admin_layout_extra_head"}}
<style>
    .tool-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .tool-bar h2 {
        font-size: 18px;
        color: #333;
    }
    .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        background: white;
        border-radius: 8px;
        padding: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab {
        flex: 1;
        padding: 12px 24px;
        text-align: center;
        cursor: pointer;
        border-radius: 6px;
        font-size: 14px;
        color: #606266;
        transition: all 0.3s;
    }
    .tab:hover {
        color: #667eea;
    }
    .tab.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .table-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .table {
        width: 100%;
        border-collapse: collapse;
    }
    .table th {
        text-align: left;
        padding: 14px 16px;
        background: #f9fafb;
        color: #606266;
        font-size: 14px;
        font-weight: 500;
    }
    .table td {
        padding: 14px 16px;
        color: #606266;
        font-size: 14px;
        border-bottom: 1px solid #eee;
    }
    .table tr:hover {
        background: #f5f7fa;
    }
    .reply-col, .reply-cell {
        display: none;
    }
    .reply-col.show, .reply-cell.show {
        display: table-cell;
    }
    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
    }
    .status-pending {
        background: #fdf6ec;
        color: #e6a23c;
    }
    .status-replied {
        background: #f0f9eb;
        color: #67c23a;
    }
    .action-btns {
        display: flex;
        gap: 8px;
    }
    .btn-detail {
        padding: 6px 12px;
        background: #409eff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-detail:hover {
        background: #66b1ff;
    }
    .btn-reply {
        padding: 6px 12px;
        background: #67c23a;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-reply:hover {
        background: #85ce61;
    }
    .empty-tip {
        text-align: center;
        padding: 40px;
        color: #909399;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    function getStatusText(status) {
        switch(status) {
            case 0: return '待回复';
            case 1: return '已回复';
            default: return '未知';
        }
    }

    function getStatusClass(status) {
        switch(status) {
            case 0: return 'status-pending';
            case 1: return 'status-replied';
            default: return '';
        }
    }

    function formatTime(time) {
        if (!time) return '-';
        return time;
    }

    function truncateContent(content, maxLength = 30) {
        if (!content) return '-';
        if (content.length <= maxLength) return content;
        return content.substring(0, maxLength) + '...';
    }

    let currentStatus = 0;

    function switchTab(status) {
        currentStatus = status;
        document.querySelectorAll('.tab').forEach((tab, index) => {
            tab.classList.toggle('active', index === status);
        });
        const replyCol = document.querySelector('.reply-col');
        if (replyCol) {
            replyCol.classList.toggle('show', status === 1);
        }
        loadFeedbacks();
    }

    async function loadFeedbacks() {
        try {
            const response = await axios.get(`/api/adminfeedback/all?status=${currentStatus}&page=1&pagesize=1000`);
            if (response.data.code === 0) {
                const feedbacks = response.data.data.feedbacks || [];
                const tbody = document.getElementById('feedbackTableBody');
                
                if (!feedbacks || feedbacks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-tip">暂无数据</td></tr>';
                    return;
                }

                const replyColClass = currentStatus === 1 ? 'reply-cell show' : 'reply-cell';
                tbody.innerHTML = feedbacks.map(feedback => `
                    <tr>
                        <td>${feedback.id}</td>
                        <td>${feedback.userId}</td>
                        <td title="${feedback.content || ''}">${truncateContent(feedback.content)}</td>
                        <td>${formatTime(feedback.feedbackTime)}</td>
                        <td class="${replyColClass}" title="${feedback.reply || ''}">${truncateContent(feedback.reply, 20)}</td>
                        <td><span class="status-badge ${getStatusClass(feedback.feedbackStatus)}">${getStatusText(feedback.feedbackStatus)}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-reply" onclick="replyFeedback(${feedback.id})">回复</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('feedbackTableBody').innerHTML = 
                '<tr><td colspan="7" class="empty-tip">加载失败</td></tr>';
        }
    }

    function replyFeedback(id) {
        window.location.href = `/page/adminfeedback/edit?id=${id}`;
    }

    loadFeedbacks();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="tool-bar">
    <h2>反馈管理</h2>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">未处理</div>
    <div class="tab" onclick="switchTab(1)">已处理</div>
</div>

<div class="table-card">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>用户ID</th>
                <th>反馈内容</th>
                <th>反馈时间</th>
                <th class="reply-col">回复内容</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="feedbackTableBody">
            <tr>
                <td colspan="7" class="empty-tip">加载中...</td>
            </tr>
        </tbody>
    </table>
</div>

{{template "admin_layout_body_end" .}}
