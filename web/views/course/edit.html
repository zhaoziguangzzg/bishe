{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<style>
    .page-title {
        font-size: 24px;
        color: #333;
        margin-bottom: 30px;
    }
    .card {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 40px auto;
    }
    .form-group {
        margin-bottom: 24px;
    }
    .form-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
    }
    .form-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-input:focus {
        border-color: #667eea;
    }
    .form-textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
        resize: vertical;
        min-height: 120px;
        font-family: inherit;
    }
    .form-textarea:focus {
        border-color: #667eea;
    }
    .form-hint {
        font-size: 12px;
        color: #909399;
        margin-top: 6px;
    }
    .btn-group {
        display: flex;
        gap: 12px;
        margin-top: 30px;
    }
    .btn {
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        transition: all 0.3s;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .btn-primary:hover {
        opacity: 0.9;
    }
    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
    }
    .btn-secondary:hover {
        background: #eef0f4;
    }
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #909399;
    }
    .error-tip {
        text-align: center;
        padding: 60px 20px;
        color: #f56c6c;
    }
    .success-tip {
        text-align: center;
        padding: 20px;
        color: #67c23a;
        background: #f0f9eb;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    .upload-section {
        margin-bottom: 24px;
    }
    .upload-section label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
    }
    .upload-area {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
    }
    .upload-area input[type="file"] {
        display: none;
    }
    .upload-btn {
        padding: 10px 20px;
        background: #f5f7fa;
        border: 1px dashed #dcdfe6;
        border-radius: 6px;
        color: #667eea;
        cursor: pointer;
        font-size: 14px;
    }
    .upload-btn:hover {
        border-color: #667eea;
    }
    .preview-img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 8px;
        border: 1px solid #dcdfe6;
    }
    .img-hint {
        color: #909399;
        font-size: 12px;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

<h1 class="page-title">编辑课程</h1>
<div class="card" id="editForm">
    <div class="loading">加载课程信息...</div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cid = urlParams.get('course_id');
    let courseData = null;
    var courseImgUrl = '';
    var payAccountValue = '';

    if (!cid) {
        document.getElementById('editForm').innerHTML = '<div class="error-tip">缺少课程ID参数</div>';
    } else {
        loadCourseDetail();
    }

    async function loadCourseDetail() {
        try {
            const response = await axios.get('/api/course/get', {
                params: { course_id: cid }
            });

            if (response.data.code === 0 && response.data.data) {
                courseData = response.data.data;
                renderForm(courseData);
            } else {
                document.getElementById('editForm').innerHTML = '<div class="error-tip">加载失败</div>';
            }
        } catch (error) {
            document.getElementById('editForm').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
        }
    }

    function renderForm(data) {
        const course = data.course || {};
        const title = course.title || '';
        const content = course.content || '';
        const img = course.img || '';
        const payAccount = course.payAccount || '';

        if (img) courseImgUrl = img;
        if (payAccount) payAccountValue = payAccount;

        document.getElementById('editForm').innerHTML = `
            <div class="success-tip" id="successMsg" style="display: none;"></div>
            <div class="form-group">
                <label class="form-label">课程标题</label>
                <input type="text" class="form-input" id="courseTitle" value="${escapeHtml(title)}" maxlength="100" placeholder="请输入课程标题">
            </div>
            <div class="form-group">
                <label class="form-label">课程简介</label>
                <textarea class="form-textarea" id="courseDescription" maxlength="1000" placeholder="请输入课程简介">${escapeHtml(content)}</textarea>
                <div class="form-hint">建议填写课程适用人群、学习目标等内容，让更多人了解您的课程</div>
            </div>
            <div class="upload-section">
                <label>课程图片</label>
                <div class="upload-area">
                    <input type="file" id="courseImgInput" accept="image/*">
                    <button type="button" class="upload-btn" onclick="document.getElementById('courseImgInput').click()">选择图片</button>
                    <img id="courseImgPreview" class="preview-img" src="${escapeHtml(img)}" style="${img ? '' : 'display: none;'}">
                    <span id="courseImgStatus" class="img-hint">支持 JPG、PNG 格式</span>
                </div>
            </div>
            <div class="form-group">
                <label for="payAccount">收款账户</label>
                <input type="text" class="form-input" id="payAccount" value="${escapeHtml(payAccount)}" placeholder="请输入收款账户">
                <div class="form-hint">用于接收付款的账户信息</div>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveCourse()">保存修改</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='/page/course/detail?course_id=${cid}'">取消</button>
            </div>
        `;

        setupImageUpload({
            inputId: 'courseImgInput',
            previewId: 'courseImgPreview',
            statusId: 'courseImgStatus',
            type: 5,
            onSuccess: function(url) { courseImgUrl = url; }
        });

    }

    async function saveCourse() {
        const title = document.getElementById('courseTitle').value.trim();
        const description = document.getElementById('courseDescription').value.trim();

        if (!title) { alert('请输入课程标题'); return; }
        if (!description) { alert('请输入课程简介'); return; }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        try {
            const formData = new FormData();
            formData.append('course_id', cid);
            formData.append('title', title);
            formData.append('content', description);
            formData.append('price', '0');

            if (courseImgUrl) formData.append('img', courseImgUrl);

            const payAccount = document.getElementById('payAccount').value.trim();
            if (payAccount) formData.append('pay_account', payAccount);

            const response = await axios.post('/api/course/update', formData);

            if (response.data.code === 0) {
                showSuccess('保存成功！');
                setTimeout(() => {
                    window.location.href = '/page/course/detail?course_id=' + cid;
                }, 1500);
            } else {
                alert(response.data.msg || '保存失败');
            }
        } catch (error) {
            alert('保存失败，请稍后重试');
        }

        saveBtn.disabled = false;
        saveBtn.textContent = '保存修改';
    }

    function showSuccess(msg) {
        const msgEl = document.getElementById('successMsg');
        msgEl.textContent = msg;
        msgEl.style.display = 'block';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
{{end}}
