{{template "index_layout_head" .}}

{{define "index_layout_extra_head"}}
<style>
    .add-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin: 40px auto;
    }
    .add-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input:focus {
        border-color: #667eea;
    }
    .form-group textarea {
        width: 100%;
        min-height: 200px;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        resize: vertical;
        transition: border-color 0.3s;
    }
    .form-group textarea:focus {
        border-color: #667eea;
    }
    .form-group .hint {
        color: #909399;
        font-size: 12px;
        margin-top: 6px;
    }
    .btn {
        display: inline-block;
        padding: 12px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        margin-right: 12px;
    }
    .btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    .btn-secondary {
        background: #909399;
    }
    .btn-secondary:hover {
        background: #82848a;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 14px;
        margin-bottom: 16px;
        padding: 12px;
        background: #fef0f0;
        border-radius: 6px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #67c23a;
        font-size: 14px;
        margin-bottom: 16px;
        padding: 12px;
        background: #f0f9eb;
        border-radius: 6px;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
    .upload-section {
        margin-bottom: 20px;
    }
    .upload-section label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .upload-area {
        display: flex;
        align-items: center;
        gap: 16px;
    }
    .upload-area input[type="file"] {
        display: none;
    }
    .upload-btn {
        padding: 10px 20px;
        background: #f5f7fa;
        border: 1px dashed #dcdfe6;
        border-radius: 6px;
        color: #667eea;
        cursor: pointer;
        font-size: 14px;
    }
    .upload-btn:hover {
        border-color: #667eea;
    }
    .preview-img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 8px;
        border: 1px solid #dcdfe6;
    }
    .img-hint {
        color: #909399;
        font-size: 12px;
    }
</style>
{{end}}

{{template "index_layout_body_start" .}}

<div class="add-card">
    <h2>添加课程</h2>
    <div class="error-tip" id="errorTip"></div>
    <div class="success-tip" id="successTip"></div>

    <form id="courseForm">
        <div class="form-group">
            <label>课程标题</label>
            <input type="text" id="title" name="title" placeholder="请输入课程标题" maxlength="100" required>
            <div class="hint">最多 100 个字符</div>
        </div>

        <div class="form-group">
            <label>课程简介</label>
            <textarea id="content" name="content" placeholder="请输入课程简介" required></textarea>
            <div class="hint">最多 100 个字符</div>
        </div>

        <div class="form-group">
            <label>课程价格（元）</label>
            <input type="number" id="price" name="price" placeholder="请输入课程价格" min="0" max="10000" required>
            <div class="hint">0 表示免费课程，最高 10000 元</div>
        </div>

        <div class="upload-section">
            <label>课程图片</label>
            <div class="upload-area">
                <input type="file" id="courseImgInput" accept="image/*">
                <button type="button" class="upload-btn" onclick="document.getElementById('courseImgInput').click()">选择图片</button>
                <img id="courseImgPreview" class="preview-img" style="display: none;">
                <span id="courseImgStatus" class="img-hint">支持 JPG、PNG 格式</span>
            </div>
        </div>

        <div class="form-group">
            <label for="payAccount">收款账户</label>
            <input type="text" id="payAccount" name="pay_account" placeholder="请输入收款账户">
            <div class="hint">用于接收付款的账户信息</div>
        </div>

        <button type="button" class="btn" onclick="submitCourse()">提交</button>
        <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
    </form>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    var courseImgUrl = '';
    var payAccountValue = '';

    setupImageUpload({
        inputId: 'courseImgInput',
        previewId: 'courseImgPreview',
        statusId: 'courseImgStatus',
        type: 5,
        onSuccess: function(url) { courseImgUrl = url; }
    });

    function showError(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        errorTip.textContent = message;
        errorTip.classList.add('show');
        successTip.classList.remove('show');
    }

    function showSuccess(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        successTip.textContent = message;
        successTip.classList.add('show');
        errorTip.classList.remove('show');
    }

    async function submitCourse() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        const price = document.getElementById('price').value.trim();

        if (!title) { showError('请输入课程标题'); return; }
        if (!content) { showError('请输入课程简介'); return; }
        if (!price) { showError('请输入课程价格'); return; }

        const priceNum = parseInt(price);
        if (isNaN(priceNum) || priceNum < 0 || priceNum > 10000) {
            showError('课程价格必须在 0-10000 之间');
            return;
        }

        const btn = document.querySelector('.btn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            formData.append('price', priceNum.toString());

            if (courseImgUrl) formData.append('img', courseImgUrl);

            const payAccount = document.getElementById('payAccount').value.trim();
            if (payAccount) formData.append('pay_account', payAccount);

            const response = await axios.post('/api/course/add', formData);

            if (response.data.code === 0) {
                showSuccess('添加成功！');
                const courseId = response.data.data.course.id;
                setTimeout(() => {
                    window.location.href = '/page/course/detail?course_id=' + courseId;
                }, 1500);
            } else {
                showError(response.data.msg || '添加失败');
                btn.disabled = false;
                btn.textContent = '提交';
            }
        } catch (error) {
            showError('操作失败，请稍后重试');
            btn.disabled = false;
            btn.textContent = '提交';
        }
    }

    function goBack() {
        window.location.href = '/page/course/index';
    }
</script>
{{end}}
