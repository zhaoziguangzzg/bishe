{{define "admin_layout_extra_head"}}
<style>
    .add-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .add-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input:focus {
        border-color: #667eea;
    }
    .form-group .hint {
        color: #909399;
        font-size: 12px;
        margin-top: 6px;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
        margin-top: 10px;
    }
    .btn-secondary:hover {
        background: #ebeef5;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #67c23a;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const menuId = urlParams.get('menu_id');

    if (!menuId) {
        alert('缺少菜单ID参数');
        window.location.href = '/page/adminmenu/list';
    }

    document.getElementById('menu_id').value = menuId;

    async function loadMenu() {
        try {
            const response = await axios.get('/api/adminmenu/all');
            if (response.data.code === 0) {
                const menus = response.data.data.menus;
                const menu = menus.find(m => m.id == menuId);
                if (menu) {
                    document.getElementById('menu_name').value = menu.menuName;
                    document.getElementById('menu_path').value = menu.path;
                } else {
                    showError('菜单不存在');
                }
            }
        } catch (error) {
            console.error('Error:', error);
            showError('加载菜单信息失败');
        }
    }

    loadMenu();

    function showError(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        errorTip.textContent = message;
        errorTip.classList.add('show');
        successTip.classList.remove('show');
    }

    function showSuccess(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        successTip.textContent = message;
        successTip.classList.add('show');
        errorTip.classList.remove('show');
    }

    async function submitMenu() {
        const menuName = document.getElementById('menu_name').value.trim();
        const menuPath = document.getElementById('menu_path').value.trim();

        if (!menuName) {
            showError('请输入菜单名称');
            return;
        }

        if (!menuPath) {
            showError('请输入菜单路径');
            return;
        }

        const btn = document.querySelector('.btn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const formData = new FormData();
            formData.append('menu_id', menuId);
            formData.append('menu_name', menuName);
            formData.append('menu_path', menuPath);

            const response = await axios.post('/api/adminmenu/update', formData);

            if (response.data.code === 0) {
                showSuccess('修改成功！');
                setTimeout(() => {
                    window.location.href = '/page/adminmenu/list';
                }, 1500);
            } else {
                showError(response.data.msg || '修改失败');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('请求失败，请稍后重试');
        } finally {
            btn.disabled = false;
            btn.textContent = '提交';
        }
    }

    function goBack() {
        window.location.href = '/page/adminmenu/list';
    }
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="add-card">
    <h2>修改菜单</h2>
    <div class="error-tip" id="errorTip"></div>
    <div class="success-tip" id="successTip"></div>

    <form id="menuForm">
        <input type="hidden" id="menu_id" name="menu_id">
        
        <div class="form-group">
            <label>菜单名称</label>
            <input type="text" id="menu_name" name="menu_name" placeholder="请输入菜单名称" maxlength="100" required>
            <div class="hint">最多100个字符</div>
        </div>

        <div class="form-group">
            <label>菜单路径</label>
            <input type="text" id="menu_path" name="menu_path" placeholder="请输入菜单路径" maxlength="200" required>
            <div class="hint">例如：/page/circle/index</div>
        </div>

        <button type="button" class="btn" onclick="submitMenu()">提交</button>
        <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
    </form>
</div>

{{template "admin_layout_body_end" .}}
