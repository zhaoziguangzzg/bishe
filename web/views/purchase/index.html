{{template "index_layout_head" .}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
    .purchase-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .section-title {
        font-size: 18px;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 2px solid #667eea;
    }
    .purchase-table {
        width: 100%;
        border-collapse: collapse;
    }
    .purchase-table th {
        background: #f8f9fa;
        padding: 12px 16px;
        text-align: left;
        font-size: 14px;
        color: #666;
        font-weight: 600;
    }
    .purchase-table td {
        padding: 12px 16px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 14px;
        color: #333;
    }
    .purchase-table tr:hover {
        background: #fafafa;
    }
    .course-link {
        color: #667eea;
        cursor: pointer;
        text-decoration: none;
    }
    .course-link:hover {
        text-decoration: underline;
    }
    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
    }
    .status-badge.paid {
        background: #e8f5e9;
        color: #4caf50;
    }
    .status-badge.unpaid {
        background: #fff3e0;
        color: #ff9800;
    }
    .status-badge.canceled {
        background: #ffebee;
        color: #f44336;
    }
    .status-badge.expired {
        background: #e3f2fd;
        color: #2196f3;
    }
    .status-badge.refund {
        background: #f3e5f5;
        color: #9c27b0;
    }
    .empty-tip {
        text-align: center;
        padding: 60px 20px;
        color: #999;
        font-size: 14px;
    }
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal.show {
        display: flex;
    }
    .modal-content {
        background: white;
        border-radius: 12px;
        padding: 24px;
        max-width: 400px;
        text-align: center;
    }
    .modal-content h3 {
        margin-bottom: 16px;
        color: #333;
    }
    .modal-content img {
        max-width: 100%;
        border-radius: 8px;
        margin-bottom: 16px;
    }
    .modal-btns {
        display: flex;
        gap: 12px;
        justify-content: center;
    }
    .modal-btns .btn {
        padding: 14px 40px;
        font-size: 16px;
    }
    .modal-btns .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .modal-btns .btn-primary:hover {
        opacity: 0.9;
    }
    .modal-btns .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
    }
    .modal-btns .btn-secondary:hover {
        background: #ebeef5;
    }
    .btn {
        padding: 4px 12px;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-pay {
        color: #07c160;
        border: 1px solid #07c160;
        background: white;
    }
    .btn-pay:hover {
        background: #e8f5e9;
    }
    .btn-cancel {
        color: #f56c6c;
        border: 1px solid #f56c6c;
        background: white;
        margin-left: 4px;
    }
    .btn-cancel:hover {
        background: #ffebee;
    }
    .price {
        color: #f44336;
        font-weight: 600;
    }
</style>
{{end}}

<div class="purchase-card">
    <h2 class="section-title">📖 我的购买</h2>
    <div id="purchaseContent">
        <div class="empty-tip">加载中...</div>
    </div>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script src="/js/pay-qrcode.js"></script>
<script>
    const purchaseStatusMap = {
        0: { text: '待支付', class: 'unpaid' },
        1: { text: '已支付', class: 'paid' },
        2: { text: '已取消', class: 'canceled' },
        3: { text: '已过期', class: 'expired' },
        4: { text: '已退款', class: 'refund' }
    };

    function goToCourse(courseId) {
        window.location.href = '/page/course/detail?course_id=' + courseId;
    }

    function goPay(purchaseId, courseId, price) {
        PayQRCode.open({
            existingOrder: { orderId: purchaseId, getQrcode: '/api/purchase/qrcode', qrcodeParam: 'purchase_id' },
            poll: {
                url: '/api/purchase/get-by-id',
                getParams: function(orderId) { return { purchase_id: orderId }; },
                isPaid: function(data) { return data.purchase && data.purchase.purchaseStatus === 1; }
            },
            price: price,
            modalTitle: '扫码支付课程',
            onSuccess: function() {
                loadPurchases();
            }
        });
    }

    async function cancelPurchase(purchaseId) {
        if (!confirm('确认取消该订单？')) return;

        try {
            var formData = new FormData();
            formData.append('purchase_id', purchaseId);

            var response = await axios.post('/api/purchase/cancel', formData);
            if (response.data.code === 0) {
                loadPurchases();
            } else {
                alert(response.data.msg || '取消失败');
            }
        } catch (error) {
            alert('网络错误，请稍后重试');
        }
    }

    async function loadPurchases() {
        const container = document.getElementById('purchaseContent');

        try {
            container.innerHTML = '<div class="empty-tip">加载中...</div>';

            const response = await axios.get('/api/purchase/all');

            if (response.data.code === 0) {
                const data = response.data.data;
                const purchaseCourses = data.purchaseCourses || [];

                if (purchaseCourses.length === 0) {
                    container.innerHTML = '<div class="empty-tip">暂无购买记录</div>';
                    return;
                }

                let html = `
            <table class="purchase-table">
                <thead>
                    <tr>
                        <th>购买ID</th>
                        <th>课程名称</th>
                        <th>金额</th>
                        <th>购买时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
        `;

                purchaseCourses.forEach(item => {
                    const course = item.course;
                    const purchase = item.purchase;
                    if (!course) return;

                    const statusInfo = purchaseStatusMap[purchase.purchaseStatus] || { text: '未知', class: '' };
                    const purchaseTime = purchase.createAt || '-';
                    const price = course.price || 0;

                    let actionHtml = '-';
                    if (purchase.purchaseStatus === 0) {
                        actionHtml = `<button class="btn btn-pay" onclick="goPay(${purchase.id}, ${course.id}, ${price})">支付</button>
                            <button class="btn btn-cancel" onclick="cancelPurchase(${purchase.id})">取消</button>`;
                    }

                    html += `
                    <tr>
                        <td>${purchase.id}</td>
                        <td><span class="course-link" onclick="goToCourse(${course.id})">${escapeHtml(course.title)}</span></td>
                        <td class="price">¥${(price / 100).toFixed(2)}</td>
                        <td>${purchaseTime}</td>
                        <td><span class="status-badge ${statusInfo.class}">${statusInfo.text}</span></td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
                });

                html += '</tbody></table>';

                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="empty-tip">加载失败: ' + (response.data.msg || '未知错误') + '</div>';
            }
        } catch (error) {
            container.innerHTML = '<div class="empty-tip">加载失败，请稍后重试</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadPurchases();
    });
</script>
{{end}}
