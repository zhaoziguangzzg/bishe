{{define "admin_layout_extra_head"}}
<style>
    .tool-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .tool-bar h2 {
        font-size: 18px;
        color: #333;
    }
    .add-btn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: opacity 0.3s;
        text-decoration: none;
    }
    .add-btn:hover {
        opacity: 0.9;
    }
    .table-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .table {
        width: 100%;
        border-collapse: collapse;
    }
    .table th {
        text-align: left;
        padding: 14px 16px;
        background: #f9fafb;
        color: #606266;
        font-size: 14px;
        font-weight: 500;
    }
    .table td {
        padding: 14px 16px;
        color: #606266;
        font-size: 14px;
        border-bottom: 1px solid #eee;
        text-align: left;
    }
    .table tr:hover {
        background: #f5f7fa;
    }
    .action-btns {
        display: flex;
        gap: 8px;
    }
    .btn-edit {
        padding: 6px 12px;
        background: #409eff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-edit:hover {
        background: #66b1ff;
    }
    .btn-delete {
        padding: 6px 12px;
        background: #f56c6c;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
    }
    .btn-delete:hover {
        background: #f78989;
    }
    .empty-tip {
        text-align: center;
        padding: 40px;
        color: #909399;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    let allRoles = [];

    async function loadRoles() {
        try {
            const response = await axios.get('/api/adminrole/all?page=1&pagesize=1000');
            if (response.data.code === 0) {
                allRoles = response.data.data.roles || [];
            }
        } catch (error) {
            console.error('Error loading roles:', error);
        }
    }

    function getRoleName(roleId) {
        if (!roleId) return '-';
        const role = allRoles.find(r => r.id == roleId);
        return role ? role.roleName : '-';
    }

    async function loadUsers() {
        try {
            const response = await axios.get('/api/adminuser/all?page=1&pagesize=1000');
            if (response.data.code === 0) {
                const users = response.data.data.users;
                const tbody = document.getElementById('userTableBody');
                
                if (!users || users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-tip">暂无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${getRoleName(user.roleId)}</td>
                        <td>${user.createAt || '-'}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-edit" onclick="editUser(${user.id})">修改角色</button>
                                <button class="btn-delete" onclick="deleteUser(${user.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('userTableBody').innerHTML = 
                '<tr><td colspan="5" class="empty-tip">加载失败</td></tr>';
        }
    }

    function editUser(id) {
        window.location.href = `/page/adminuser/role?id=${id}`;
    }

    async function deleteUser(id) {
        if (!confirm('确定要删除该管理员吗？')) {
            return;
        }

        try {
            const formData = new FormData();
            formData.append('id', id);

            const response = await axios.post('/api/adminuser/delete', formData);
            if (response.data.code === 0) {
                alert('删除成功');
                loadUsers();
            } else {
                alert(response.data.msg || '删除失败');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('请求失败，请稍后重试');
        }
    }

    async function init() {
        await loadRoles();
        loadUsers();
    }

    init();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="tool-bar">
    <h2>管理员管理</h2>
    <a href="/page/adminuser/add" class="add-btn">添加管理员</a>
</div>

<div class="table-card">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>用户名</th>
                <th>角色</th>
                <th>创建时间</th>
                <th style="width: 200px;">操作</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <tr>
                <td colspan="5" class="empty-tip">加载中...</td>
            </tr>
        </tbody>
    </table>
</div>

{{template "admin_layout_body_end" .}}
