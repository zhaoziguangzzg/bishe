{{define "admin_layout_extra_head"}}
<style>
    .edit-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .edit-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input:focus {
        border-color: #667eea;
    }
    .permission-checkbox {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        padding: 12px;
    }
    .permission-item {
        margin-bottom: 12px;
    }
    .permission-item label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-weight: normal;
    }
    .permission-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
        margin-top: 10px;
    }
    .btn-secondary:hover {
        background: #ebeef5;
    }
    .error-tip {
        color: #ff4d4f;
        font-size: 13px;
        margin-top: 8px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #52c41a;
        font-size: 14px;
        margin-top: 16px;
        text-align: center;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
    .loading-state {
        text-align: center;
        padding: 40px;
        color: #909399;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roleId = urlParams.get('id');
    let currentRole = null;

    if (!roleId) {
        alert('缺少角色ID参数');
        window.location.href = '/page/adminrole/list';
    }

    async function loadRoleDetail() {
        try {
            const response = await axios.get('/api/adminrole/get', { params: { role_id: roleId } });
            if (response.data.code === 0) {
                currentRole = response.data.data.role;
                document.getElementById('roleName').value = currentRole.roleName || '';
                const menus = response.data.data.menus || [];
                const menuMap = response.data.data.menuMap || {};
                renderPermissionCheckboxes(menus, menuMap);
            } else {
                showError(response.data.message || '获取角色信息失败');
            }
        } catch (error) {
            showError('网络错误，请稍后重试');
        }
    }

    function renderPermissionCheckboxes(menus, menuMap) {
        const container = document.getElementById('permissionCheckboxes');
        if (!menus || menus.length === 0) {
            container.innerHTML = '<div class="loading-state">暂无权限</div>';
            return;
        }
        const activeMenus = menus.filter(m => m.isDeleted === 0);
        if (activeMenus.length === 0) {
            container.innerHTML = '<div class="loading-state">暂无权限</div>';
            return;
        }
        let html = '';
        activeMenus.forEach(menu => {
            const checked = menuMap[menu.id] ? 'checked' : '';
            html += `
                <div class="permission-item">
                    <label>
                        <input type="checkbox" name="permission" value="${menu.id}" ${checked}/>
                        <span>${menu.menuName || '--'}</span>
                        <span style="color: #909399; font-size: 12px;">(${menu.path || '--'})</span>
                    </label>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    async function submitUpdateRole() {
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');

        const roleName = document.getElementById('roleName').value.trim();
        if (!roleName) {
            showError('请输入角色名称');
            return;
        }

        const checkboxes = document.querySelectorAll('input[name="permission"]:checked');
        if (checkboxes.length === 0) {
            showError('请至少选择一个权限');
            return;
        }

        const mids = Array.from(checkboxes).map(cb => parseInt(cb.value));
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = '保存中...';

        try {
            const formData = new FormData();
            formData.append('role_id', roleId);
            formData.append('role_name', roleName);
            mids.forEach(mid => formData.append('mids', mid));

            const response = await axios.post('/api/adminrole/update', formData);
            if (response.data.code === 0) {
                successMsg.textContent = '更新成功';
                successMsg.classList.add('show');
                setTimeout(() => { window.location.href = '/page/adminrole/list'; }, 1500);
            } else {
                showError(response.data.message || '更新失败');
            }
        } catch (error) {
            showError('网络错误，请稍后重试');
        } finally {
            btn.disabled = false;
            btn.textContent = '保存修改';
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
    }

    function goBack() {
        window.location.href = '/page/adminrole/list';
    }

    loadRoleDetail();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="edit-card">
    <h2>编辑角色权限</h2>

    <div class="form-group">
        <label>角色名称</label>
        <input id="roleName" type="text" placeholder="请输入角色名称"/>
    </div>

    <div class="form-group">
        <label>选择权限</label>
        <div id="permissionCheckboxes" class="permission-checkbox">
            <div class="loading-state">加载中...</div>
        </div>
    </div>

    <p id="errorMsg" class="error-tip"></p>
    <p id="successMsg" class="success-tip"></p>

    <button type="button" id="saveBtn" class="btn" onclick="submitUpdateRole()">保存修改</button>
    <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
</div>

{{template "admin_layout_body_end" .}}
