{{define "admin_layout_extra_head"}}
<style>
    .detail-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .detail-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
        padding-bottom: 12px;
        border-bottom: 1px solid #eee;
    }
    .info-row {
        display: flex;
        padding: 16px 0;
        border-bottom: 1px solid #f5f7fa;
    }
    .info-row:last-child {
        border-bottom: none;
    }
    .info-label {
        width: 120px;
        color: #909399;
        font-size: 14px;
        flex-shrink: 0;
    }
    .info-value {
        flex: 1;
        color: #333;
        font-size: 14px;
        word-break: break-all;
    }
    .menu-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
    .menu-tag {
        display: inline-block;
        padding: 6px 12px;
        background: #f0f2f5;
        color: #666;
        border-radius: 4px;
        font-size: 13px;
    }
    .btn {
        display: inline-block;
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        margin-top: 20px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
        margin-top: 10px;
    }
    .btn-secondary:hover {
        background: #ebeef5;
    }
    .loading-tip {
        text-align: center;
        padding: 60px;
        color: #909399;
    }
    .error-tip {
        text-align: center;
        padding: 60px;
        color: #f56c6c;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roleId = urlParams.get('role_id');

    if (!roleId) {
        document.getElementById('content').innerHTML = '<div class="error-tip">缺少角色ID参数</div>';
    }

    let allMenus = [];

    async function loadMenus() {
        try {
            const response = await axios.get('/api/adminmenu/all');
            if (response.data.code === 0) {
                allMenus = response.data.data.menus || [];
            }
        } catch (error) {
            console.error('Error loading menus:', error);
        }
    }

    function getMenuNames(midsStr) {
        if (!midsStr) return '-';
        const mids = midsStr.split('_');
        const names = mids.map(id => {
            const menu = allMenus.find(m => m.id == id);
            return menu ? menu.menuName : '';
        }).filter(n => n);
        
        if (names.length === 0) return '-';
        
        return '<div class="menu-list">' + names.map(name => 
            `<span class="menu-tag">${name}</span>`
        ).join('') + '</div>';
    }

    async function loadRoleDetail() {
        try {
            const response = await axios.get('/api/adminrole/get', {
                params: { role_id: roleId }
            });

            if (response.data.code === 0) {
                const role = response.data.data.role;
                if (!role) {
                    document.getElementById('content').innerHTML = '<div class="error-tip">角色不存在</div>';
                    return;
                }

                document.getElementById('content').innerHTML = `
                    <div class="info-row">
                        <div class="info-label">角色ID</div>
                        <div class="info-value">${role.id}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">角色名称</div>
                        <div class="info-value">${role.roleName || '-'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">权限菜单</div>
                        <div class="info-value">${getMenuNames(role.mids)}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">创建时间</div>
                        <div class="info-value">${role.createAt || '-'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">更新时间</div>
                        <div class="info-value">${role.updateAt || '-'}</div>
                    </div>
                `;
                
                document.getElementById('editBtn').href = `/page/adminrole/edit?id=${role.id}`;
                document.getElementById('editBtn').style.display = 'inline-block';
            } else {
                document.getElementById('content').innerHTML = 
                    '<div class="error-tip">' + (response.data.msg || '获取失败') + '</div>';
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('content').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
        }
    }

    function goBack() {
        window.location.href = '/page/adminrole/list';
    }

    async function init() {
        await loadMenus();
        loadRoleDetail();
    }

    init();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="detail-card">
    <h2>角色详情</h2>
    <div id="content">
        <div class="loading-tip">加载中...</div>
    </div>
    <a id="editBtn" href="" class="btn" style="display: none;">编辑</a>
    <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
</div>

{{template "admin_layout_body_end" .}}
