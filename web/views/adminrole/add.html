{{define "admin_layout_extra_head"}}
<style>
    .add-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .add-card h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: #333;
        font-size: 14px;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .form-group input[type="text"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #dcdfe6;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
    }
    .form-group input[type="text"]:focus {
        border-color: #667eea;
    }
    .form-group .hint {
        color: #909399;
        font-size: 12px;
        margin-top: 6px;
    }
    .menu-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 400px;
        overflow-y: auto;
        padding: 12px;
        background: #f9fafb;
        border-radius: 8px;
    }
    .menu-item-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: white;
        border-radius: 6px;
        border: 1px solid #eee;
        cursor: pointer;
        transition: all 0.2s;
    }
    .menu-item-checkbox:hover {
        border-color: #667eea;
    }
    .menu-item-checkbox input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
    .menu-item-checkbox span {
        font-size: 14px;
        color: #333;
    }
    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn:hover {
        opacity: 0.9;
    }
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #f5f7fa;
        color: #666;
        border: 1px solid #dcdfe6;
        margin-top: 10px;
    }
    .btn-secondary:hover {
        background: #ebeef5;
    }
    .error-tip {
        color: #f56c6c;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
    .error-tip.show {
        display: block;
    }
    .success-tip {
        color: #67c23a;
        font-size: 14px;
        text-align: center;
        margin-bottom: 16px;
        display: none;
    }
    .success-tip.show {
        display: block;
    }
</style>
{{end}}

{{define "admin_layout_extra_script"}}
<script>
    let menus = [];

    async function loadMenus() {
        try {
            const response = await axios.get('/api/adminmenu/all');
            if (response.data.code === 0) {
                menus = response.data.data.menus || [];
                renderMenus();
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderMenus() {
        const menuList = document.getElementById('menuList');
        if (!menus || menus.length === 0) {
            menuList.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 20px; color: #909399;">暂无菜单数据</div>';
            return;
        }
        menuList.innerHTML = menus.map(menu => `
            <label class="menu-item-checkbox">
                <input type="checkbox" name="mids" value="${menu.id}">
                <span>${menu.menuName} (${menu.path})</span>
            </label>
        `).join('');
    }

    function showError(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        errorTip.textContent = message;
        errorTip.classList.add('show');
        successTip.classList.remove('show');
    }

    function showSuccess(message) {
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');
        successTip.textContent = message;
        successTip.classList.add('show');
        errorTip.classList.remove('show');
    }

    async function submitRole() {
        const roleName = document.getElementById('role_name').value.trim();
        if (!roleName) {
            showError('请输入角色名称');
            return;
        }

        const checkedMenus = document.querySelectorAll('input[name="mids"]:checked');
        if (checkedMenus.length === 0) {
            showError('请选择至少一个菜单权限');
            return;
        }

        const mids = Array.from(checkedMenus).map(cb => cb.value);
        const btn = document.querySelector('.btn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const formData = new FormData();
            formData.append('role_name', roleName);
            mids.forEach(mid => {
                formData.append('mids', mid);
            });

            const response = await axios.post('/api/adminrole/add', formData);
            if (response.data.code === 0) {
                showSuccess('添加成功！');
                setTimeout(() => {
                    window.location.href = '/page/adminrole/list';
                }, 1500);
            } else {
                showError(response.data.msg || '添加失败');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('请求失败，请稍后重试');
        } finally {
            btn.disabled = false;
            btn.textContent = '提交';
        }
    }

    function goBack() {
        window.location.href = '/page/adminrole/list';
    }

    loadMenus();
</script>
{{end}}

{{template "admin_layout_head" .}}
{{template "admin_layout_body_start" .}}

<div class="add-card">
    <h2>添加角色</h2>
    <div class="error-tip" id="errorTip"></div>
    <div class="success-tip" id="successTip"></div>

    <form id="roleForm">
        <div class="form-group">
            <label>角色名称</label>
            <input type="text" id="role_name" name="role_name" placeholder="请输入角色名称" maxlength="50" required>
            <div class="hint">最多50个字符</div>
        </div>

        <div class="form-group">
            <label>菜单权限</label>
            <div class="menu-list" id="menuList">
                <div style="grid-column: 1 / -1; text-align: center; padding: 20px; color: #909399;">加载中...</div>
            </div>
            <div class="hint">请选择该角色拥有的菜单权限</div>
        </div>

        <button type="button" class="btn" onclick="submitRole()">提交</button>
        <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
    </form>
</div>

{{template "admin_layout_body_end" .}}
