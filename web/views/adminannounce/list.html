<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告列表 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            text-align: center;
            padding: 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 14px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-left: 3px solid white;
        }
        .submenu {
            display: none;
            background: rgba(0,0,0,0.1);
        }
        .submenu.show {
            display: block;
        }
        .submenu-item {
            padding: 12px 24px 12px 48px;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            font-size: 13px;
            text-decoration: none;
        }
        .submenu-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .submenu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid white;
        }
        .arrow {
            font-size: 10px;
            transition: transform 0.3s;
        }
        .menu-item:hover .arrow, .menu-item.active .arrow {
            transform: rotate(180deg);
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #e64545;
        }
        .content-area {
            padding: 24px 32px;
        }
        .tool-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tool-bar h2 {
            font-size: 18px;
            color: #333;
        }
        .add-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
        }
        .add-btn:hover {
            opacity: 0.9;
        }
        .table-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            text-align: left;
            padding: 14px 16px;
            background: #f9fafb;
            color: #606266;
            font-size: 14px;
            font-weight: 500;
        }
        .table td {
            padding: 14px 16px;
            color: #606266;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .table tr:hover {
            background: #f5f7fa;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-delete {
            padding: 6px 12px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background: #f78989;
        }
        .btn-edit {
            padding: 6px 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-edit:hover {
            background: #66b1ff;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
    </style>
    <script>
        let currentPath = window.location.pathname;
        let userMenuIds = [];
        
        async function loadDynamicMenus() {
            try {
                const [menuResponse, userResponse] = await Promise.all([
                    axios.get('/api/adminmenu/all'),
                    axios.get('/api/adminuser/get')
                ]);
                
                if (menuResponse.data.code === 0 && userResponse.data.code === 0) {
                    const menus = menuResponse.data.data.menus || [];
                    userMenuIds = userResponse.data.data.menuIds || [];
                    renderDynamicMenus(menus);
                    checkPermissions();
                }
            } catch (error) {
                console.error('加载菜单失败', error);
            }
        }
        
        function renderDynamicMenus(menus) {
            const container = document.getElementById('dynamic-menus');
            const menuConfig = {
                '反馈列表': { url: '/page/adminfeedback/list', group: 'feedback' },
                '公告列表': { url: '/page/adminannounce/list', group: 'notice' },
                '新增公告': { url: '/page/adminannounce/add', group: 'notice' },
                '广告列表': { url: '/page/adminadvert/list', group: 'ad' },
                '新增广告': { url: '/page/adminadvert/add', group: 'ad' },
                '权限列表': { url: '/page/adminmenu/list', group: 'permission' },
                '新增权限': { url: '/page/adminmenu/add', group: 'permission' },
                '角色列表': { url: '/page/adminrole/list', group: 'role' },
                '新增角色': { url: '/page/adminrole/add', group: 'role' },
                '管理员列表': { url: '/page/adminuser/list', group: 'adminuser' },
                '新增管理员': { url: '/page/adminuser/add', group: 'adminuser' }
            };
            
            const groups = {};
            menus.forEach(function(menu) {
                if (menu.isDeleted === 1) return;
                const config = menuConfig[menu.menuName];
                if (!config) return;
                
                if (!groups[config.group]) {
                    groups[config.group] = [];
                }
                groups[config.group].push({
                    id: menu.id,
                    name: menu.menuName,
                    url: config.url
                });
            });
            
            let html = '<a href="/page/admin/index" class="menu-item">首页</a>';
            for (const groupKey in groups) {
                const groupMenus = groups[groupKey];
                const hasPermission = userMenuIds.length === 0 || groupMenus.some(item => userMenuIds.includes(item.id));
                if (!hasPermission && userMenuIds.length > 0) continue;
                
                const firstItem = groupMenus.find(item => userMenuIds.length === 0 || userMenuIds.includes(item.id));
                if (!firstItem) continue;
                
                const groupNames = {
                    'feedback': '反馈',
                    'notice': '公告',
                    'ad': '广告',
                    'permission': '权限管理',
                    'role': '角色管理',
                    'adminuser': '管理员管理'
                };
                
                const groupIcons = {
                    'feedback': '💬',
                    'notice': '📢',
                    'ad': '📺',
                    'permission': '🔐',
                    'role': '👥',
                    'adminuser': '👤'
                };
                
                html += `
                    <div class="menu-item" onclick="toggleSubmenu('${groupKey}')">
                        <span class="icon">${groupIcons[groupKey]}</span>
                        <span>${groupNames[groupKey]}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="submenu" id="submenu-${groupKey}">
                `;
                
                groupMenus.forEach(function(item) {
                    const hasItemPermission = userMenuIds.length === 0 || userMenuIds.includes(item.id);
                    if (!hasItemPermission && userMenuIds.length > 0) return;
                    
                    const active = currentPath === item.url ? 'active' : '';
                    html += `<a href="${item.url}" class="submenu-item ${active}">${item.name}</a>`;
                });
                
                html += '</div>';
            }
            
            container.innerHTML = html;
        }
        
        function toggleSubmenu(groupKey) {
            const submenu = document.getElementById('submenu-' + groupKey);
            if (submenu) {
                const isShow = submenu.classList.contains('show');
                document.querySelectorAll('.submenu').forEach(s => s.classList.remove('show'));
                if (!isShow) {
                    submenu.classList.add('show');
                }
            }
        }
        
        function checkPermissions() {
            const currentPage = currentPath.split('/').pop();
            if (currentPage === 'list') {
                const addBtn = document.querySelector('.add-btn');
                if (addBtn) {
                    const addPagePath = currentPath.replace('list', 'add');
                    const hasAddPermission = userMenuIds.length === 0 || 
                        document.querySelector(`a[href="${addPagePath}"]`) !== null;
                    if (!hasAddPermission && userMenuIds.length > 0) {
                        addBtn.style.display = 'none';
                    }
                }
            }
        }
        
        loadDynamicMenus();
    </script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
            <p>知识分享平台</p>
        </div>
        <div id="dynamic-menus"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>公告列表</h1>
            <div class="user-info">
                <a href="/api/adminuser/logout" class="logout-btn">退出登录</a>
            </div>
        </div>

        <div class="content-area">
            <div class="tool-bar">
                <h2>公告管理</h2>
                <a href="/page/adminannounce/add" class="add-btn">添加公告</a>
            </div>

            <div class="table-card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标题</th>
                            <th>内容</th>
                            <th>开始时间</th>
                            <th>结束时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="announceTableBody">
                        <tr>
                            <td colspan="6" class="empty-tip">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function formatTime(time) {
            if (!time) return '-';
            return time;
        }

        function truncateContent(content, maxLength = 50) {
            if (!content) return '-';
            if (content.length <= maxLength) return content;
            return content.substring(0, maxLength) + '...';
        }

        async function loadAnnounces() {
            try {
                const response = await axios.get('/api/adminannounce/all?page=1&pagesize=1000');
                if (response.data.code === 0) {
                    const announces = response.data.data.announces || [];
                    const tbody = document.getElementById('announceTableBody');
                    
                    if (!announces || announces.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-tip">暂无数据</td></tr>';
                        return;
                    }

                    tbody.innerHTML = announces.map(announce => `
                        <tr>
                            <td>${announce.id}</td>
                            <td>${announce.title || '-'}</td>
                            <td title="${announce.content || ''}">${truncateContent(announce.content)}</td>
                            <td>${formatTime(announce.startTime)}</td>
                            <td>${formatTime(announce.endTime)}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-edit" onclick="editAnnounce(${announce.id})">修改</button>
                                    <button class="btn-delete" onclick="deleteAnnounce(${announce.id})">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('announceTableBody').innerHTML = 
                    '<tr><td colspan="6" class="empty-tip">加载失败</td></tr>';
            }
        }

        function editAnnounce(id) {
            window.location.href = `/page/adminannounce/edit?id=${id}`;
        }

        async function deleteAnnounce(id) {
            if (!confirm('确定要删除该公告吗？')) {
                return;
            }

            try {
                const formData = new FormData();
                formData.append('id', id);

                const response = await axios.post('/api/adminannounce/delete', formData);
                if (response.data.code === 0) {
                    alert('删除成功');
                    loadAnnounces();
                } else {
                    alert(response.data.msg || '删除失败');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('请求失败，请稍后重试');
            }
        }

        loadAnnounces();
    </script>
</body>
</html>
