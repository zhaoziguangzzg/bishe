{{template "index_layout_head" .}}

{{template "index_layout_body_start" .}}

{{block "index_layout_extra_styles" .}}
<style>
   
    .card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin-bottom: 24px;
    }
    .card-title {
        font-size: 18px;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #eee;
    }
    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }
    .info-item {
        font-size: 14px;
        color: #909399;
    }
    .feedback-status {
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
    }
    .feedback-status.pending {
        background: #fef0f0;
        color: #f56c6c;
    }
    .feedback-status.resolved {
        background: #f0f9eb;
        color: #67c23a;
    }
    .content-section {
        margin-top: 24px;
    }
    .section-label {
        font-size: 14px;
        color: #606266;
        margin-bottom: 8px;
        font-weight: 500;
    }
    .content-box {
        background: #f5f7fa;
        border-radius: 8px;
        padding: 16px;
        font-size: 14px;
        color: #333;
        line-height: 1.6;
    }
    .reply-section {
        margin-top: 24px;
    }
    .reply-box {
        background: #ecf5ff;
        border-radius: 8px;
        padding: 16px;
        font-size: 14px;
        color: #333;
        line-height: 1.6;
    }
    .reply-time {
        font-size: 12px;
        color: #909399;
        margin-top: 8px;
    }
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #667eea;
    }
    .error-tip {
        text-align: center;
        padding: 60px 20px;
        color: #f56c6c;
    }
</style>
{{end}}

<div id="content">
    <div class="loading">加载中...</div>
</div>

<div style="text-align: center; margin-top: 20px;">
    <button onclick="history.back()" style="padding: 10px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer;">返回</button>
</div>

{{template "index_layout_body_end" .}}

{{define "index_layout_extra_scripts"}}
<script>
    const API_BASE = '/api';
    let feedbackId = 0;

    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const date = new Date(timeStr);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hour = String(date.getHours()).padStart(2, '0');
        const minute = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day} ${hour}:${minute}`;
    }

    async function loadFeedbackDetail() {
        const contentDiv = document.getElementById('content');
        feedbackId = getQueryParam('id');

        if (!feedbackId) {
            contentDiv.innerHTML = '<div class="error-tip">缺少反馈ID参数</div>';
            return;
        }

        try {
            const response = await axios.get(`${API_BASE}/feedback/get?id=${feedbackId}`);

            if (response.data.code === 0 && response.data.data) {
                const fb = response.data.data.feedback;
                renderFeedbackDetail(fb);
            } else {
                contentDiv.innerHTML = `<div class="error-tip">加载失败: ${response.data.message || '未知错误'}</div>`;
            }
        } catch (error) {
            contentDiv.innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
        }
    }

    function renderFeedbackDetail(fb) {
        const contentDiv = document.getElementById('content');
        const feedbackTime = fb.feedbackTime ? formatTime(fb.feedbackTime) : '';
        const replyTime = fb.replyTime ? formatTime(fb.replyTime) : '';
        const isPending = fb.feedbackStatus === 0;

        let html = `
            <div class="card">
                <div class="card-title">反馈信息</div>
                <div class="info-row">
                    <span class="info-item">反馈ID：${fb.id}</span>
                    <span class="info-item">反馈时间：${feedbackTime}</span>
                    <span class="feedback-status ${isPending ? 'pending' : 'resolved'}">
                        ${isPending ? '未回复' : '已回复'}
                    </span>
                </div>
                <div class="content-section">
                    <div class="section-label">反馈内容</div>
                    <div class="content-box">${escapeHtml(fb.content)}</div>
                </div>
        `;

        if (fb.reply) {
            html += `
                <div class="reply-section">
                    <div class="section-label">官方回复</div>
                    <div class="reply-box">${escapeHtml(fb.reply)}</div>
                    <div class="reply-time">回复时间：${replyTime}</div>
                </div>
            `;
        }

        html += '</div>';
        contentDiv.innerHTML = html;
    }

    (async function init() {
        await loadFeedbackDetail();
    })();
</script>
{{end}}
