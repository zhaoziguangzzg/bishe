<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意见反馈 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        .form-group textarea:focus {
            border-color: #667eea;
        }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #909399;
            margin-top: 6px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .feedback-list {
            margin-top: 24px;
        }
        .feedback-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 16px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .feedback-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .feedback-time {
            font-size: 13px;
            color: #909399;
        }
        .feedback-status {
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .feedback-status.pending {
            background: #fef0f0;
            color: #f56c6c;
        }
        .feedback-status.resolved {
            background: #f0f9eb;
            color: #67c23a;
        }
        .feedback-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .feedback-reply {
            background: #f5f7fa;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        .feedback-reply-label {
            font-weight: 500;
            color: #667eea;
            margin-bottom: 6px;
        }
        .empty-tip {
            text-align: center;
            padding: 40px 20px;
            color: #909399;
            font-size: 14px;
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #667eea;
        }
        .section-title {
            font-size: 16px;
            color: #333;
            margin: 24px 0 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="#" onclick="goBack()">← 返回</a>
        </div>
        <span>意见反馈</span>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">提交反馈</div>
            <div class="form-group">
                <label>反馈内容</label>
                <textarea id="feedbackContent" placeholder="请输入您的意见或建议..." maxlength="100" oninput="updateCharCount()"></textarea>
                <div class="char-count"><span id="charCount">0</span>/100</div>
            </div>
            <button class="btn" id="submitBtn" onclick="submitFeedback()">提交反馈</button>
        </div>

        <div class="feedback-list" id="feedbackList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentUid = 0;

        function goBack() {
            history.back();
        }

        function updateCharCount() {
            const content = document.getElementById('feedbackContent').value;
            document.getElementById('charCount').textContent = content.length;
        }

        async function submitFeedback() {
            const content = document.getElementById('feedbackContent').value.trim();
            if (!content) {
                alert('请输入反馈内容');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                const formData = new URLSearchParams();
                formData.append('content', content);
                const response = await axios.post(`${API_BASE}/feedback/add`, formData);
                if (response.data.code === 0) {
                    alert('反馈提交成功');
                    document.getElementById('feedbackContent').value = '';
                    updateCharCount();
                    loadMyFeedback();
                } else {
                    alert(response.data.message || '提交失败');
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交反馈';
            }
        }

        async function loadMyFeedback() {
            const feedbackList = document.getElementById('feedbackList');
            feedbackList.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await axios.get(`${API_BASE}/feedback/get-by-uid`);
                console.log('反馈接口返回:', response.data);
                if (response.data.code === 0 && response.data.data) {
                    const feedbacks = response.data.data.feedbacks || [];
                    renderFeedbackList(feedbacks);
                } else {
                    feedbackList.innerHTML = `<div class="empty-tip">加载失败: ${response.data.message || '未知错误'}</div>`;
                }
            } catch (error) {
                console.error('加载反馈失败:', error);
                feedbackList.innerHTML = '<div class="empty-tip">加载失败，请稍后重试</div>';
            }
        }

        function renderFeedbackList(feedbacks) {
            const feedbackList = document.getElementById('feedbackList');

            if (!feedbacks || feedbacks.length === 0) {
                feedbackList.innerHTML = `
                    <h3 class="section-title">我的反馈</h3>
                    <div class="empty-tip">暂无反馈记录</div>
                `;
                return;
            }

            const html = feedbacks.map(fb => {
                const feedbackTime = fb.feedbackTime ? formatTime(fb.feedbackTime) : '';
                const replyTime = fb.replyTime ? formatTime(fb.replyTime) : '';
                const isPending = fb.feedbackStatus === 0;

                return `
                    <div class="feedback-item" onclick="goToFeedbackDetail(${fb.id})">
                        <div class="feedback-header">
                            <span class="feedback-time">${feedbackTime}</span>
                            <span class="feedback-status ${isPending ? 'pending' : 'resolved'}">
                                ${isPending ? '待处理' : '已回复'}
                            </span>
                        </div>
                        <div class="feedback-content">${escapeHtml(fb.content)}</div>
                        ${fb.reply ? `
                            <div class="feedback-reply">
                                <div class="feedback-reply-label">官方回复 ${replyTime}</div>
                                <div>${escapeHtml(fb.reply)}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            feedbackList.innerHTML = `<h3 class="section-title">我的反馈</h3>` + html;
        }

        function goToFeedbackDetail(id) {
            window.location.href = `/page/feedback/detail?id=${id}`;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            const date = new Date(timeStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        (async function init() {
            await loadMyFeedback();
        })();
    </script>
</body>
</html>
