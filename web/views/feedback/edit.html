<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈详情 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .detail-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .detail-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
        }
        .section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .info-item {
            padding: 12px 16px;
            background: #f9fafb;
            border-radius: 6px;
        }
        .info-item .label {
            color: #909399;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .info-item .value {
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .content-box {
            background: #f9fafb;
            border-radius: 6px;
            padding: 16px;
            line-height: 1.8;
            color: #333;
            font-size: 14px;
        }
        .reply-section {
            margin-top: 24px;
        }
        .reply-section textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            outline: none;
            transition: border-color 0.3s;
        }
        .reply-section textarea:focus {
            border-color: #667eea;
        }
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-reply {
            background: #67c23a;
            color: white;
        }
        .btn-back {
            background: #909399;
            color: white;
        }
        .loading-state {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
        .error-state {
            text-align: center;
            padding: 60px;
            color: #f56c6c;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/page/admin/index">← 返回后台管理</a>
        <span>反馈详情</span>
        <div></div>
    </div>

    <div class="container">
        <div class="detail-card" id="detailCard">
            <div class="loading-state">加载中...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const feedbackId = urlParams.get('id');

        async function loadFeedbackDetail() {
            const detailCard = document.getElementById('detailCard');

            if (!feedbackId) {
                detailCard.innerHTML = '<div class="error-state">缺少反馈ID参数</div>';
                return;
            }

            try {
                const response = await axios.get('/api/feedback/get', {
                    params: { id: feedbackId }
                });

                if (response.data.code === 0 && response.data.data) {
                    renderDetail(response.data.data);
                } else {
                    detailCard.innerHTML = '<div class="error-state">加载失败: ' + (response.data.message || '未知错误') + '</div>';
                }
            } catch (error) {
                console.error('加载反馈详情失败', error);
                detailCard.innerHTML = '<div class="error-state">网络错误，请稍后重试</div>';
            }
        }

        function renderDetail(data) {
            const feedback = data.feedback;
            const detailCard = document.getElementById('detailCard');

            if (!feedback) {
                detailCard.innerHTML = '<div class="error-state">反馈信息不存在</div>';
                return;
            }

            const feedbackTime = feedback.feedbackTime ? new Date(feedback.feedbackTime).toLocaleString() : '--';
            const replyTime = feedback.replyTime ? new Date(feedback.replyTime).toLocaleString() : '--';

            const statusText = feedback.feedbackStatus === 0 ? '待处理' : '已处理';

            let html = `
                <h2>反馈详情</h2>

                <div class="section">
                    <div class="section-title">反馈信息</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">反馈ID</div>
                            <div class="value">${feedback.id}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">用户ID</div>
                            <div class="value">${feedback.userId}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">反馈时间</div>
                            <div class="value">${feedbackTime}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">处理状态</div>
                            <div class="value">${statusText}</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">反馈内容</div>
                    <div class="content-box">${feedback.content || '无'}</div>
                </div>
            `;

            if (feedback.feedbackStatus === 1) {
                html += `
                    <div class="section">
                        <div class="section-title">回复内容</div>
                        <div class="content-box">${feedback.reply || '无'}</div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">回复时间</div>
                            <div class="value">${replyTime}</div>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="reply-section">
                        <div class="section-title">回复反馈</div>
                        <textarea id="replyContent" placeholder="请输入回复内容..."></textarea>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-back" onclick="window.location.href='/page/admin/index'">返回</button>
                        <button class="btn btn-reply" onclick="submitReply()">提交回复</button>
                    </div>
                `;
            }

            detailCard.innerHTML = html;
        }

        async function submitReply() {
            const replyContent = document.getElementById('replyContent').value.trim();

            if (!replyContent) {
                alert('请输入回复内容');
                return;
            }

            try {
                const formData = new URLSearchParams();
                formData.append('id', feedbackId);
                formData.append('reply', replyContent);

                const response = await axios.post('/api/feedback/update', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                if (response.data.code === 0) {
                    alert('回复成功');
                    window.location.href = '/page/admin/index';
                } else {
                    alert('回复失败: ' + (response.data.message || '未知错误'));
                }
            } catch (error) {
                console.error('回复失败', error);
                alert('回复失败，请稍后重试');
            }
        }

        loadFeedbackDetail();
    </script>
</body>
</html>
