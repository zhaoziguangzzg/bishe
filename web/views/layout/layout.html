{{define "index_layout_head"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .user-nav {
            display: flex;
            gap: 16px;
        }
        .user-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .user-nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .header-search {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            width: 320px;
        }
        .search-box:focus-within {
            background: rgba(255,255,255,0.3);
        }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        .search-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .search-btn:hover {
            opacity: 0.8;
        }
        .container {
            margin: 0 auto;
            padding: 24px;
        }
    </style>
    {{block "index_layout_extra_head" .}}{{end}}

</head>
{{end}}

{{define "index_layout_body_start"}}
<body>
    <div class="header">
        <div class="nav">
            <a href="/">首页</a>
            <a href="/page/circle/index">圈子</a>
            <a href="/page/course/index">课程</a>
        </div>
        <div class="header-search">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索..." onkeypress="handleSearchKeyPress(event)"/>
                <button class="search-btn" onclick="performSearch()">🔍</button>
            </div>
        </div>
        <div class="user-nav">
            <a href="/page/chat/index">私信</a>
            <a href="/page/notice/index">通知</a>
            <a href="/page/feedback/index">反馈</a>
            <a href="/page/announce/list">公告</a>
            <a href="/page/user/profile">我的</a>
        </div>
    </div>
    <div class="container">
{{end}}

{{define "index_layout_body_end"}}
    </div>
    
    <script>
        (function() {
            var path = window.location.pathname;
            var showSearchPaths = ['/', '/page/circle/search', '/page/circle/index', '/page/essay/search'];
            var showSearch = showSearchPaths.indexOf(path) !== -1;
            if (!showSearch) {
                var searchEl = document.querySelector('.header-search');
                if (searchEl) {
                    searchEl.style.display = 'none';
                }
            }

            var searchCirclePaths = ['/', '/page/index', '/page/circle/search'];
            var inputEl = document.getElementById('searchInput');
            if (inputEl) {
                if (searchCirclePaths.indexOf(path) !== -1) {
                    inputEl.placeholder = '搜索圈子...';
                } else {
                    inputEl.placeholder = '搜索文章...';
                }
            }
        })();
    </script>
    <script>
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleSearchKeyPress(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                return;
            }
            var path = window.location.pathname;
            var searchCirclePaths = ['/', '/page/index', '/page/circle/search'];
            if (searchCirclePaths.indexOf(path) !== -1) {
                window.location.href = '/page/circle/search?keyword=' + encodeURIComponent(keyword);
            } else {
                var url = '/page/essay/search?keyword=' + encodeURIComponent(keyword);
                var urlParams = new URLSearchParams(window.location.search);
                var cid = urlParams.get('cid');
                if (!cid && typeof currentCircleId !== 'undefined') {
                    cid = currentCircleId;
                }
                if (cid) {
                    url += '&cid=' + encodeURIComponent(cid);
                }
                window.location.href = url;
            }
        }
    </script>
    {{block "index_layout_extra_scripts" .}}{{end}}
</body>
</html>
{{end}}
