<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课时详情 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .detail-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .lesson-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        .lesson-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
        }
        .lesson-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }
        .lesson-meta {
            font-size: 14px;
            color: #909399;
        }
        .lesson-content {
            margin-bottom: 30px;
        }
        .content-label {
            font-size: 14px;
            color: #909399;
            margin-bottom: 12px;
        }
        .content-value {
            font-size: 15px;
            color: #333;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .action-section {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin: 0 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: #f5f7fa;
            color: #666;
            border: 1px solid #dcdfe6;
        }
        .btn-secondary:hover {
            background: #ebeef5;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
        .not-found {
            text-align: center;
            padding: 60px;
        }
        .not-found h2 {
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="/">首页</a>
            <a href="/page/circle/index">圈子首页</a>
            <a href="/page/course/index">课程首页</a>
        </div>
        <div style="flex: 1;"></div>
        <div class="nav">
            <a href="/page/user/profile">我的</a>
        </div>
    </div>

    <div class="container">
        <div class="detail-card" id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('lesson_id');

        if (!lessonId) {
            alert('缺少课时ID参数');
            window.location.href = '/page/course/index';
        } else {
            loadLessonDetail();
        }

        async function loadLessonDetail() {
            try {
                const response = await axios.get('/api/lesson/get', {
                    params: { lesson_id: lessonId }
                });

                if (response.data.code === 0 && response.data.data) {
                    renderLessonDetail(response.data.data.lesson);
                } else {
                    document.getElementById('content').innerHTML = '<div class="not-found"><h2>' + (response.data.msg || '课时不存在') + '</h2><a href="/page/course/index">返回课程首页</a></div>';
                }
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="not-found"><h2>加载失败，请稍后重试</h2><a href="/page/course/index">返回课程首页</a></div>';
            }
        }

        function renderLessonDetail(lesson) {
            const cid = lesson.courseId;
            const html = `
                <div class="lesson-header">
                    <div class="lesson-icon">📚</div>
                    <h1 class="lesson-title">${escapeHtml(lesson.title)}</h1>
                    <div class="lesson-meta">创建于 ${formatDate(lesson.createAt)}</div>
                </div>

                <div class="lesson-content">
                    <div class="content-label">课时内容</div>
                    <div class="content-value">${escapeHtml(lesson.content) || '暂无内容'}</div>
                </div>

                <div class="action-section">
                    <button class="btn btn-primary" onclick="window.location.href='/page/course/detail?cid=${cid}'">返回课程</button>
                    <button class="btn btn-secondary" onclick="window.history.back()">返回</button>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
    </script>
</body>
</html>
