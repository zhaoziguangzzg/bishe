<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改课时 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .edit-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .page-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            border-color: #667eea;
        }
        .form-textarea {
            width: 100%;
            min-height: 300px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            outline: none;
            resize: vertical;
            transition: border-color 0.3s;
        }
        .form-textarea:focus {
            border-color: #667eea;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f5f7fa;
            color: #666;
            border: 1px solid #dcdfe6;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 14px;
            margin-top: 8px;
        }
        .success-tip {
            color: #67c23a;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="/">首页</a>
            <a href="/page/circle/index">圈子首页</a>
            <a href="/page/course/index">课程首页</a>
        </div>
        <div style="flex: 1;"></div>
        <div class="nav">
            <a href="/page/user/profile">我的</a>
        </div>
    </div>

    <div class="container">
        <div class="edit-card" id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('lesson_id');
        let courseId = null;

        if (!lessonId) {
            document.getElementById('content').innerHTML = '<div class="error-tip">缺少课时ID参数</div>';
        } else {
            loadLessonDetail();
        }

        async function loadLessonDetail() {
            try {
                const response = await axios.get('/api/lesson/get', {
                    params: { lesson_id: lessonId }
                });

                if (response.data.code === 0 && response.data.data && response.data.data.lesson) {
                    const lesson = response.data.data.lesson;
                    courseId = lesson.courseId;
                    renderForm(lesson);
                } else {
                    document.getElementById('content').innerHTML = '<div class="error-tip">' + (response.data.msg || '课时不存在') + '</div>';
                }
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
            }
        }

        function renderForm(lesson) {
            const html = `
                <h1 class="page-title">修改课时</h1>
                
                <div class="form-group">
                    <label class="form-label">课时标题</label>
                    <input type="text" id="title" class="form-input" value="${escapeHtml(lesson.title)}" placeholder="请输入课时标题">
                </div>

                <div class="form-group">
                    <label class="form-label">课时内容</label>
                    <textarea id="content" class="form-textarea" placeholder="请输入课时内容">${escapeHtml(lesson.content)}</textarea>
                </div>

                <div class="error-tip" id="errorTip"></div>
                <div class="success-tip" id="successTip"></div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="submitLesson()">保存</button>
                    <button class="btn btn-secondary" onclick="goBack()">取消</button>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        async function submitLesson() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const errorTip = document.getElementById('errorTip');
            const successTip = document.getElementById('successTip');

            errorTip.textContent = '';
            successTip.textContent = '';

            if (!title) {
                errorTip.textContent = '请输入课时标题';
                return;
            }

            if (!content) {
                errorTip.textContent = '请输入课时内容';
                return;
            }

            try {
                const formData = new FormData();
                formData.append('lesson_id', lessonId);
                formData.append('title', title);
                formData.append('content', content);

                const response = await axios.post('/api/lesson/update', formData);

                if (response.data.code === 0) {
                    successTip.textContent = '修改成功';
                    setTimeout(() => {
                        if (courseId) {
                            window.location.href = '/page/lesson/detail?lesson_id=' + lessonId;
                        } else {
                            window.location.href = '/page/course/index';
                        }
                    }, 1000);
                } else {
                    errorTip.textContent = response.data.msg || '修改失败';
                }
            } catch (error) {
                errorTip.textContent = '请求失败，请稍后重试';
            }
        }

        function goBack() {
            if (lessonId) {
                window.location.href = '/page/lesson/detail?lesson_id=' + lessonId;
            } else {
                window.location.href = '/page/course/index';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
