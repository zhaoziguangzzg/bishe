<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员详情 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .detail-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .detail-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .info-row {
            display: flex;
            padding: 16px 0;
            border-bottom: 1px solid #f5f7fa;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            width: 120px;
            color: #909399;
            font-size: 14px;
            flex-shrink: 0;
        }
        .info-value {
            flex: 1;
            color: #333;
            font-size: 14px;
            word-break: break-all;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .loading-tip {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
        .error-tip {
            text-align: center;
            padding: 60px;
            color: #f56c6c;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="/page/admin/index">管理员首页</a>
            <a href="/page/adminuser/list">管理员列表</a>
        </div>
        <div style="flex: 1;"></div>
        <div class="nav">
            <a href="/api/adminuser/logout">退出登录</a>
        </div>
    </div>

    <div class="container">
        <div class="detail-card">
            <h2>管理员详情</h2>
            <div id="content">
                <div class="loading-tip">加载中...</div>
            </div>
            <a id="editBtn" href="" class="btn" style="display: none;">编辑</a>
            <a id="roleBtn" href="" class="btn" style="display: none;">修改角色</a>
            <a href="javascript:history.back()" class="btn">返回</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (!userId) {
            document.getElementById('content').innerHTML = '<div class="error-tip">缺少用户ID参数</div>';
        }

        let allRoles = [];

        async function loadRoles() {
            try {
                const response = await axios.get('/api/adminrole/all?page=1&pagesize=1000');
                if (response.data.code === 0) {
                    allRoles = response.data.data.roles || [];
                }
            } catch (error) {
                console.error('Error loading roles:', error);
            }
        }

        function getRoleName(roleId) {
            if (!roleId) return '-';
            const role = allRoles.find(r => r.id == roleId);
            return role ? role.roleName : '-';
        }

        async function loadUserDetail() {
            try {
                const response = await axios.get('/api/adminuser/all?page=1&pagesize=1000');

                if (response.data.code === 0) {
                    const users = response.data.data.users || [];
                    const user = users.find(u => u.id == userId);
                    
                    if (!user) {
                        document.getElementById('content').innerHTML = '<div class="error-tip">用户不存在</div>';
                        return;
                    }

                    document.getElementById('content').innerHTML = `
                        <div class="info-row">
                            <div class="info-label">头像</div>
                            <div class="info-value">
                                <img class="avatar" src="${user.avatar || '/img/default-avatar.png'}" alt="头像"/>
                            </div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">ID</div>
                            <div class="info-value">${user.id}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">用户名</div>
                            <div class="info-value">${user.name || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">邮箱</div>
                            <div class="info-value">${user.email || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">手机号</div>
                            <div class="info-value">${user.phone || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">角色</div>
                            <div class="info-value">${getRoleName(user.roleId)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">创建时间</div>
                            <div class="info-value">${user.createAt || '-'}</div>
                        </div>
                    `;
                    
                    document.getElementById('editBtn').href = `/page/adminuser/edit?id=${user.id}`;
                    document.getElementById('editBtn').style.display = 'inline-block';
                    document.getElementById('roleBtn').href = `/page/adminuser/role?id=${user.id}`;
                    document.getElementById('roleBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('content').innerHTML = 
                        '<div class="error-tip">' + (response.data.msg || '获取失败') + '</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
            }
        }

        async function init() {
            await loadRoles();
            loadUserDetail();
        }

        init();
    </script>
</body>
</html>
