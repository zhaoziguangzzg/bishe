<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加管理员 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .add-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .add-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
        }
        .form-group .hint {
            color: #909399;
            font-size: 12px;
            margin-top: 6px;
        }
        .form-group .error-text {
            color: #f56c6c;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .form-group .error-text.show {
            display: block;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f5f7fa;
            color: #666;
            border: 1px solid #dcdfe6;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #ebeef5;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #67c23a;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="/page/admin/index">管理员首页</a>
        </div>
        <div style="flex: 1;"></div>
        <div class="nav">
            <a href="/api/adminuser/logout">退出登录</a>
        </div>
    </div>

    <div class="container">
        <div class="add-card">
            <h2>添加管理员</h2>
            <div class="error-tip" id="errorTip"></div>
            <div class="success-tip" id="successTip"></div>

            <form id="adminUserForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="name" name="name" placeholder="请输入用户名" maxlength="20" required>
                    <div class="hint">最多20个字符</div>
                    <div class="error-text" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    <div class="hint">至少8位，包含字母和数字</div>
                    <div class="error-text" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                    <div class="error-text" id="confirmPasswordError"></div>
                </div>

                <div class="form-group">
                    <label>角色</label>
                    <select id="role_id" name="role_id" required>
                        <option value="">请选择角色</option>
                    </select>
                    <div class="error-text" id="roleError"></div>
                </div>

                <button type="button" class="btn" onclick="submitForm()">提交</button>
                <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
            </form>
        </div>
    </div>

    <script>
        async function loadRoles() {
            try {
                const response = await axios.get('/api/adminrole/all?page=1&pagesize=1000');
                if (response.data.code === 0) {
                    const roles = response.data.data.roles || [];
                    const select = document.getElementById('role_id');
                    
                    if (roles.length === 0) {
                        select.innerHTML = '<option value="">暂无角色</option>';
                        return;
                    }

                    select.innerHTML = '<option value="">请选择角色</option>' + 
                        roles.map(role => `<option value="${role.id}">${role.roleName}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading roles:', error);
            }
        }

        function showError(message) {
            const errorTip = document.getElementById('errorTip');
            const successTip = document.getElementById('successTip');
            errorTip.textContent = message;
            errorTip.classList.add('show');
            successTip.classList.remove('show');
        }

        function showSuccess(message) {
            const errorTip = document.getElementById('errorTip');
            const successTip = document.getElementById('successTip');
            successTip.textContent = message;
            successTip.classList.add('show');
            errorTip.classList.remove('show');
        }

        function clearErrors() {
            document.getElementById('errorTip').classList.remove('show');
            document.getElementById('successTip').classList.remove('show');
            document.getElementById('nameError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            document.getElementById('confirmPasswordError').classList.remove('show');
        }

        function isValidPassword(password) {
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            return password.length >= 8 && hasLetter && hasNumber;
        }

        async function submitForm() {
            clearErrors();

            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const roleId = document.getElementById('role_id').value;

            if (!name) {
                document.getElementById('nameError').textContent = '请输入用户名';
                document.getElementById('nameError').classList.add('show');
                return;
            }

            if (name.length > 20) {
                document.getElementById('nameError').textContent = '用户名不能超过20个字符';
                document.getElementById('nameError').classList.add('show');
                return;
            }

            if (!password) {
                document.getElementById('passwordError').textContent = '请输入密码';
                document.getElementById('passwordError').classList.add('show');
                return;
            }

            if (!isValidPassword(password)) {
                document.getElementById('passwordError').textContent = '密码至少8位，且包含字母和数字';
                document.getElementById('passwordError').classList.add('show');
                return;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = '两次输入的密码不一致';
                document.getElementById('confirmPasswordError').classList.add('show');
                return;
            }

            if (!roleId) {
                document.getElementById('roleError').textContent = '请选择角色';
                document.getElementById('roleError').classList.add('show');
                return;
            }

            const btn = document.querySelector('.btn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('password', password);
                formData.append('role_id', roleId);

                const response = await axios.post('/api/adminuser/add', formData);

                if (response.data.code === 0) {
                    showSuccess('添加成功！');
                    setTimeout(() => {
                        window.location.href = '/page/admin/index';
                    }, 1500);
                } else {
                    showError(response.data.msg || '添加失败');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('请求失败，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '提交';
            }
        }

        function goBack() {
            window.location.href = '/page/admin/index';
        }

        loadRoles();
    </script>
</body>
</html>
