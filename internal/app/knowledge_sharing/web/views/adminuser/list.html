<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员列表 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            text-align: center;
            padding: 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-left: 3px solid white;
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #e64545;
        }
        .content-area {
            padding: 24px 32px;
        }
        .tool-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tool-bar h2 {
            font-size: 18px;
            color: #333;
        }
        .add-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .add-btn:hover {
            opacity: 0.9;
        }
        .table-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            text-align: left;
            padding: 14px 16px;
            background: #f9fafb;
            color: #606266;
            font-size: 14px;
            font-weight: 500;
        }
        .table td {
            padding: 14px 16px;
            color: #606266;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .table tr:hover {
            background: #f5f7fa;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-edit {
            padding: 6px 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-edit:hover {
            background: #66b1ff;
        }
        .btn-detail {
            padding: 6px 12px;
            background: #909399;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-detail:hover {
            background: #82848a;
        }
        .btn-delete {
            padding: 6px 12px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background: #f78989;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
            <p>知识分享平台</p>
        </div>
        <a href="/page/admin/index" class="menu-item">首页</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>管理员列表</h1>
            <div class="user-info">
                <a href="/api/adminuser/logout" class="logout-btn">退出登录</a>
            </div>
        </div>

        <div class="content-area">
            <div class="tool-bar">
                <h2>管理员管理</h2>
                <a href="/page/adminuser/add" class="add-btn">添加管理员</a>
            </div>

            <div class="table-card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="5" class="empty-tip">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allRoles = [];

        async function loadRoles() {
            try {
                const response = await axios.get('/api/adminrole/all?page=1&pagesize=1000');
                if (response.data.code === 0) {
                    allRoles = response.data.data.roles || [];
                }
            } catch (error) {
                console.error('Error loading roles:', error);
            }
        }

        function getRoleName(roleId) {
            if (!roleId) return '-';
            const role = allRoles.find(r => r.id == roleId);
            return role ? role.roleName : '-';
        }

        async function loadUsers() {
            try {
                const response = await axios.get('/api/adminuser/all?page=1&pagesize=1000');
                if (response.data.code === 0) {
                    const users = response.data.data.users;
                    const tbody = document.getElementById('userTableBody');
                    
                    if (!users || users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-tip">暂无数据</td></tr>';
                        return;
                    }

                    tbody.innerHTML = users.map(user => `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${getRoleName(user.roleId)}</td>
                            <td>${user.createAt || '-'}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-detail" onclick="viewDetail(${user.id})">详情</button>
                                    <button class="btn-edit" onclick="editUser(${user.id})">编辑</button>
                                    <button class="btn-delete" onclick="deleteUser(${user.id})">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('userTableBody').innerHTML = 
                    '<tr><td colspan="5" class="empty-tip">加载失败</td></tr>';
            }
        }

        function viewDetail(id) {
            window.location.href = `/page/adminuser/detail?id=${id}`;
        }

        function editUser(id) {
            window.location.href = `/page/adminuser/edit?id=${id}`;
        }

        async function deleteUser(id) {
            if (!confirm('确定要删除该管理员吗？')) {
                return;
            }

            try {
                const formData = new FormData();
                formData.append('id', id);

                const response = await axios.post('/api/adminuser/delete', formData);
                if (response.data.code === 0) {
                    alert('删除成功');
                    loadUsers();
                } else {
                    alert(response.data.msg || '删除失败');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('请求失败，请稍后重试');
            }
        }

        async function init() {
            await loadRoles();
            loadUsers();
        }

        init();
    </script>
</body>
</html>
