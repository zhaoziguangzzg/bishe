<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新角色 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .info-section {
            margin-bottom: 24px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
        }
        .info-row {
            display: flex;
            margin-bottom: 8px;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-label {
            width: 80px;
            color: #909399;
            font-size: 14px;
        }
        .info-value {
            color: #333;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
        }
        .form-group select:focus {
            border-color: #667eea;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #909399;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: #82848a;
        }
        .error-tip {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #52c41a;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
        .loading-tip {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
        .error-page-tip {
            text-align: center;
            padding: 60px;
            color: #f56c6c;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="/page/admin/index">管理员首页</a>
            <a href="/page/adminuser/list">管理员列表</a>
        </div>
        <div style="flex: 1;"></div>
        <div class="nav">
            <a href="/api/adminuser/logout">退出登录</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>更新角色</h2>
            <div id="content">
                <div class="loading-tip">加载中...</div>
            </div>
            <div id="formSection" style="display: none;">
                <div class="form-group">
                    <label>选择角色</label>
                    <select id="role_id" name="role_id">
                        <option value="">请选择角色</option>
                    </select>
                    <div class="error-tip" id="roleError"></div>
                </div>

                <button type="button" id="saveBtn" class="btn" onclick="submitForm()">保存</button>
                <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>

                <p id="errorMsg" class="error-tip"></p>
                <p id="successMsg" class="success-tip"></p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        let currentUser = null;
        let allRoles = [];

        if (!userId) {
            document.getElementById('content').innerHTML = '<div class="error-page-tip">缺少用户ID参数</div>';
            document.getElementById('formSection').style.display = 'none';
        }

        async function loadRoles() {
            try {
                const response = await axios.get('/api/adminrole/all?page=1&pagesize=1000');
                if (response.data.code === 0) {
                    allRoles = response.data.data.roles || [];
                    const select = document.getElementById('role_id');
                    
                    if (allRoles.length === 0) {
                        select.innerHTML = '<option value="">暂无角色</option>';
                        return;
                    }

                    select.innerHTML = '<option value="">请选择角色</option>' + 
                        allRoles.map(role => `<option value="${role.id}">${role.roleName}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading roles:', error);
            }
        }

        function getRoleName(roleId) {
            if (!roleId) return '-';
            const role = allRoles.find(r => r.id == roleId);
            return role ? role.roleName : '-';
        }

        async function loadUserInfo() {
            try {
                const response = await axios.get('/api/adminuser/all?page=1&pagesize=1000');

                if (response.data.code === 0) {
                    const users = response.data.data.users || [];
                    currentUser = users.find(u => u.id == userId);
                    
                    if (!currentUser) {
                        document.getElementById('content').innerHTML = '<div class="error-page-tip">用户不存在</div>';
                        document.getElementById('formSection').style.display = 'none';
                        return;
                    }

                    document.getElementById('content').innerHTML = `
                        <div class="info-section">
                            <div class="info-row">
                                <div class="info-label">用户名</div>
                                <div class="info-value">${currentUser.name || '-'}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">当前角色</div>
                                <div class="info-value">${getRoleName(currentUser.roleId)}</div>
                            </div>
                        </div>
                    `;

                    document.getElementById('formSection').style.display = 'block';
                    
                    if (currentUser.roleId) {
                        document.getElementById('role_id').value = currentUser.roleId;
                    }
                } else {
                    document.getElementById('content').innerHTML = 
                        '<div class="error-page-tip">' + (response.data.msg || '获取失败') + '</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = '<div class="error-page-tip">加载失败，请稍后重试</div>';
            }
        }

        async function submitForm() {
            const roleId = document.getElementById('role_id').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const roleError = document.getElementById('roleError');
            const saveBtn = document.getElementById('saveBtn');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            roleError.classList.remove('show');

            if (!roleId) {
                roleError.textContent = '请选择角色';
                roleError.classList.add('show');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            try {
                const formData = new FormData();
                formData.append('uid', userId);
                formData.append('role_id', roleId);

                const response = await axios.post('/api/adminuser/update-role', formData);

                if (response.data.code === 0) {
                    successMsg.textContent = '角色更新成功';
                    successMsg.classList.add('show');
                    setTimeout(function() {
                        window.location.href = `/page/adminuser/detail?id=${userId}`;
                    }, 1500);
                } else {
                    errorMsg.textContent = response.data.msg || '更新失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.textContent = '请求失败，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存';
            }
        }

        function goBack() {
            window.location.href = `/page/adminuser/detail?id=${userId}`;
        }

        async function init() {
            await loadRoles();
            loadUserInfo();
        }

        init();
    </script>
</body>
</html>
