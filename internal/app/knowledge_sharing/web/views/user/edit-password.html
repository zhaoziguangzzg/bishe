<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .edit-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .edit-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .password-tip {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-tip {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #52c41a;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
        .username-display {
            background: #f5f7fa;
            padding: 12px 16px;
            border-radius: 6px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/page/user/profile">← 返回个人中心</a>
    </div>

    <div class="container">
        <div class="edit-card">
            <h2>修改密码</h2>
            <form id="passwordForm">
                <div class="form-group">
                    <label>用户名</label>
                    <div id="usernameDisplay" class="username-display">加载中...</div>
                </div>

                <div class="form-group">
                    <label>新密码</label>
                    <input id="password" type="password" placeholder="请输入新密码（至少8位）"/>
                    <p class="password-tip">密码长度至少8位，可包含字母、数字和特殊字符(!@#$%^&*_-)</p>
                </div>

                <div class="form-group">
                    <label>确认密码</label>
                    <input id="confirmPassword" type="password" placeholder="请再次输入新密码"/>
                </div>

                <p id="errorMsg" class="error-tip"></p>
                <p id="successMsg" class="success-tip"></p>

                <button type="submit" id="saveBtn" class="btn">修改密码</button>
            </form>
        </div>
    </div>

    <script>
        async function loadUserInfo() {
            try {
                const response = await axios.get('/api/user/get');
                if (response.data.code === 0 && response.data.data) {
                    document.getElementById('usernameDisplay').textContent = response.data.data.user.name || '未设置';
                } else {
                    document.getElementById('usernameDisplay').textContent = '无法获取';
                }
            } catch (error) {
                document.getElementById('usernameDisplay').textContent = '无法获取';
            }
        }

        loadUserInfo();

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const saveBtn = document.getElementById('saveBtn');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (!password || password.length < 8) {
                errorMsg.textContent = '密码长度至少8位';
                errorMsg.classList.add('show');
                return;
            }

            const passwordRegex = /^[a-zA-Z0-9!@#$%^&*_\-]+$/;
            if (!passwordRegex.test(password)) {
                errorMsg.textContent = '密码只能包含字母、数字和特殊字符(!@#$%^&*_-)';
                errorMsg.classList.add('show');
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.classList.add('show');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = '修改中...';

            try {
                const formData = new FormData();
                formData.append('password', password);

                const response = await axios.post('/api/user/updatepassword', formData);

                if (response.data.code === 0) {
                    successMsg.textContent = '密码修改成功';
                    successMsg.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                    setTimeout(function() {
                        window.location.href = '/page/user/profile';
                    }, 1500);
                } else {
                    errorMsg.textContent = response.data.message || '修改失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                if (error.response && error.response.data) {
                    errorMsg.textContent = error.response.data.message || '网络错误，请稍后重试';
                } else {
                    errorMsg.textContent = '网络错误，请稍后重试';
                }
                errorMsg.classList.add('show');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '修改密码';
            }
        });
    </script>
</body>
</html>
