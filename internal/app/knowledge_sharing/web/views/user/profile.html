<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-name {
            font-size: 24px;
            color: #333;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #fafafa;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .menu-item:hover {
            background: #f0f4ff;
        }
        .menu-item span {
            font-size: 15px;
            color: #333;
        }
        .logout-btn {
            margin-top: 24px;
            width: 100%;
            padding: 12px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #ff7875;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← 返回首页</a>
        <h1>个人中心</h1>
        <div></div>
    </div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <img id="avatar" class="avatar" src="" alt="头像"/>
                <div class="user-name" id="userName">加载中...</div>
            </div>
            <div class="menu-list">
                <div class="menu-item" onclick="window.location.href='/page/user/edit'">
                    <span>修改个人信息</span>
                </div>
                <div class="menu-item" onclick="window.location.href='/page/circle/my'">
                    <span>我创建的圈子</span>
                </div>
                <div class="menu-item" onclick="window.location.href='/page/circle/joined'">
                    <span>我加入的圈子</span>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        async function loadUserInfo() {
            try {
                const response = await axios.get('/api/user/get');
                if (response.data.code === 0 && response.data.data) {
                    const user = response.data.data;
                    document.getElementById('userName').textContent = user.name;
                    if (user.avatar) {
                        document.getElementById('avatar').src = user.avatar;
                    }
                } else {
                    window.location.href = '/page/user/login';
                }
            } catch (error) {
                window.location.href = '/page/user/login';
            }
        }

        async function logout() {
            try {
                await axios.get('/api/user/logout');
            } catch (error) {}
            window.location.href = '/page/user/login';
        }

        loadUserInfo();
    </script>
</body>
</html>
