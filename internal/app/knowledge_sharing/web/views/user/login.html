<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #409eff;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #66b1ff;
        }
        .login-btn:disabled {
            background: #a0cfff;
            cursor: not-allowed;
        }
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .form-footer a {
            color: #409eff;
            text-decoration: none;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
        .tab-container {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #e4e7ed;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .tab-item.active {
            color: #409eff;
            font-weight: 600;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #409eff;
        }
        .tab-item:hover {
            color: #409eff;
        }
        .login-form {
            display: none;
        }
        .login-form.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>欢迎登录</h1>
            <p>知识分享平台</p>
        </div>
        
        <div class="tab-container">
            <div class="tab-item active" data-tab="user" onclick="switchTab('user')">用户登录</div>
            <div class="tab-item" data-tab="admin" onclick="switchTab('admin')">管理员登录</div>
        </div>
        
        <form id="userLoginForm" class="login-form active">
            <div class="form-group">
                <label>用户名</label>
                <input 
                    id="username"
                    type="text" 
                    placeholder="请输入用户名"
                />
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input 
                    id="password"
                    type="password" 
                    placeholder="请输入密码"
                />
            </div>

            <p id="errorMsg" class="error-tip"></p>
            
            <button type="submit" id="loginBtn" class="login-btn">登 录</button>
        </form>
        
        <form id="adminLoginForm" class="login-form">
            <div class="form-group">
                <label>管理员用户名</label>
                <input 
                    id="adminUsername"
                    type="text" 
                    placeholder="请输入管理员用户名"
                />
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input 
                    id="adminPassword"
                    type="password" 
                    placeholder="请输入密码"
                />
            </div>

            <p id="adminErrorMsg" class="error-tip"></p>
            
            <button type="submit" id="adminLoginBtn" class="login-btn">登 录</button>
        </form>
        
        <div class="form-footer">
            还没有账号？<a href="/page/user/register">立即注册</a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.login-form').forEach(form => {
                form.classList.remove('active');
            });
            
            document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'LoginForm').classList.add('active');
        }
        
        document.getElementById('userLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                errorMsg.classList.add('show');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.textContent = '';
            errorMsg.classList.remove('show');
            
            const formData = new URLSearchParams();
            formData.append('name', username);
            formData.append('password', password);
            
            try {
                const response = await axios.post('/api/user/login', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });
                
                if (response.data.code === 0) {
                    window.location.href = '/page/admin/index';
                } else {
                    errorMsg.textContent = response.data.message || '登录失败，请检查用户名和密码';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });
        
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const errorMsg = document.getElementById('adminErrorMsg');
            const loginBtn = document.getElementById('adminLoginBtn');
            
            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                errorMsg.classList.add('show');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.textContent = '';
            errorMsg.classList.remove('show');
            
            const formData = new URLSearchParams();
            formData.append('name', username);
            formData.append('password', password);
            
            try {
                const response = await axios.post('/api/adminuser/login', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });
                
                if (response.data.code === 0) {
                    window.location.href = '/page/admin/index';
                } else {
                    errorMsg.textContent = response.data.message || '登录失败，请检查用户名和密码';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
