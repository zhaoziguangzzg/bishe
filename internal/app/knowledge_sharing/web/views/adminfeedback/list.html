<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈列表 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            text-align: center;
            padding: 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-left: 3px solid white;
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #e64545;
        }
        .content-area {
            padding: 24px 32px;
        }
        .tool-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tool-bar h2 {
            font-size: 18px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: white;
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .tab {
            flex: 1;
            padding: 12px 24px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            color: #606266;
            transition: all 0.3s;
        }
        .tab:hover {
            color: #667eea;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .table-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            text-align: left;
            padding: 14px 16px;
            background: #f9fafb;
            color: #606266;
            font-size: 14px;
            font-weight: 500;
        }
        .table td {
            padding: 14px 16px;
            color: #606266;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .table tr:hover {
            background: #f5f7fa;
        }
        .reply-col, .reply-cell {
            display: none;
        }
        .reply-col.show, .reply-cell.show {
            display: table-cell;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending {
            background: #fdf6ec;
            color: #e6a23c;
        }
        .status-replied {
            background: #f0f9eb;
            color: #67c23a;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-detail {
            padding: 6px 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-detail:hover {
            background: #66b1ff;
        }
        .btn-reply {
            padding: 6px 12px;
            background: #67c23a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-reply:hover {
            background: #85ce61;
        }
        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
            <p>知识分享平台</p>
        </div>
        <a href="/page/admin/index" class="menu-item">首页</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>反馈列表</h1>
            <div class="user-info">
                <a href="/api/adminuser/logout" class="logout-btn">退出登录</a>
            </div>
        </div>

        <div class="content-area">
            <div class="tool-bar">
                <h2>反馈管理</h2>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab(0)">未处理</div>
                <div class="tab" onclick="switchTab(1)">已处理</div>
            </div>

            <div class="table-card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户ID</th>
                            <th>反馈内容</th>
                            <th>反馈时间</th>
                            <th class="reply-col">回复内容</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody">
                        <tr>
                            <td colspan="7" class="empty-tip">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function getStatusText(status) {
            switch(status) {
                case 0: return '待回复';
                case 1: return '已回复';
                default: return '未知';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 0: return 'status-pending';
                case 1: return 'status-replied';
                default: return '';
            }
        }

        function formatTime(time) {
            if (!time) return '-';
            return time;
        }

        function truncateContent(content, maxLength = 30) {
            if (!content) return '-';
            if (content.length <= maxLength) return content;
            return content.substring(0, maxLength) + '...';
        }

        let currentStatus = 0;

        function switchTab(status) {
            currentStatus = status;
            document.querySelectorAll('.tab').forEach((tab, index) => {
                tab.classList.toggle('active', index === status);
            });
            const replyCol = document.querySelector('.reply-col');
            if (replyCol) {
                replyCol.classList.toggle('show', status === 1);
            }
            loadFeedbacks();
        }

        async function loadFeedbacks() {
            try {
                const response = await axios.get(`/api/adminfeedback/all?status=${currentStatus}&page=1&pagesize=1000`);
                if (response.data.code === 0) {
                    const feedbacks = response.data.data.feedbacks || [];
                    const tbody = document.getElementById('feedbackTableBody');
                    
                    if (!feedbacks || feedbacks.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" class="empty-tip">暂无数据</td></tr>';
                        return;
                    }

                    const replyColClass = currentStatus === 1 ? 'reply-cell show' : 'reply-cell';
                    tbody.innerHTML = feedbacks.map(feedback => `
                        <tr>
                            <td>${feedback.id}</td>
                            <td>${feedback.userId}</td>
                            <td title="${feedback.content || ''}">${truncateContent(feedback.content)}</td>
                            <td>${formatTime(feedback.feedbackTime)}</td>
                            <td class="${replyColClass}" title="${feedback.reply || ''}">${truncateContent(feedback.reply, 20)}</td>
                            <td><span class="status-badge ${getStatusClass(feedback.feedbackStatus)}">${getStatusText(feedback.feedbackStatus)}</span></td>
                            <td>
                                <div class="action-btns">
                                    ${feedback.feedbackStatus === 0 
                                        ? `<button class="btn-reply" onclick="replyFeedback(${feedback.id})">回复</button>` 
                                        : `<button class="btn-detail" onclick="viewDetail(${feedback.id})">查看</button>`}
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('feedbackTableBody').innerHTML = 
                    '<tr><td colspan="7" class="empty-tip">加载失败</td></tr>';
            }
        }

        function viewDetail(id) {
            alert('查看反馈详情功能开发中，反馈ID: ' + id);
        }

        function replyFeedback(id) {
            window.location.href = `/page/adminfeedback/edit?id=${id}`;
        }

        loadFeedbacks();
    </script>
</body>
</html>
