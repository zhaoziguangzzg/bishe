<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私信 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            background: white;
        }
        .chat-user-name {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message-item {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }
        .message-item.sent {
            align-self: flex-end;
        }
        .message-item.received {
            align-self: flex-start;
        }
        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message-item.sent .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-item.received .message-content {
            background: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 11px;
            color: #909399;
            margin-top: 4px;
            padding: 0 4px;
        }
        .message-item.sent .message-time {
            text-align: right;
        }
        .chat-input-section {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            background: white;
        }
        .chat-input-form {
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .chat-input:focus {
            border-color: #667eea;
        }
        .send-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
        }
        .send-btn:hover {
            opacity: 0.9;
        }
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }
        .empty-tip {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
            font-size: 14px;
        }
        .error-tip {
            text-align: center;
            padding: 60px 20px;
            color: #f56c6c;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>知识分享平台</span>
        <a href="/page/chat/index">返回私信列表</a>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-user-name" id="chatUserName">加载中...</div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="loading">加载消息...</div>
        </div>
        <div class="chat-input-section">
            <form class="chat-input-form" id="chatForm">
                <input type="text" class="chat-input" id="messageInput" placeholder="输入消息..." maxlength="100">
                <button type="submit" class="send-btn" id="sendBtn">发送</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const chatUid = urlParams.get('uid');
        let currentUserId = null;

        if (!chatUid) {
            document.getElementById('chatMessages').innerHTML = '<div class="error-tip">缺少用户ID参数</div>';
        } else {
            initPage();
        }

        async function initPage() {
            await loadCurrentUser();
            await loadContactInfo();
            await loadChatHistory();
        }

        async function loadCurrentUser() {
            try {
                const response = await axios.get('/api/user/get');
                if (response.data.code === 0 && response.data.data) {
                    currentUserId = response.data.data.user.id;
                }
            } catch (error) {
                currentUserId = null;
            }
        }

        async function loadContactInfo() {
            if (!currentUserId || !chatUid) return;

            try {
                const response = await axios.get('/api/contact/all', {
                    params: { uid: currentUserId }
                });
                if (response.data.code === 0 && response.data.data) {
                    const userChatContacts = response.data.data.userChatContacts || [];
                    const contact = userChatContacts.find(c => c.chatUser && c.chatUser.id === parseInt(chatUid));
                    if (contact && contact.chatUser) {
                        const userName = contact.chatUser.name || '未知用户';
                        const avatarUrl = contact.chatUser.avatar || '/img/default-avatar.png';
                        document.getElementById('chatUserName').innerHTML =
                            `<img src="${avatarUrl}" style="width:36px;height:36px;border-radius:50%;vertical-align:middle;margin-right:8px;">${escapeHtml(userName)}`;
                    }
                }
            } catch (error) {
                console.error('加载联系人信息失败', error);
            }
        }

        async function loadChatHistory() {
            try {
                const response = await axios.get('/api/chat/get', {
                    params: { chat_uid: chatUid }
                });
                if (response.data.code === 0 && response.data.data) {
                    renderMessages(response.data.data);
                } else {
                    document.getElementById('chatMessages').innerHTML = '<div class="error-tip">加载失败</div>';
                }
            } catch (error) {
                document.getElementById('chatMessages').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
            }
        }

        function renderMessages(data) {
            const chats = data.chats || [];

            if (chats.length === 0) {
                document.getElementById('chatMessages').innerHTML = '<div class="empty-tip">暂无消息，开始聊天吧</div>';
                return;
            }

            const html = chats.map(chat => {
                const isSent = chat.sendUid === currentUserId;
                return `
                    <div class="message-item ${isSent ? 'sent' : 'received'}">
                        <div class="message-content">${escapeHtml(chat.content)}</div>
                        <div class="message-time">${chat.createAt || ''}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('chatMessages').innerHTML = html;
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        document.getElementById('chatForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const content = document.getElementById('messageInput').value.trim();
            if (!content) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('content', content);
                formData.append('receive_uid', chatUid);

                const response = await axios.post('/api/chat/add', formData);

                if (response.data.code === 0) {
                    document.getElementById('messageInput').value = '';
                    await loadChatHistory();
                } else {
                    alert(response.data.msg || '发送失败');
                }
            } catch (error) {
                alert('发送失败，请稍后重试');
            }

            sendBtn.disabled = false;
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
