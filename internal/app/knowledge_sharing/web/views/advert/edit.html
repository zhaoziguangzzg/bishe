<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改广告 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .edit-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .edit-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-tip {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #52c41a;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
        .loading-state {
            text-align: center;
            padding: 60px;
            color: #909399;
        }
        .avatar-section {
            margin-bottom: 20px;
        }
        .avatar-preview {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
            display: block;
        }
        .avatar-section .form-group {
            margin-top: 12px;
        }
        .avatar-section input[type="file"] {
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/page/admin/index">← 返回后台管理</a>
        <span>修改广告</span>
        <div></div>
    </div>

    <div class="container">
        <div class="edit-card" id="editCard">
            <div class="loading-state">加载中...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const advertId = urlParams.get('id');

        async function loadAdvertDetail() {
            const editCard = document.getElementById('editCard');

            if (!advertId) {
                editCard.innerHTML = '<div class="error-tip show">缺少广告ID参数</div>';
                return;
            }

            try {
                const response = await axios.get('/api/advert/get', {
                    params: { advert_id: advertId }
                });

                if (response.data.code === 0 && response.data.data) {
                    renderForm(response.data.data.advert);
                } else {
                    editCard.innerHTML = '<div class="error-tip show">加载失败: ' + (response.data.message || '未知错误') + '</div>';
                }
            } catch (error) {
                console.error('加载广告详情失败', error);
                editCard.innerHTML = '<div class="error-tip show">网络错误，请稍后重试</div>';
            }
        }

        function renderForm(advert) {
            const editCard = document.getElementById('editCard');

            if (!advert) {
                editCard.innerHTML = '<div class="error-tip show">广告信息不存在</div>';
                return;
            }

            const startTime = advert.startTime ? formatDateTime(advert.startTime) : '';
            const endTime = advert.endTime ? formatDateTime(advert.endTime) : '';

            editCard.innerHTML = `
                <h2>修改广告</h2>
                <form id="editForm">
                    <div class="avatar-section">
                        <img id="imgPreview" class="avatar-preview" src="${advert.img || ''}" alt="广告图片"/>
                        <div class="form-group">
                            <label>广告图片</label>
                            <input id="advertImg" type="file" accept="image/*"/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>广告位置</label>
                        <input id="position" type="text" value="${escapeHtml(advert.position || '')}" placeholder="请输入广告位置"/>
                    </div>

                    <div class="form-group">
                        <label>广告地址</label>
                        <input id="advertAddr" type="text" value="${escapeHtml(advert.advertAddr || '')}" placeholder="请输入广告地址"/>
                    </div>

                    <div class="form-group">
                        <label>广告内容</label>
                        <textarea id="content" placeholder="请输入广告内容">${escapeHtml(advert.content || '')}</textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>开始时间</label>
                            <input id="startTime" type="datetime-local" value="${startTime}"/>
                        </div>
                        <div class="form-group">
                            <label>结束时间</label>
                            <input id="endTime" type="datetime-local" value="${endTime}"/>
                        </div>
                    </div>

                    <p id="errorMsg" class="error-tip"></p>
                    <p id="successMsg" class="success-tip"></p>

                    <button type="submit" id="saveBtn" class="btn">保存修改</button>
                </form>
            `;

            document.getElementById('editForm').addEventListener('submit', handleSubmit);

            document.getElementById('advertImg').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById('imgPreview').src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        async function handleSubmit(e) {
            e.preventDefault();

            const position = document.getElementById('position').value.trim();
            const advertAddr = document.getElementById('advertAddr').value.trim();
            const content = document.getElementById('content').value.trim();
            const startTimeStr = document.getElementById('startTime').value;
            const endTimeStr = document.getElementById('endTime').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const saveBtn = document.getElementById('saveBtn');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (!position) {
                errorMsg.textContent = '广告位置不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!advertAddr) {
                errorMsg.textContent = '广告地址不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!content) {
                errorMsg.textContent = '广告内容不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!startTimeStr || !endTimeStr) {
                errorMsg.textContent = '开始时间和结束时间不能为空';
                errorMsg.classList.add('show');
                return;
            }

            const startTime = formatDateTimeForSubmit(startTimeStr);
            const endTime = formatDateTimeForSubmit(endTimeStr);

            if (new Date(startTime) >= new Date(endTime)) {
                errorMsg.textContent = '结束时间必须晚于开始时间';
                errorMsg.classList.add('show');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            const formData = new FormData();
            formData.append('advert_id', advertId);
            formData.append('position', position);
            formData.append('addvert_addr', advertAddr);
            formData.append('content', content);
            formData.append('start_time', startTime);
            formData.append('end_time', endTime);

            const imgFile = document.getElementById('advertImg').files[0];
            if (imgFile) {
                formData.append('avatar', imgFile);
            }

            try {
                const response = await axios.post('/api/advert/update', formData, {
                    headers: {
                        'Content-Type': 'multipart/form-data'
                    }
                });

                if (response.data.code === 0) {
                    successMsg.textContent = '修改成功';
                    successMsg.classList.add('show');
                    setTimeout(function() {
                        window.location.href = '/page/admin/index';
                    }, 1500);
                } else {
                    errorMsg.textContent = response.data.message || '修改失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存修改';
            }
        }

        function formatDateTime(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        function formatDateTimeForSubmit(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadAdvertDetail();
    </script>
</body>
</html>
