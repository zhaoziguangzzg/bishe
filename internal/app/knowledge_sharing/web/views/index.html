<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-info span {
            font-size: 14px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .ad-banner {
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
        }
        .ad-banner-item {
            display: block;
            width: 100%;
            border-radius: 12px;
        }
        .ad-banner-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }
        .rank-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            flex: 1;
            min-width: 0;
        }
        .rank-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .rankings-container {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        .rank-section {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .rank-section h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .more-link {
            font-size: 13px;
            color: #409eff;
            text-decoration: none;
            font-weight: normal;
        }
        .more-link:hover {
            text-decoration: underline;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .rank-item:hover {
            background: #f0f4ff;
            transform: translateY(-2px);
        }
        .rank-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            margin-right: 12px;
        }
        .rank-num.top-1 {
            background: #ffd700;
        }
        .rank-num.top-2 {
            background: #c0c0c0;
        }
        .rank-num.top-3 {
            background: #cd7f32;
        }
        .rank-info {
            flex: 1;
        }
        .rank-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }
        .rank-meta {
            font-size: 12px;
            color: #999;
        }
        .rank-price {
            font-size: 14px;
            color: #ff6b6b;
            font-weight: bold;
        }
        .rank-price.free {
            color: #52c41a;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .my-circles {
            grid-template-columns: 1fr;
        }
        .my-circle-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
        }
        .my-circle-item:hover {
            background: #f0f4ff;
        }
        .nav {
            display: flex;
            gap: 24px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .user-nav {
            display: flex;
            gap: 16px;
        }
        .user-nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .user-nav a:hover {
            background: rgba(255,255,255,0.2);
        }
        .header-search {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            width: 320px;
        }
        .search-box:focus-within {
            background: rgba(255,255,255,0.3);
        }
        .search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        .search-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .search-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="/">首页</a>
            <a href="/page/circle/index">加入的圈子</a>
            <a href="/page/circle/create">创建的圈子</a>
            <a href="/page/course/index">课程</a>
            <a href="/page/announce/list" id="headerAnnounce">公告</a>
        </div>
        <div class="header-search">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索圈子..." onkeypress="handleSearchKeyPress(event)"/>
                <button class="search-btn" onclick="performSearch()">🔍</button>
            </div>
        </div>
        <div class="user-nav">
            <a href="/page/chat/index">私信</a>
            <a href="/page/notice/index">通知</a>
            <a href="/page/feedback/index">反馈</a>
            <a href="/page/user/profile">我的</a>
        </div>
    </div>

    <div class="container">
        <div class="ad-banner" id="indexAdBanner"></div>
        <div class="rankings-container">
            <div class="rank-section">
                <h2>💰 付费圈子排行榜 <a class="more-link" href="/page/circle/list?type=charge">更多</a></h2>
                <div class="rank-list" id="chargeRank"></div>
            </div>

            <div class="rank-section">
                <h2>🎁 免费圈子排行榜 <a class="more-link" href="/page/circle/list?type=free">更多</a></h2>
                <div class="rank-list" id="freeRank"></div>
            </div>

            <div class="rank-section">
                <h2>🔥 人气排行榜 <a class="more-link" href="/page/circle/list?type=hot">更多</a></h2>
                <div class="rank-list" id="hotRank"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadLatestAnnounce() {
            try {
                const response = await axios.get('/api/announce/all?page=1&pagesize=1');
                if (response.data.code === 0 && response.data.data && response.data.data.announces && response.data.data.announces.length > 0) {
                    const announce = response.data.data.announces[0];
                    const announceLink = document.getElementById('headerAnnounce');
                    announceLink.textContent = announce.title || '公告';
                    announceLink.href = '/page/announce/list';
                }
            } catch (error) {
                console.error('Load announcement error:', error);
            }
        }

        async function loadIndexAds() {
            const adBanner = document.getElementById('indexAdBanner');
            if (!adBanner) return;

            try {
                const response = await axios.get('/api/advert/all-time?position=4');
                if (response.data.code === 0 && response.data.data && response.data.data.adverts && response.data.data.adverts.length > 0) {
                    const adverts = response.data.data.adverts;
                    const randomAd = adverts[Math.floor(Math.random() * adverts.length)];
                    
                    if (randomAd.img) {
                        if (randomAd.addvert_addr) {
                            adBanner.innerHTML = '<a href="' + escapeHtml(randomAd.addvert_addr) + '" class="ad-banner-item" target="_blank"><img src="' + escapeHtml(randomAd.img) + '" alt="广告"/></a>';
                        } else {
                            adBanner.innerHTML = '<div class="ad-banner-item"><img src="' + escapeHtml(randomAd.img) + '" alt="广告"/></div>';
                        }
                    } else if (randomAd.content) {
                        adBanner.innerHTML = '<div class="ad-banner-item" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; color: white; text-align: center;">' + escapeHtml(randomAd.content) + '</div>';
                    }
                }
            } catch (error) {
                console.error('Load index ads error:', error);
            }
        }

        async function loadChargeRank() {
            try {
                const response = await axios.get('/api/circle/charge');
                if (response.data.code === 0 && response.data.data) {
                    renderRankList('chargeRank', response.data.data.circles || [], true);
                }
            } catch (error) {
                document.getElementById('chargeRank').innerHTML = '<div class="no-data">暂无数据</div>';
            }
        }

        async function loadFreeRank() {
            try {
                const response = await axios.get('/api/circle/free');
                if (response.data.code === 0 && response.data.data) {
                    renderRankList('freeRank', response.data.data.circles || [], false);
                }
            } catch (error) {
                document.getElementById('freeRank').innerHTML = '<div class="no-data">暂无数据</div>';
            }
        }

        async function loadHotRank() {
            try {
                const response = await axios.get('/api/circle/all');
                if (response.data.code === 0 && response.data.data) {
                    const circles = response.data.data.circles || [];
                    const sorted = circles.sort((a, b) => (b.joinNum || 0) - (a.joinNum || 0));
                    renderRankList('hotRank', sorted.slice(0, 6), false);
                }
            } catch (error) {
                document.getElementById('hotRank').innerHTML = '<div class="no-data">暂无数据</div>';
            }
        }

        async function loadMyCircles() {
            try {
                const response = await axios.get('/api/circle/join');
                if (response.data.code === 0 && response.data.data) {
                    const container = document.getElementById('myCircles');
                    if (response.data.data.length === 0) {
                        container.innerHTML = '<div class="no-data">您还没有加入任何圈子</div>';
                    } else {
                        container.innerHTML = response.data.data.map(circle => `
                            <div class="my-circle-item" onclick="goToCircle(${circle.id})">
                                <div class="rank-info">
                                    <div class="rank-title">${circle.title}</div>
                                    <div class="rank-meta">圈主ID: ${circle.circleOwnerId}</div>
                                </div>
                            </div>
                        `).join('');
                    }
                } else {
                    document.getElementById('myCircles').innerHTML = '<div class="no-data">请先登录查看</div>';
                }
            } catch (error) {
                document.getElementById('myCircles').innerHTML = '<div class="no-data">请先登录查看</div>';
            }
        }

        function renderRankList(containerId, data, isPaid) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.slice(0, 6).map((circle, index) => {
                const isCirclePaid = circle.price > 0;
                return `
                <div class="rank-item" onclick="goToCircle(${circle.id})">
                    <div class="rank-num top-${index + 1}">${index + 1}</div>
                    <div class="rank-info">
                        <div class="rank-title">${circle.title}</div>
                        <div class="rank-meta">圈主: ${circle.ownerName || '未知'} | ${circle.joinNum || 0}人加入</div>
                    </div>
                    <div class="rank-price ${isCirclePaid ? '' : 'free'}">${isCirclePaid ? (circle.price || 0) + '元' : '免费'}</div>
                </div>
                `;
            }).join('');
        }

        function goToCircle(circleId) {
            window.location.href = '/page/circle/detail?cid=' + circleId;
        }

        async function checkLogin() {
            try {
                const response = await axios.get('/api/user/get');
                if (response.data.code === 0 && response.data.data) {
                    const user = response.data.data;
                    document.getElementById('userName').textContent = user.name;
                    if (user.avatar) {
                        const userInfo = document.getElementById('userInfo');
                        userInfo.innerHTML = `<img src="${user.avatar}" alt="头像"/> <span>${user.name}</span>`;
                    }
                } else {
                    document.getElementById('myLink').href = '/page/user/login';
                }
            } catch (error) {
                document.getElementById('myLink').href = '/page/user/login';
                console.log('未登录');
            }
        }

        function handleSearchKeyPress(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                return;
            }
            window.location.href = '/page/circle/search?keyword=' + encodeURIComponent(keyword);
        }

        loadChargeRank();
        loadFreeRank();
        loadHotRank();
        checkLogin();
        loadLatestAnnounce();
    </script>
</body>
</html>
