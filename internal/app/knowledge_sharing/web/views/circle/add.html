<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建圈子 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .add-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .add-card h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-group .hint {
            color: #909399;
            font-size: 12px;
            margin-top: 6px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-tip {
            color: #f56c6c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #67c23a;
            font-size: 14px;
            margin-top: 6px;
            display: none;
            text-align: center;
        }
        .success-tip.show {
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>知识分享平台</span>
        <a href="/page/index">返回首页</a>
    </div>

    <div class="container">
        <div class="add-card">
            <h2>创建圈子</h2>
            <form id="addCircleForm">
                <div class="form-group">
                    <label for="title">圈子名称</label>
                    <input type="text" id="title" name="title" placeholder="请输入圈子名称" maxlength="100">
                    <div class="hint">最多100个字符</div>
                    <div class="error-tip" id="titleError"></div>
                </div>

                <div class="form-group">
                    <label for="price">价格（元）</label>
                    <input type="number" id="price" name="price" placeholder="请输入价格" min="0" max="10000">
                    <div class="hint">价格范围：0 - 10000</div>
                    <div class="error-tip" id="priceError"></div>
                </div>

                <div class="form-group">
                    <label for="introduction">圈子简介</label>
                    <textarea id="introduction" name="introduction" placeholder="请输入圈子简介" maxlength="100"></textarea>
                    <div class="hint">最多100个字符</div>
                    <div class="error-tip" id="introductionError"></div>
                </div>

                <div class="error-tip" id="formError"></div>
                <div class="success-tip" id="successTip">圈子创建成功！</div>

                <button type="submit" class="btn" id="submitBtn">创建圈子</button>
            </form>
            <a href="/page/index" class="back-link">取消并返回首页</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('addCircleForm');
        const submitBtn = document.getElementById('submitBtn');
        const successTip = document.getElementById('successTip');

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        function hideError(elementId) {
            const el = document.getElementById(elementId);
            el.textContent = '';
            el.classList.remove('show');
        }

        function hideAllErrors() {
            ['titleError', 'priceError', 'introductionError', 'formError'].forEach(hideError);
        }

        function validateForm() {
            const title = document.getElementById('title').value.trim();
            const price = document.getElementById('price').value;
            const introduction = document.getElementById('introduction').value.trim();

            if (!title) {
                showError('titleError', '请输入圈子名称');
                return false;
            }
            if (title.length > 100) {
                showError('titleError', '圈子名称最多100个字符');
                return false;
            }
            if (!price || parseInt(price) < 0) {
                showError('priceError', '请输入有效的价格');
                return false;
            }
            if (parseInt(price) > 10000) {
                showError('priceError', '价格不能超过10000元');
                return false;
            }
            if (!introduction) {
                showError('introductionError', '请输入圈子简介');
                return false;
            }
            if (introduction.length > 100) {
                showError('introductionError', '圈子简介最多100个字符');
                return false;
            }

            return true;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideAllErrors();
            successTip.classList.remove('show');

            if (!validateForm()) {
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '创建中...';

            const formData = new FormData(form);

            try {
                const response = await axios.post('/api/circle/add', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                if (response.data.code === 0) {
                    const cid = response.data.data.cid;
                    window.location.href = '/page/circle/detail?cid=' + cid;
                } else {
                    showError('formError', response.data.msg || '创建失败，请稍后重试');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '创建圈子';
                }
            } catch (error) {
                console.error('创建圈子失败:', error);
                showError('formError', '网络错误，请稍后重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '创建圈子';
            }
        });
    </script>
</body>
</html>
