<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑课程 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .page-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            border-color: #667eea;
        }
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        .form-textarea:focus {
            border-color: #667eea;
        }
        .form-hint {
            font-size: 12px;
            color: #909399;
            margin-top: 6px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #f5f7fa;
            color: #666;
            border: 1px solid #dcdfe6;
        }
        .btn-secondary:hover {
            background: #eef0f4;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }
        .error-tip {
            text-align: center;
            padding: 60px 20px;
            color: #f56c6c;
        }
        .success-tip {
            text-align: center;
            padding: 20px;
            color: #67c23a;
            background: #f0f9eb;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>知识分享平台</span>
        <a href="/page/course/index">返回课程列表</a>
    </div>

    <div class="container">
        <h1 class="page-title">编辑课程</h1>
        <div class="card" id="editForm">
            <div class="loading">加载课程信息...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('course_id');
        let courseData = null;

        if (!cid) {
            document.getElementById('editForm').innerHTML = '<div class="error-tip">缺少课程ID参数</div>';
        } else {
            loadCourseDetail();
        }

        async function loadCourseDetail() {
            try {
                const response = await axios.get('/api/course/get', {
                    params: { course_id: cid }
                });

                if (response.data.code === 0 && response.data.data) {
                    courseData = response.data.data;
                    renderForm(courseData);
                } else {
                    document.getElementById('editForm').innerHTML = '<div class="error-tip">加载失败</div>';
                }
            } catch (error) {
                document.getElementById('editForm').innerHTML = '<div class="error-tip">加载失败，请稍后重试</div>';
            }
        }

        function renderForm(data) {
            const course = data.course || {};
            const title = course.title || '';
            const description = course.description || '';

            document.getElementById('editForm').innerHTML = `
                <div class="success-tip" id="successMsg" style="display: none;"></div>
                <div class="form-group">
                    <label class="form-label">课程标题</label>
                    <input type="text" class="form-input" id="courseTitle" value="${escapeHtml(title)}" maxlength="100" placeholder="请输入课程标题">
                </div>
                <div class="form-group">
                    <label class="form-label">课程简介</label>
                    <textarea class="form-textarea" id="courseDescription" maxlength="1000" placeholder="请输入课程简介">${escapeHtml(description)}</textarea>
                    <div class="form-hint">建议填写课程适用人群、学习目标等内容，让更多人了解您的课程</div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveCourse()">保存修改</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='/page/course/detail?course_id=${cid}'">取消</button>
                </div>
            `;
        }

        async function saveCourse() {
            const title = document.getElementById('courseTitle').value.trim();
            const description = document.getElementById('courseDescription').value.trim();

            if (!title) {
                alert('请输入课程标题');
                return;
            }

            if (!description) {
                alert('请输入课程简介');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            try {
                const formData = new FormData();
                formData.append('course_id', cid);
                formData.append('title', title);
                formData.append('content', description);

                const response = await axios.post('/api/course/update', formData);

                if (response.data.code === 0) {
                    showSuccess('保存成功！');
                    setTimeout(() => {
                        window.location.href = '/page/course/detail?course_id=' + cid;
                    }, 1500);
                } else {
                    alert(response.data.msg || '保存失败');
                }
            } catch (error) {
                alert('保存失败，请稍后重试');
            }

            saveBtn.disabled = false;
            saveBtn.textContent = '保存修改';
        }

        function showSuccess(msg) {
            const msgEl = document.getElementById('successMsg');
            msgEl.textContent = msg;
            msgEl.style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
