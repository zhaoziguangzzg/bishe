<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知详情 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .notice-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .notice-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .notice-icon.follow {
            background: #ecf5ff;
            color: #409eff;
        }
        .notice-icon.like {
            background: #fef0f0;
            color: #f56c6c;
        }
        .notice-icon.comment {
            background: #f0f9eb;
            color: #67c23a;
        }
        .notice-icon.accusation {
            background: #fdf6ec;
            color: #e6a23c;
        }
        .notice-icon.feedback {
            background: #f4f4f5;
            color: #909399;
        }
        .notice-icon.dispatch {
            background: #ecf5ff;
            color: #409eff;
        }
        .notice-icon.other {
            background: #f4f4f5;
            color: #909399;
        }
        .notice-type {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .notice-time {
            font-size: 13px;
            color: #909399;
            margin-bottom: 16px;
        }
        .content-section {
            background: #f5f7fa;
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }
        .error-tip {
            text-align: center;
            padding: 60px 20px;
            color: #f56c6c;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <a href="#" onclick="goBack()">← 返回</a>
        </div>
        <span>通知详情</span>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        <div id="content">
            <div class="error-tip">缺少通知参数</div>
        </div>
    </div>

    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function goBack() {
            history.back();
        }

        function getNoticeTypeInfo(type) {
            const typeMap = {
                0: { name: '系统通知', icon: '&#9997;', className: 'other' },
                1: { name: '关注', icon: '&#10084;', className: 'follow' },
                2: { name: '点赞', icon: '&#9829;', className: 'like' },
                3: { name: '评论', icon: '&#59194;', className: 'comment' },
                4: { name: '举报结果', icon: '&#9888;', className: 'accusation' },
                5: { name: '反馈回复', icon: '&#59197;', className: 'feedback' },
                6: { name: '关注发文', icon: '&#128276;', className: 'dispatch' }
            };
            return typeMap[type] || typeMap[0];
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderNoticeDetail(notice) {
            const typeInfo = getNoticeTypeInfo(notice.type);
            const updateAt = notice.updateAt ? formatTime(notice.updateAt) : '';

            const html = `
                <div class="card">
                    <div class="notice-header">
                        <div class="notice-icon ${typeInfo.className}">
                            ${typeInfo.icon}
                        </div>
                        <span class="notice-type">${typeInfo.name}</span>
                    </div>
                    <div class="notice-time">${updateAt}</div>
                    <div class="content-section">${escapeHtml(notice.content || '')}</div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        (function init() {
            const content = getQueryParam('content');
            const type = parseInt(getQueryParam('type')) || 0;
            const updateAt = getQueryParam('updateAt');

            if (content) {
                renderNoticeDetail({
                    content: decodeURIComponent(content),
                    type: type,
                    updateAt: updateAt ? decodeURIComponent(updateAt) : null
                });
            }
        })();
    </script>
</body>
</html>
