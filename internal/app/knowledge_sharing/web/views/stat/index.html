<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户数据 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .section-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #667eea;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: white;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
        .stat-card.orange {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .stat-card.green {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .stat-card.yellow {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        .stat-card.purple {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .stat-num {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .time-filter {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .time-label {
            font-size: 14px;
            color: #666;
        }
        .time-select {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .time-select:focus {
            border-color: #667eea;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .map-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .map-item:hover {
            background: #f0f4ff;
        }
        .map-label {
            font-size: 14px;
            color: #666;
        }
        .map-value {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }
        .empty-tip {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 14px;
        }
        .loading-tip {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .map-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← 返回首页</a>
        <h1>用户数据中心</h1>
        <div></div>
    </div>

    <div class="container">
        <div class="section-card">
            <h2 class="section-title">📊 各类型数据总数</h2>
            <div id="allStatsContent" class="loading-tip">加载中...</div>
        </div>

        <div class="section-card">
            <h2 class="section-title">📈 近期数据变化量</h2>
            <div class="time-filter">
                <span class="time-label">时间范围：</span>
                <select class="time-select" id="timeSelect" onchange="loadRecentStats()">
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div id="mapContent" class="loading-tip">加载中...</div>
        </div>
    </div>

    <script>
        const typeNames = {
            0: '收藏',
            1: '关注',
            2: '点赞',
            3: '评论',
            4: '圈子人数',
            5: '文章',
            6: '粉丝',
            7: '被点赞'
        };

        const typeColors = ['orange', 'green', 'yellow', 'purple', '', '', '', ''];

        function getStatIcon(type) {
            const icons = ['⭐', '👤', '❤️', '💬', '👥', '📝', '👥', '❤️'];
            return icons[type] || '📊';
        }

        async function loadAllStats() {
            const content = document.getElementById('allStatsContent');

            try {
                content.innerHTML = '<div class="loading-tip">加载中...</div>';

                const response = await axios.get('/api/stat/map');

                if (response.data.code === 0) {
                    const data = response.data.data;
                    renderAllStats(data);
                } else {
                    content.innerHTML = '<div class="empty-tip">加载失败: ' + (response.data.msg || '未知错误') + '</div>';
                }
            } catch (error) {
                content.innerHTML = '<div class="empty-tip">加载失败，请稍后重试</div>';
            }
        }

        function renderAllStats(data) {
            const content = document.getElementById('allStatsContent');
            const userStatMap = data.userStatMap || {};

            let html = '<div class="stats-grid">';

            const hasData = Object.keys(userStatMap).length > 0;

            if (!hasData) {
                html += '<div class="empty-tip" style="grid-column: 1 / -1;">暂无数据</div>';
            } else {
                for (const [type, count] of Object.entries(userStatMap)) {
                    const colorClass = typeColors[type] || '';
                    const typeName = typeNames[type] || '未知';
                    const icon = getStatIcon(type);

                    html += `
                        <div class="stat-card ${colorClass}">
                            <div class="stat-icon">${icon}</div>
                            <div class="stat-num">${count}</div>
                            <div class="stat-label">${typeName}</div>
                        </div>
                    `;
                }
            }

            html += '</div>';
            content.innerHTML = html;
        }

        async function loadRecentStats() {
            const stime = document.getElementById('timeSelect').value;
            const content = document.getElementById('mapContent');

            try {
                content.innerHTML = '<div class="loading-tip">加载中...</div>';

                const response = await axios.get('/api/stat/by-time', {
                    params: { stime: stime }
                });

                if (response.data.code === 0) {
                    const data = response.data.data;
                    renderRecentStats(data);
                } else {
                    content.innerHTML = '<div class="empty-tip">加载失败: ' + (response.data.msg || '未知错误') + '</div>';
                }
            } catch (error) {
                content.innerHTML = '<div class="empty-tip">加载失败，请稍后重试</div>';
            }
        }

        function renderRecentStats(data) {
            const content = document.getElementById('mapContent');
            const results = data.results || [];

            let html = '<div class="map-grid">';

            if (results.length === 0) {
                html += '<div class="empty-tip" style="grid-column: 1 / -1;">暂无数据</div>';
            } else {
                results.forEach(r => {
                    const typeName = typeNames[r.type] || '未知';

                    html += `
                        <div class="map-item">
                            <span class="map-label">${typeName}</span>
                            <span class="map-value">+${r.total}</span>
                        </div>
                    `;
                });
            }

            html += '</div>';
            content.innerHTML = html;
        }

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadAllStats();
            loadRecentStats();
        });
    </script>
</body>
</html>
