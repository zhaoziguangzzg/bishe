<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 知识分享平台</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            text-align: center;
            padding: 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-left: 3px solid white;
        }
        .menu-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        .menu-item .arrow {
            margin-left: auto;
            font-size: 12px;
        }
        .submenu {
            display: none;
            background: rgba(0,0,0,0.15);
        }
        .submenu.show {
            display: block;
        }
        .submenu-item {
            padding: 12px 24px 12px 60px;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        .submenu-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .submenu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-name {
            color: #333;
            font-size: 14px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #e64545;
        }
        .content-area {
            padding: 24px 32px;
        }
        .welcome-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .welcome-card h2 {
            color: #333;
            margin-bottom: 12px;
        }
        .welcome-card p {
            color: #666;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .stat-card .label {
            color: #666;
            font-size: 14px;
        }
        .menu-section {
            display: none;
        }
        .menu-section.active {
            display: block;
        }
        .section-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .user-info-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .user-basic {
            flex: 1;
        }
        .user-basic h3 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
        }
        .user-basic p {
            color: #666;
            font-size: 14px;
        }
        .user-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .detail-item {
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
        }
        .detail-item .label {
            color: #909399;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .detail-item .value {
            color: #333;
            font-size: 15px;
            font-weight: 500;
        }
        .edit-btn {
            margin-top: 24px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .edit-btn:hover {
            opacity: 0.9;
        }
        .essay-list {
            margin-top: 16px;
        }
        .essay-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background: #f9fafb;
        }
        .essay-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .essay-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .essay-meta {
            font-size: 13px;
            color: #909399;
            margin-bottom: 8px;
        }
        .essay-content-preview {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .essay-actions {
            display: flex;
            gap: 12px;
        }
        .btn-pass {
            padding: 8px 20px;
            background: #67c23a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-pass:hover {
            background: #5daf34;
        }
        .btn-reject {
            padding: 8px 20px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-reject:hover {
            background: #e64545;
        }
        .btn-detail {
            padding: 8px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-detail:hover {
            background: #66b1ff;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
        .feedback-list {
            margin-top: 16px;
        }
        .feedback-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background: #f9fafb;
            cursor: pointer;
            transition: all 0.3s;
        }
        .feedback-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .feedback-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .feedback-id {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .feedback-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .feedback-status.pending {
            background: #fdf6ec;
            color: #e6a23c;
        }
        .feedback-status.processed {
            background: #f0f9eb;
            color: #67c23a;
        }
        .feedback-meta {
            font-size: 13px;
            color: #909399;
            margin-bottom: 8px;
        }
        .feedback-content-preview {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .announce-list {
            margin-top: 16px;
        }
        .announce-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background: #f9fafb;
        }
        .announce-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .announce-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .announce-meta {
            font-size: 13px;
            color: #909399;
            margin-bottom: 8px;
        }
        .announce-content-preview {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .btn-edit {
            padding: 8px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-edit:hover {
            background: #66b1ff;
        }
        .advert-list {
            margin-top: 16px;
        }
        .advert-item {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background: #f9fafb;
        }
        .advert-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .advert-position {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .advert-meta {
            font-size: 13px;
            color: #909399;
            margin-bottom: 8px;
        }
        .advert-content-preview {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }
        #add-announce-form {
            margin-top: 16px;
        }
        .form-group-inline {
            margin-bottom: 16px;
        }
        .form-group-inline label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group-inline input,
        .form-group-inline textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group-inline input:focus,
        .form-group-inline textarea:focus {
            border-color: #667eea;
        }
        .form-group-inline textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
        }
        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .error-tip {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-tip.show {
            display: block;
        }
        .success-tip {
            color: #52c41a;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .success-tip.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>后台管理</h2>
            <p>知识分享平台</p>
        </div>
        
        <div class="menu-item" onclick="toggleSubmenu('user')">
            <span class="icon">👤</span>
            <span>用户信息</span>
            <span class="arrow">▼</span>
        </div>
        <div class="submenu show" id="submenu-user">
            <div class="submenu-item active" onclick="showSection('user-info'); setActiveSubmenu(this)">个人信息</div>
        </div>
        
        <div class="menu-item" onclick="toggleSubmenu('review')">
            <span class="icon">✅</span>
            <span>审核</span>
            <span class="arrow">▼</span>
        </div>
        <div class="submenu" id="submenu-review">
            <div class="submenu-item" onclick="showSection('essay-review'); setActiveSubmenu(this)">文章审核</div>
        </div>
        
        <div class="menu-item" onclick="toggleSubmenu('feedback')">
            <span class="icon">💬</span>
            <span>反馈</span>
            <span class="arrow">▼</span>
        </div>
        <div class="submenu" id="submenu-feedback">
            <div class="submenu-item" onclick="showSection('feedback-list'); setActiveSubmenu(this)">反馈列表</div>
        </div>
        
        <div class="menu-item" onclick="toggleSubmenu('notice')">
            <span class="icon">📢</span>
            <span>公告</span>
            <span class="arrow">▼</span>
        </div>
        <div class="submenu" id="submenu-notice">
            <div class="submenu-item" onclick="showSection('notice-list'); setActiveSubmenu(this)">公告列表</div>
            <div class="submenu-item" onclick="showSection('notice-add'); setActiveSubmenu(this)">新增公告</div>
        </div>
        
        <div class="menu-item" onclick="toggleSubmenu('ad')">
            <span class="icon">📺</span>
            <span>广告</span>
            <span class="arrow">▼</span>
        </div>
        <div class="submenu" id="submenu-ad">
            <div class="submenu-item" onclick="showSection('ad-list'); setActiveSubmenu(this)">广告列表</div>
            <div class="submenu-item" onclick="showSection('ad-add'); setActiveSubmenu(this)">新增广告</div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <h1 id="pageTitle">用户信息</h1>
            <div class="user-info">
                <span class="user-name" id="adminName">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>
        
        <div class="content-area">
            <div class="menu-section active" id="section-user-info">
                <div class="user-info-card">
                    <div class="user-info-header">
                        <img class="user-avatar" id="adminAvatar" src="" alt="头像"/>
                        <div class="user-basic">
                            <h3 id="adminDisplayName">加载中...</h3>
                            <p id="adminEmail">--</p>
                        </div>
                    </div>
                    <div class="user-detail-grid">
                        <div class="detail-item">
                            <div class="label">用户名</div>
                            <div class="value" id="adminUserName">--</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">手机号</div>
                            <div class="value" id="adminPhone">--</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">创建时间</div>
                            <div class="value" id="adminCreateAt">--</div>
                        </div>
                    </div>
                    <button class="edit-btn" onclick="editAdminInfo()">编辑信息</button>
                </div>
            </div>
            
            <div class="menu-section" id="section-essay-review">
                <div class="section-card">
                    <h3 class="section-title">文章审核</h3>
                    <div id="essay-review-list"></div>
                </div>
            </div>
            
            <div class="menu-section" id="section-circle-review">
                <div class="section-card">
                    <h3 class="section-title">圈子审核</h3>
                    <p>圈子审核功能开发中...</p>
                </div>
            </div>
            
            <div class="menu-section" id="section-feedback-list">
                <div class="section-card">
                    <h3 class="section-title">反馈列表</h3>
                    <div id="feedback-list"></div>
                </div>
            </div>
            
            <div class="menu-section" id="section-feedback-reply">
                <div class="section-card">
                    <h3 class="section-title">回复反馈</h3>
                    <p>回复反馈功能开发中...</p>
                </div>
            </div>
            
            <div class="menu-section" id="section-notice-list">
                <div class="section-card">
                    <h3 class="section-title">公告列表</h3>
                    <div id="announce-list"></div>
                </div>
            </div>

            <div class="menu-section" id="section-notice-add">
                <div class="section-card">
                    <h3 class="section-title">发布公告</h3>
                    <div id="add-announce-form">
                        <div class="form-group-inline">
                            <label>公告标题</label>
                            <input id="add-announce-title" type="text" placeholder="请输入公告标题"/>
                        </div>
                        <div class="form-row">
                            <div class="form-group-inline">
                                <label>开始时间</label>
                                <input id="add-announce-startTime" type="datetime-local"/>
                            </div>
                            <div class="form-group-inline">
                                <label>结束时间</label>
                                <input id="add-announce-endTime" type="datetime-local"/>
                            </div>
                        </div>
                        <div class="form-group-inline">
                            <label>公告内容</label>
                            <textarea id="add-announce-content" placeholder="请输入公告内容"></textarea>
                        </div>
                        <p id="add-announce-error" class="error-tip"></p>
                        <p id="add-announce-success" class="success-tip"></p>
                        <button type="button" class="btn-primary" onclick="submitAddAnnounce()">发布公告</button>
                    </div>
                </div>
            </div>
            
            <div class="menu-section" id="section-ad-list">
                <div class="section-card">
                    <h3 class="section-title">广告列表</h3>
                    <div id="advert-list"></div>
                </div>
            </div>

            <div class="menu-section" id="section-ad-add">
                <div class="section-card">
                    <h3 class="section-title">添加广告</h3>
                    <div id="add-advert-form">
                        <div class="form-group-inline">
                            <label>广告位置</label>
                            <input id="add-advert-position" type="text" placeholder="请输入广告位置"/>
                        </div>
                        <div class="form-group-inline">
                            <label>广告地址</label>
                            <input id="add-advert-addr" type="text" placeholder="请输入广告地址"/>
                        </div>
                        <div class="form-group-inline">
                            <label>广告内容</label>
                            <textarea id="add-advert-content" placeholder="请输入广告内容"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group-inline">
                                <label>开始时间</label>
                                <input id="add-advert-startTime" type="datetime-local"/>
                            </div>
                            <div class="form-group-inline">
                                <label>结束时间</label>
                                <input id="add-advert-endTime" type="datetime-local"/>
                            </div>
                        </div>
                        <p id="add-advert-error" class="error-tip"></p>
                        <p id="add-advert-success" class="success-tip"></p>
                        <button type="button" class="btn-primary" onclick="submitAddAdvert()">发布广告</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentAdmin = null;

        function setActiveSubmenu(element) {
            document.querySelectorAll('.submenu-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        async function loadAdminInfo() {
            try {
                const response = await axios.get('/api/adminuser/get');
                if (response.data.code === 0 && response.data.data) {
                    currentAdmin = response.data.data.user;
                    document.getElementById('adminName').textContent = currentAdmin.name;
                    renderAdminInfo();
                } else {
                    window.location.href = '/page/user/login';
                }
            } catch (error) {
                window.location.href = '/page/user/login';
            }
        }

        function renderAdminInfo() {
            if (!currentAdmin) return;
            document.getElementById('adminDisplayName').textContent = currentAdmin.name || '--';
            document.getElementById('adminEmail').textContent = currentAdmin.email || '未设置';
            document.getElementById('adminUserName').textContent = currentAdmin.name || '--';
            document.getElementById('adminPhone').textContent = currentAdmin.phone || '未设置';
            document.getElementById('adminCreateAt').textContent = currentAdmin.createAt || '--';
            if (currentAdmin.avatar) {
                document.getElementById('adminAvatar').src = currentAdmin.avatar;
            } else {
                document.getElementById('adminAvatar').style.display = 'none';
            }
        }

        function editAdminInfo() {
            window.location.href = '/page/admin/edit';
        }
        
        function toggleSubmenu(menu) {
            const submenu = document.getElementById('submenu-' + menu);
            submenu.classList.toggle('show');
        }
        
        function showSection(section) {
            document.querySelectorAll('.menu-section').forEach(s => {
                s.classList.remove('active');
            });
            document.getElementById('section-' + section).classList.add('active');

            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.submenu-item').forEach(item => {
                item.classList.remove('active');
            });

            const menuItem = document.querySelector(`.menu-item[data-section="${section}"]`);
            if (menuItem) {
                menuItem.classList.add('active');
            }

            const sectionTitles = {
                'user-info': '用户信息',
                'essay-review': '文章审核',
                'circle-review': '圈子审核',
                'feedback-list': '反馈列表',
                'feedback-reply': '回复反馈',
                'notice-list': '公告列表',
                'notice-add': '发布公告',
                'ad-list': '广告列表',
                'ad-add': '添加广告'
            };
            document.getElementById('pageTitle').textContent = sectionTitles[section] || '后台管理';

            if (section === 'essay-review') {
                loadEssayReviewList();
            } else if (section === 'feedback-list') {
                loadFeedbackList();
            } else if (section === 'notice-list') {
                loadAnnounceList();
            } else if (section === 'ad-list') {
                loadAdvertList();
            }
        }

        async function loadEssayReviewList() {

                if (response.data.code === 0) {
                    const accusations = response.data.data.accusations || [];
                    renderEssayReviewList(accusations);
                } else {
                    listContainer.innerHTML = '<div class="empty-state">加载失败</div>';
                }
            } catch (error) {
                console.error('加载待审核文章失败', error);
                listContainer.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function renderEssayReviewList(accusations) {
            const listContainer = document.getElementById('essay-review-list');

            if (!accusations || accusations.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">暂无待审核文章</div>';
                return;
            }

            let html = '<div class="essay-list">';
            accusations.forEach(acc => {
                const accusationTime = acc.accusationTime ? new Date(acc.accusationTime).toLocaleString() : '--';
                html += `
                    <div class="essay-item">
                        <div class="essay-item-header">
                            <span class="essay-title">文章ID: ${acc.essayId}</span>
                        </div>
                        <div class="essay-meta">举报时间: ${accusationTime}</div>

                        <div class="essay-actions">

                        </div>
                    </div>

            html += '</div>';
            listContainer.innerHTML = html;

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function submitAddAnnounce() {
            const title = document.getElementById('add-announce-title').value.trim();
            const content = document.getElementById('add-announce-content').value.trim();
            const startTimeStr = document.getElementById('add-announce-startTime').value;
            const endTimeStr = document.getElementById('add-announce-endTime').value;
            const errorMsg = document.getElementById('add-announce-error');
            const successMsg = document.getElementById('add-announce-success');

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (!title) {
                errorMsg.textContent = '公告标题不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!content) {
                errorMsg.textContent = '公告内容不能为空';
                errorMsg.classList.add('show');
                return;
            }

            if (!startTimeStr || !endTimeStr) {
                errorMsg.textContent = '开始时间和结束时间不能为空';
                errorMsg.classList.add('show');
                return;
            }

            const startTime = formatDateTimeForSubmit(startTimeStr);
            const endTime = formatDateTimeForSubmit(endTimeStr);

            if (new Date(startTime) >= new Date(endTime)) {
                errorMsg.textContent = '结束时间必须晚于开始时间';
                errorMsg.classList.add('show');
                return;
            }

            const formData = new URLSearchParams();
            formData.append('title', title);
            formData.append('content', content);
            formData.append('start_time', startTime);
            formData.append('end_time', endTime);

            try {
                const response = await axios.post('/api/announce/add', formData, {
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                if (response.data.code === 0) {
                    successMsg.textContent = '发布成功';
                    successMsg.classList.add('show');
                    document.getElementById('add-announce-title').value = '';
                    document.getElementById('add-announce-content').value = '';
                    document.getElementById('add-announce-startTime').value = '';
                    document.getElementById('add-announce-endTime').value = '';
                } else {
                    errorMsg.textContent = response.data.message || '发布失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            }
        }

        function formatDateTimeForSubmit(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
